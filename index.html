const AC=new(window.AudioContext||window.webkitAudioContext)();
function unlockAC(){if(AC.state==='suspended')AC.resume();}
function playSound(type){
  if(!cfg.soundOn)return;
  try{
    const g=AC.createGain();g.connect(AC.destination);
    if(type==='shoot'){
      const b=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*0.12,AC.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.04));
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.6,AC.currentTime);b.start();
    }else if(type==='shotgun'){
      const b=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*0.28,AC.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.09))*1.6;
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.95,AC.currentTime);b.start();
    }else if(type==='rifle'){
      const b=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*0.08,AC.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.03))*0.8;
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.7,AC.currentTime);b.start();
    }else if(type==='zombie'){
      const o=AC.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(70+Math.random()*50,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(35,AC.currentTime+0.5);o.connect(g);g.gain.setValueAtTime(0.18,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.55);o.start();o.stop(AC.currentTime+0.55);
    }else if(type==='wrong'){
      const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=110;o.connect(g);
      g.gain.setValueAtTime(0.35,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.35);o.start();o.stop(AC.currentTime+0.35);
    }else if(type==='beep'){
      const o=AC.createOscillator();o.type='sine';o.frequency.value=900;o.connect(g);
      g.gain.setValueAtTime(0.15,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);o.start();o.stop(AC.currentTime+0.1);
    }else if(type==='level_up'){
      const o=AC.createOscillator();o.type='square';o.frequency.setValueAtTime(440,AC.currentTime);
      o.frequency.setValueAtTime(554,AC.currentTime+0.15);o.frequency.setValueAtTime(659,AC.currentTime+0.3);
      o.frequency.setValueAtTime(880,AC.currentTime+0.45);o.connect(g);g.gain.setValueAtTime(0.3,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.8);o.start();o.stop(AC.currentTime+0.8);
    }
  }catch(e){}
}

// Dynamic Level Initialization (Guarantees exactly 7 crates, 1 door, safe spawn)
function initLevelMap(){
  player.cratesCollected = 0;
  player.doorProgress = 0;
  MAP=[];
  for(let y=0;y<MAPH;y++) MAP[y] = [...RAWMAP[y]].map(Number);
  
  const spawn = LEVELS[player.currentLevelIdx].spawn;
  player.x = spawn.x; player.y = spawn.y;
  
  let emptyCells = [];
  for(let y=1; y<MAPH-1; y++){
    for(let x=1; x<MAPW-1; x++){
      if(MAP[y][x] === 0) {
        // Must be far from spawn
        if(Math.hypot(x - player.x, y - player.y) > 8) {
          emptyCells.push({x,y});
        }
      }
    }
  }
  // Shuffle empty cells
  emptyCells.sort(() => Math.random() - 0.5);
  
  // Place exactly 7 Crates
  for(let i=0; i<7; i++) {
    MAP[emptyCells[i].y][emptyCells[i].x] = 3;
  }
  // Place 1 Door
  doorPos = emptyCells[7];
  MAP[doorPos.y][doorPos.x] = 2;

  // Spawn Zombies
  zombies = [];
  const numZombies = 15 + (player.currentLevelIdx * 5);
  for(let i=8; i<8+numZombies && i<emptyCells.length; i++){
    const zType = Math.random() > 0.6 ? Math.floor(Math.random()*ZOMBIE_TYPES.length) : 0;
    spawnZombie(emptyCells[i].x, emptyCells[i].y, zType);
  }
}

}

// ── COLLISION HELPERS ─────────────────────────────────────────
function cellSolid(mx,my){
  if(mx<0||mx>=MAPW||my<0||my>=MAPH)return true;
  const c=MAP[my][mx];
  if(c===1)return true;
  if(c===2 && player.doorProgress < 3)return true; // Door solid until fully answered
  if(c===3)return true; // Crate always solid
  return false;
}

function tryMovePlayer(nx,ny){
  const r=0.28; const ox=player.x,oy=player.y;
  if(!circleBlockedAt(nx,ny,r)){player.x=nx;player.y=ny;return;}
  if(!circleBlockedAt(nx,oy,r)){player.x=nx;return;}
  if(!circleBlockedAt(ox,ny,r)){player.y=ny;return;}
}
function circleBlockedAt(cx,cy,r){
  const x0=Math.floor(cx-r),x1=Math.floor(cx+r);
  const y0=Math.floor(cy-r),y1=Math.floor(cy+r);
  for(let ty=y0;ty<=y1;ty++)for(let tx=x0;tx<=x1;tx++){
    if(!cellSolid(tx,ty))continue;
    const nearX=Math.max(tx,Math.min(tx+1,cx));
    const nearY=Math.max(ty,Math.min(ty+1,cy));
    if((cx-nearX)**2+(cy-nearY)**2<r*r)return true;
  }
  return false;
}

// ── TOUCH ─────────────────────────────────────────────────────
const touch={lx:0,ly:0,rx:0,ry:0,lActive:false,rActive:false,lId:-1,rId:-1,lox:0,loy:0,rox:0,roy:0,joyR:60};
canvas.addEventListener('touchstart',e=>{
  unlockAC();e.preventDefault();
  for(const t of e.changedTouches){
    if(checkBtnTouch(t.clientX,t.clientY))continue;
    if(t.clientX<W*0.5&&!touch.lActive){
      touch.lActive=true;touch.lId=t.identifier; touch.lox=t.clientX;touch.loy=t.clientY;touch.lx=0;touch.ly=0;
    }else if(t.clientX>=W*0.5&&!touch.rActive){
      touch.rActive=true;touch.rId=t.identifier; touch.rox=t.clientX;touch.roy=t.clientY;touch.rx=0;touch.ry=0;
    }
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touch.lId){
      touch.lx=Math.max(-1,Math.min(1,(t.clientX-touch.lox)/touch.joyR));
      touch.ly=Math.max(-1,Math.min(1,(t.clientY-touch.loy)/touch.joyR));
    }else if(t.identifier===touch.rId){
      touch.rx=Math.max(-1,Math.min(1,(t.clientX-touch.rox)/touch.joyR));
      touch.ry=Math.max(-1,Math.min(1,(t.clientY-touch.roy)/touch.joyR));
      touch.rox=t.clientX;touch.roy=t.clientY;
    }
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touch.lId){touch.lActive=false;touch.lId=-1;touch.lx=0;touch.ly=0;}
    if(t.identifier===touch.rId){touch.rActive=false;touch.rId=-1;touch.rx=0;touch.ry=0;}
  }
},{passive:false});

function checkBtnTouch(bx,by){
  if(gameState===GS.GAME||gameState===GS.PAUSED){
    if(d2(bx,by,BTN.fire.x,BTN.fire.y)<BTN.fire.r*BTN.fire.r){if(gameState===GS.GAME)doShoot();return true;}
    if(interactTarget!==null && d2(bx,by,BTN.interact.x,BTN.interact.y)<BTN.interact.r*BTN.interact.r){if(gameState===GS.GAME)checkInteract();return true;}
    if(d2(bx,by,BTN.reload.x,BTN.reload.y)<BTN.reload.r*BTN.reload.r){if(gameState===GS.GAME)doReload();return true;}
    if(d2(bx,by,BTN.pause.x,BTN.pause.y)<BTN.pause.r*BTN.pause.r){togglePause();return true;}
    if(d2(bx,by,BTN.weapon.x,BTN.weapon.y)<BTN.weapon.r*BTN.weapon.r){
      if(gameState===GS.GAME){
        player.weapon = (player.weapon + 1) % player.weaponsUnlocked;
        playSound('reload');
      }return true;
    }
  }
  return false;
}
function d2(x1,y1,x2,y2){return(x1-x2)**2+(y1-y2)**2;}

let menuBtns=[];
function handleClick(cx,cy){

  }

      const by=H*0.44+i*(H*0.112); const bx=W*0.06;const bw2=W*0.88;const bh=H*0.096;
      if(cx>=bx&&cx<=bx+bw2&&cy>=by&&cy<=by+bh){answerQuestion(i);return;}

// ── SHOOT ────────────────────────────────────────────────────
let autoFireTimer=0;
function doShoot(){
  if(player.reloading)return;
  if(player.weapon===2 && autoFireTimer>0) return; // Rifle rate of fire
  
  if(player.ammo[player.weapon]<=0){playSound('wrong');return;}
  player.ammo[player.weapon]--;
  player.muzzleFlash=10;
  player.recoil= player.weapon===2 ? 0.1 : 0.18;
  player.recoilY=0.12;
  
  let sfx = player.weapon===0 ? 'shoot' : player.weapon===1 ? 'shotgun' : 'rifle';
  playSound(sfx);
  
  shakeTimer= player.weapon===2 ? 5 : 10;
  shakeX= player.weapon===0?4: player.weapon===1?9 : 5;
  shakeY=shakeX;
  
  if(player.weapon===2) autoFireTimer = 8; // delay between rifle shots

  const shots=WEAPON_SHOTS[player.weapon];
  const range=WEAPON_RANGE[player.weapon];
  for(let s=0;s<shots;s++){
    const spread=(Math.random()-0.5)*WEAPON_SPREAD[player.weapon];
    const angle=player.angle+spread;
    let hitZ=null,hitDist=Infinity;
    for(const z of zombies){
      if(z.state==='dead'||z.state==='dying')continue;
      const dx=z.x-player.x,dy=z.y-player.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>range)continue;
      const za=Math.atan2(dy,dx);
      let da=za-angle;
      while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
      const hitAngle=Math.atan2(z.radius,dist);
      if(Math.abs(da)<hitAngle+0.05&&dist<hitDist){hitDist=dist;hitZ=z;}
    }
    if(hitZ){
      const dmg=WEAPON_DAMAGE[player.weapon]/shots;
      hitZ.hp-=dmg;hitZ.hitFlash=10;
      spawnBloodParticles(hitZ.x,hitZ.y, player.weapon===1 ? 8 : 4);
      if(hitZ.hp<=0&&hitZ.state!=='dead'&&hitZ.state!=='dying'){
        hitZ.state='dying';hitZ.deathTimer=35; player.kills++;
        const xp=ZOMBIE_TYPES[hitZ.type].score; player.xp+=xp;score+=xp;
        checkLevelUp();playSound('zombie');
      }else if(hitZ.state!=='dying'){hitZ.state='chase';}
    }
  }
  spawnMuzzleParticles();
}

function doReload(){
  if(player.reloading)return;
  if(player.ammo[player.weapon]===player.maxAmmo[player.weapon])return;
  player.reloading=true;
  player.reloadTimer=Math.round(WEAPON_RELOAD_TIME[player.weapon]*60);
  playSound('reload');
}

function checkLevelUp(){
  const needed=player.level*200;
  if(player.xp>=needed){
    player.level++;player.xp-=needed;player.hp=Math.min(player.maxHp,player.hp+25);successFlash=40;
    if(player.level === 3 && player.weaponsUnlocked < 2) { player.weaponsUnlocked = 2; playSound('level_up'); } // Unlock shotgun
    if(player.level === 6 && player.weaponsUnlocked < 3) { player.weaponsUnlocked = 3; playSound('level_up'); } // Unlock Rifle
  }
}

// ── QUESTIONS ────────────────────────────────────────────────
function triggerQuestion(trigger){
  if(gameState!==GS.GAME)return;
  const pool=QUESTIONS.filter((_,i)=>!usedQuestions.includes(i));
  if(pool.length===0){usedQuestions=[];} // Fallback safety
  const avail=QUESTIONS.filter((_,i)=>!usedQuestions.includes(i));
  const q=avail[Math.floor(Math.random()*avail.length)];
  currentQuestion=q; 
  questionTrigger=trigger;
  gameState=GS.QUESTION;
  playSound('beep');
}

function answerQuestion(choice){
  if(!currentQuestion)return;
  if(!confirm("Are you sure?")) return;

  const idx = QUESTIONS.indexOf(currentQuestion);

  if(choice===currentQuestion.a){
    playSound('beep');successFlash=70;
    usedQuestions.push(idx); // Register ONLY on success! So 50 total won't be wasted.
    
    // Reward ammo
    for(let w=0; w<player.weaponsUnlocked; w++){
        player.ammo[w]=Math.min(player.maxAmmo[w],player.ammo[w]+Math.ceil(player.maxAmmo[w]*0.5));
    }
    player.xp+=50;score+=100;checkLevelUp();
    
    // Kill nearest zombie bonus
    let nearest=null,nd=Infinity;
    for(const z of zombies){
      if(z.state!=='dead'&&z.state!=='dying'){
        const dist=Math.hypot(z.x-player.x,z.y-player.y);
        if(dist<nd){nd=dist;nearest=z;}
      }
    }
    if(nearest&&nd<9){nearest.hp=0;nearest.state='dying';nearest.deathTimer=35;player.kills++;spawnBloodParticles(nearest.x,nearest.y,12);}
    
    if(questionTrigger==='crate'){
       MAP[interactTarget.y][interactTarget.x] = 0; // Remove crate
       player.cratesCollected++;
    }
    else if(questionTrigger==='door'){
       player.doorProgress++;
       if(player.doorProgress >= 3) {
          MAP[interactTarget.y][interactTarget.x] = 0; // Open door
          player.currentLevelIdx++;
          if(player.currentLevelIdx >= LEVELS.length) {
             gameState = GS.WIN; winTimer = 300; return;
          } else {
             gameState=GS.LEVEL_UP; levelUpTimer=150; playSound('level_up');
             saveGameProgress(); // Auto-save on next level
             return;
          }
       } else {
           // Still need more questions for this door
           setTimeout(() => { triggerQuestion('door'); }, 500);
       }
    }
    gameState=GS.GAME;
  }else{
    playSound('wrong');dmgFlash=50;
    player.hp-=15; shakeTimer=22;shakeX=10;shakeY=10;
    // Wake up nearby zombies
    for(const z of zombies){
      if(z.state==='roam'&&Math.hypot(z.x-player.x,z.y-player.y)<14)z.state='chase';
    }
    if(player.hp<=0){gameState=GS.DEAD;deathTimer=200;}
    else gameState=GS.GAME;
  }
  currentQuestion=null;
}

// ── PARTICLES ────────────────────────────────────────────────
function spawnBloodParticles(x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=0.02+Math.random()*0.05;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:35+Math.random()*35,type:'blood'});
  }
}
function spawnMuzzleParticles(){
  const a=player.angle;
  for(let i=0;i<8;i++){
    const sa=a+(Math.random()-0.5)*0.45;const sp=0.07+Math.random()*0.06;
    particles.push({x:player.x+Math.cos(a)*0.5,y:player.y+Math.sin(a)*0.5,vx:Math.cos(sa)*sp,vy:Math.sin(sa)*sp,life:14,type:'muzzle'});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)particles.splice(i,1);
  }
}

// ── ZOMBIE AI ────────────────────────────────────────────────
function updateZombies(){
  for(let i=0;i<zombies.length;i++){
    zombies[i].separationX=0;zombies[i].separationY=0;
    for(let j=0;j<zombies.length;j++){
      if(i===j)continue;
      const zi=zombies[i],zj=zombies[j];
      if(zi.state==='dead'||zj.state==='dead')continue;
      const dx=zi.x-zj.x,dy=zi.y-zj.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minDist=(zi.radius||0.35)+(zj.radius||0.35)+0.1;
      if(dist<minDist&&dist>0.001){
        const force=(minDist-dist)/minDist*0.015;
        zombies[i].separationX+=dx/dist*force; zombies[i].separationY+=dy/dist*force;
      }
    }
  }

  for(const z of zombies){
    if(z.state==='dead')continue;
    if(z.state==='dying'){z.deathTimer--;if(z.deathTimer<=0)z.state='dead';continue;}
    if(z.hitFlash>0)z.hitFlash--;

    const dx=player.x-z.x,dy=player.y-z.y;
    const distToPlayer=Math.sqrt(dx*dx+dy*dy);
    const nx0=z.x+z.separationX,ny0=z.y+z.separationY;
    if(!circleBlockedAt(nx0,ny0,z.radius)){z.x=nx0;z.y=ny0;}

    if(z.state==='roam'){
      if(distToPlayer<z.alertRadius){z.state='chase';playSound('zombie');}
      z.roamTimer--;
      if(z.roamTimer<=0){z.angle=Math.random()*Math.PI*2;z.roamTimer=70+Math.random()*130;}
      const spd=z.speed;
      const nx=z.x+Math.cos(z.angle)*spd,ny=z.y+Math.sin(z.angle)*spd;
      if(!circleBlockedAt(nx,ny,z.radius)){z.x=nx;z.y=ny;}
      else{z.angle+=Math.PI*(0.4+Math.random()*0.6);z.roamTimer=15;}
    }else if(z.state==='chase'){
      if(distToPlayer>z.alertRadius*2.2)z.state='roam';
      const attackDist=(z.radius||0.35)+0.55;
      if(distToPlayer<attackDist){z.state='attack';z.attackTimer=45;}
      else{
        const spd=z.speed*1.6;
        const ta=Math.atan2(dy,dx);
        const nx=z.x+Math.cos(ta)*spd,ny=z.y+Math.sin(ta)*spd;
        if(!circleBlockedAt(nx,ny,z.radius)){z.x=nx;z.y=ny;}
        else{
          let moved=false;
          for(const offset of[0.4,-0.4,0.8,-0.8,1.2,-1.2]){
            const a2=ta+offset;
            const nx2=z.x+Math.cos(a2)*spd,ny2=z.y+Math.sin(a2)*spd;
            if(!circleBlockedAt(nx2,ny2,z.radius)){z.x=nx2;z.y=ny2;z.angle=a2;moved=true;break;}
          }
          if(!moved)z.angle=ta+Math.PI*(0.5+Math.random()*0.5);
        }
        z.angle=ta;
      }
    }else if(z.state==='attack'){
      z.attackTimer--;
      if(z.attackTimer<=0){
        const ad=(z.radius||0.35)+0.65;
        if(distToPlayer<ad){
          player.hp-=z.dmg;dmgFlash=35; shakeTimer=18;shakeX=8;shakeY=8; playSound('hit');
          if(player.hp<=0){gameState=GS.DEAD;deathTimer=200;}
        }
        z.attackTimer=65;
      }
      if(distToPlayer>((z.radius||0.35)+1.3))z.state='chase';
    }
  }
}

// ── PLAYER UPDATE ─────────────────────────────────────────────
function updatePlayer(){
  if(gameState!==GS.GAME)return;
  if(player.reloading){
    player.reloadTimer--;
    if(player.reloadTimer<=0){player.reloading=false;player.ammo[player.weapon]=player.maxAmmo[player.weapon];playSound('beep');}
  }
  if(autoFireTimer>0) autoFireTimer--;
  if(player.muzzleFlash>0)player.muzzleFlash--;
  if(player.recoil>0)player.recoil*=0.75;else player.recoil=0;
  if(player.recoilY>0)player.recoilY*=0.75;else player.recoilY=0;

  const spd=player.moveSpeed;
  let moved=false;
  if(keys['KeyW']||keys['ArrowUp']){tryMovePlayer(player.x+Math.cos(player.angle)*spd,player.y+Math.sin(player.angle)*spd);moved=true;}
  if(keys['KeyS']||keys['ArrowDown']){tryMovePlayer(player.x-Math.cos(player.angle)*spd,player.y-Math.sin(player.angle)*spd);moved=true;}
  if(keys['KeyA']){player.angle-=player.turnSpeed;}
  if(keys['KeyD']||keys['ArrowRight']){player.angle+=player.turnSpeed;}
  if(keys['ArrowLeft']){player.angle-=player.turnSpeed;}
  if(keys['Space']){
     if(player.weapon === 2) doShoot(); // Auto
     else if(!keys['_sl']) doShoot(); // Semi
  }
  keys['_sl']=keys['Space'];
  
  if(keys['KeyR'])doReload();
  if(keys['KeyQ']&&!keys['_ql']){player.weapon=(player.weapon+1)%player.weaponsUnlocked; playSound('reload');} keys['_ql']=keys['KeyQ'];
  if(keys['KeyE']&&!keys['_el']){checkInteract();}keys['_el']=keys['KeyE'];

  if(touch.lActive){
    const fw=-touch.ly*spd,st=touch.lx*spd;
    const nx=player.x+Math.cos(player.angle)*fw+Math.cos(player.angle+Math.PI/2)*st;
    const ny=player.y+Math.sin(player.angle)*fw+Math.sin(player.angle+Math.PI/2)*st;
    tryMovePlayer(nx,ny);
    if(Math.abs(touch.lx)>0.1||Math.abs(touch.ly)>0.1)moved=true;
  }
  if(touch.rActive){player.angle+=touch.rx*cfg.sensitivity*0.045;touch.rx=0;}

  if(moved){player.bobPhase+=0.16;player.bobAmt=Math.sin(player.bobPhase)*0.014;}
  else{player.bobAmt*=0.82;}
  if(moved){player.stepTimer++;if(player.stepTimer%20===0)playSound('step');}

  interactTarget=null;
  const fx=Math.floor(player.x+Math.cos(player.angle)*1.3);
  const fy=Math.floor(player.y+Math.sin(player.angle)*1.3);
  if(fx>=0&&fx<MAPW&&fy>=0&&fy<MAPH){
    const cell=MAP[fy][fx];
    if(cell===2){interactTarget={type:'door',x:fx,y:fy};}
    if(cell===3){interactTarget={type:'crate',x:fx,y:fy};}
  }

  flickerTimer--;
  if(flickerTimer<=0){
    flickerTimer=Math.floor(3+Math.random()*30);
    flickerVal=0.85+Math.random()*0.15;
    if(Math.random()<0.05)flickerVal=0.4+Math.random()*0.3;
  }
}

function checkInteract(){
  if(interactTarget===null)return;
  if(interactTarget.type === 'crate'){
    triggerQuestion('crate');
  }
  else if(interactTarget.type === 'door'){
    if(player.cratesCollected < 7) {
       // Show warning flash
       dmgFlash = 15; playSound('wrong');
    } else {
       triggerQuestion('door');
    }
  }
}

function updateShake(){if(shakeTimer>0)shakeTimer--;}

// ── RAYCASTING ────────────────────────────────────────────────
const TWO_PI=Math.PI*2;
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

function raycast(){
  const fov=Math.PI/3;
  const cols=cfg.quality===0?Math.floor(W/4):cfg.quality===1?Math.floor(W/2):W;
  const colW=W/cols;
  const halfH=H/2;
  
  const levelColIdx = Math.min(4, player.currentLevelIdx);
  const fog=ZONE_FOG[levelColIdx]*flickerVal;
  const zbuf=new Float32Array(W);

  ctx.fillStyle=ZONE_CEIL_COLOR[levelColIdx];ctx.fillRect(0,0,W,halfH+player.bobAmt*H);
  ctx.fillStyle=ZONE_FLOOR_COLOR[levelColIdx];ctx.fillRect(0,halfH+player.bobAmt*H,W,H);

  const hexToRgb = hex => [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
  const wb = hexToRgb(ZONE_WALL_COLOR[levelColIdx]);

  for(let col=0;col<cols;col++){
    const rayA=player.angle-fov*0.5+fov*(col/cols);
    const cosR=Math.cos(rayA),sinR=Math.sin(rayA);
    let mx=Math.floor(player.x),my=Math.floor(player.y);
    const dDX=Math.abs(1/(cosR||1e-10)),dDY=Math.abs(1/(sinR||1e-10));
    let sX,sY,stepX,stepY;
    if(cosR<0){stepX=-1;sX=(player.x-mx)*dDX;}else{stepX=1;sX=(mx+1-player.x)*dDX;}
    if(sinR<0){stepY=-1;sY=(player.y-my)*dDY;}else{stepY=1;sY=(my+1-player.y)*dDY;}
    let hit=false,side=0,dist=0,cellHit=0;
    for(let i=0;i<80;i++){
      if(sX<sY){sX+=dDX;mx+=stepX;side=0;}else{sY+=dDY;my+=stepY;side=1;}
      if(mx<0||mx>=MAPW||my<0||my>=MAPH){dist=25;break;}
      const c=MAP[my][mx];
      if(c===1){hit=true;cellHit=1;dist=side===0?sX-dDX:sY-dDY;break;}
      if(c===2){hit=true;cellHit=2;dist=side===0?sX-dDX:sY-dDY;break;}
      if(c===3){hit=true;cellHit=3;dist=side===0?sX-dDX:sY-dDY;break;}
    }
    dist*=Math.cos(rayA-player.angle);
    dist=Math.max(0.1,dist);
    const wallH=Math.floor(H/dist);
    const wallTop=halfH-wallH*0.5+player.bobAmt*H;
    const bright=clamp(1-dist*fog,0,1)*flickerVal;
    const shade=side===1?0.6:1.0;
    
    // Default wall
    let r=Math.floor(wb[0]*bright*shade), g=Math.floor(wb[1]*bright*shade), b=Math.floor(wb[2]*bright*shade);
    
    if(cellHit===1){
      ctx.fillStyle=`rgb(${r},${g},${b})`;
      ctx.fillRect(col*colW,wallTop,colW+1,wallH);
    }
    else if(cellHit===2){
      // Door Graphic
      ctx.fillStyle=`rgba(255,140,0,${bright*shade})`;
      ctx.fillRect(col*colW,wallTop,colW+1,wallH);
      ctx.fillStyle=`rgba(50,20,0,${bright})`;
      ctx.fillRect(col*colW,wallTop+wallH*0.1,colW+1,wallH*0.8);
      // Lock detail
      if(col%(Math.floor(cols/10)) === 0) {
        ctx.fillStyle=`rgba(255,255,0,${bright})`;
        ctx.fillRect(col*colW,wallTop+wallH*0.45,colW+2,wallH*0.1);
      }
    }
    else if(cellHit===3){
      // Crate Graphic (Wooden box with metal straps)
      ctx.fillStyle=`rgba(130,80,30,${bright*shade})`;
      ctx.fillRect(col*colW,wallTop+wallH*0.3,colW+1,wallH*0.7); // Crates are shorter
      
      // Straps
      ctx.fillStyle=`rgba(50,50,50,${bright})`;
      ctx.fillRect(col*colW,wallTop+wallH*0.3,colW+1,wallH*0.08); // Top strap
      ctx.fillRect(col*colW,wallTop+wallH*0.92,colW+1,wallH*0.08); // Bottom strap
    }

    const sc=Math.floor(col*colW),ec=Math.min(W-1,Math.floor((col+1)*colW));
    for(let px=sc;px<=ec;px++)zbuf[px]=dist;
  }
  return zbuf;
}

// ── REALISTIC ZOMBIE SPRITES + RIM LIGHTING ──────────────────
function renderSprites(zbuf){
  const fov=Math.PI/3;
  const alive=zombies.filter(z=>z.state!=='dead').map(z=>{
    const dx=z.x-player.x,dy=z.y-player.y;
    return{...z,_dist:Math.sqrt(dx*dx+dy*dy),_dx:dx,_dy:dy};
  }).sort((a,b)=>b._dist-a._dist);

  for(const z of alive){
    let angle=Math.atan2(z._dy,z._dx)-player.angle;
    while(angle>Math.PI)angle-=TWO_PI;while(angle<-Math.PI)angle+=TWO_PI;
    if(Math.abs(angle)>fov*0.72)continue;
    const screenX=Math.floor((0.5+angle/fov)*W);
    const dist=Math.max(0.5,z._dist);
    const size=Math.floor(H/dist);
    const top=Math.floor(H*0.5-size*0.5+player.bobAmt*H);
    const left=Math.floor(screenX-size*0.5);
    if(left+size<0||left>W)continue;
    if(zbuf[clamp(screenX,0,W-1)]<dist-0.1)continue;

    const levelColIdx = Math.min(4, player.currentLevelIdx);
    const fog=ZONE_FOG[levelColIdx];
    const bright=clamp(1-dist*fog,0.08,1);
    ctx.save();
    ctx.globalAlpha=bright;

    const isDying=z.state==='dying';
    const isAttacking=z.state==='attack';
    const flash=z.hitFlash>0;
    if(isDying){ctx.globalAlpha=bright*(z.deathTimer/35);}

    const cw=Math.floor(size*0.58);
    const cx2=screenX;
    const headH=Math.floor(size*0.25);
    const bodyH=Math.floor(size*0.42);
    const legH=Math.floor(size*0.33);
    const legAnim=Math.sin(Date.now()*0.008*(1+z.type))*0.4;
    const armAnim=Math.cos(Date.now()*0.008*(1+z.type))*0.3;

    // Rim Lighting Logic (if player is looking near zombie)
    const isRimLit = Math.abs(angle) < 0.15 && !isDying;
    
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();ctx.ellipse(cx2,top+headH+bodyH+legH+5,cw*0.4,size*0.04,0,0,TWO_PI);ctx.fill();

    // LEGS
    const pantCol=flash?'#ffffff':z.pants;
    ctx.fillStyle=pantCol;
    ctx.fillRect(cx2-cw*0.35+legAnim*size*0.05,top+headH+bodyH-2,cw*0.3,legH);
    ctx.fillRect(cx2+cw*0.05-legAnim*size*0.05,top+headH+bodyH-2,cw*0.3,legH);
    
    // TORSO
    const shirtCol=flash?'#ffaaaa':z.shirt;
    ctx.fillStyle=shirtCol;
    ctx.fillRect(cx2-cw*0.55,top+headH,cw*1.1,bodyH);
    // Rim Light (Body edge)
    if(isRimLit) {
        ctx.strokeStyle = `rgba(200, 255, 255, ${bright})`; ctx.lineWidth = Math.max(1, size*0.02);
        ctx.strokeRect(cx2-cw*0.55,top+headH,cw*1.1,bodyH);
    }
    // Wound
    if(!flash){ ctx.fillStyle='rgba(150,0,0,0.8)'; ctx.fillRect(cx2-cw*0.2,top+headH+bodyH*0.3,cw*0.4,bodyH*0.25); }

    // ARMS
    const skinCol=flash?'#ffffff':z.skin;
    if(isAttacking){
      const sw=Math.sin(Date.now()*0.025)*0.5;
      ctx.fillStyle=shirtCol;
      ctx.fillRect(cx2-cw*0.8,top+headH+size*0.02+sw*size*0.1,cw*0.3,bodyH*0.3);
      ctx.fillRect(cx2+cw*0.5,top+headH+size*0.02-sw*size*0.1,cw*0.3,bodyH*0.3);
      ctx.fillStyle=skinCol;
      ctx.fillRect(cx2-cw*0.8,top+headH+size*0.02+sw*size*0.1+bodyH*0.3,cw*0.25,bodyH*0.4);
      ctx.fillRect(cx2+cw*0.55,top+headH+size*0.02-sw*size*0.1+bodyH*0.3,cw*0.25,bodyH*0.4);
    }else{
      ctx.fillStyle=shirtCol;
      ctx.fillRect(cx2-cw*0.8+armAnim*size*0.03,top+headH+size*0.02,cw*0.3,bodyH*0.3);
      ctx.fillRect(cx2+cw*0.5-armAnim*size*0.03,top+headH+size*0.02,cw*0.3,bodyH*0.3);
      ctx.fillStyle=skinCol;
      ctx.fillRect(cx2-cw*0.8+armAnim*size*0.03,top+headH+size*0.02+bodyH*0.3,cw*0.25,bodyH*0.35);
      ctx.fillRect(cx2+cw*0.55-armAnim*size*0.03,top+headH+size*0.02+bodyH*0.3,cw*0.25,bodyH*0.35);
    }

    // HEAD
    ctx.fillStyle=skinCol;
    ctx.fillRect(cx2-cw*0.35,top,cw*0.7,headH);
    if(isRimLit) {
        ctx.strokeStyle = `rgba(200, 255, 255, ${bright})`; ctx.lineWidth = Math.max(1, size*0.02);
        ctx.strokeRect(cx2-cw*0.35,top,cw*0.7,headH);
    }
    ctx.fillStyle='#111111'; ctx.fillRect(cx2-cw*0.35,top,cw*0.7,headH*0.2); // Hair

    // EYES
    const eyeS=Math.max(2,Math.floor(size*0.08));
    const eyeY=top+headH*0.35;
    if(flash){ctx.fillStyle='#ffffff';}else{
      const eg=ctx.createRadialGradient(cx2-cw*0.15,eyeY,0,cx2-cw*0.15,eyeY,eyeS*2);
      eg.addColorStop(0,z.eyeColor);eg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=eg;ctx.fillRect(cx2-cw*0.3,eyeY-eyeS*1.5,eyeS*4,eyeS*4);
      const eg2=ctx.createRadialGradient(cx2+cw*0.15,eyeY,0,cx2+cw*0.15,eyeY,eyeS*2);
      eg2.addColorStop(0,z.eyeColor);eg2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=eg2;ctx.fillRect(cx2+cw*0.05,eyeY-eyeS*1.5,eyeS*4,eyeS*4);
    }
    ctx.fillStyle=flash?'#ffffff':z.eyeColor;
    ctx.fillRect(cx2-cw*0.2,eyeY,eyeS,eyeS);
    ctx.fillRect(cx2+cw*0.1,eyeY,eyeS,eyeS);

    // HP Bar
    if(dist<8&&z.state!=='dying'){
      const hp=z.hp/z.maxHp;
      const bw2=Math.floor(size*0.85),bx=cx2-bw2*0.5,by2=top-15;
      ctx.fillStyle='#000';ctx.fillRect(bx,by2,bw2,8);
      ctx.fillStyle=hp>0.5?'#00ff00':hp>0.25?'#ffff00':'#ff0000';
      ctx.fillRect(bx+1,by2+1,(bw2-2)*hp,6);
    }
    ctx.restore();
  }
}

// ── MINI-MAP ──────────────────────────────────────────────────
function renderMiniMap() {
  const mapSize = Math.floor(W * 0.15); // 15% of screen width
  const mx = W - mapSize - 14, my = 14;
  const cellSize = mapSize / MAPW;
  
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(mx, my, mapSize, mapSize);
  ctx.strokeStyle = '#00ffff'; ctx.lineWidth=2;
  ctx.strokeRect(mx, my, mapSize, mapSize);

  for(let y=0; y<MAPH; y++){
    for(let x=0; x<MAPW; x++){
      if(MAP[y][x] === 1) {
        ctx.fillStyle = '#004488';
        ctx.fillRect(mx + x*cellSize, my + y*cellSize, cellSize, cellSize);
      } else if (MAP[y][x] === 2) {
        ctx.fillStyle = '#ff8800'; // Door
        ctx.fillRect(mx + x*cellSize, my + y*cellSize, cellSize, cellSize);
      } else if (MAP[y][x] === 3) {
        ctx.fillStyle = '#00ff00'; // Crates
        ctx.fillRect(mx + x*cellSize, my + y*cellSize, cellSize, cellSize);
      }
    }
  }

  // Player
  const px = mx + player.x * cellSize;
  const py = my + player.y * cellSize;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(px, py, cellSize*1.5, 0, TWO_PI); ctx.fill();
  
  // View cone
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px + Math.cos(player.angle - 0.5) * cellSize * 4, py + Math.sin(player.angle - 0.5) * cellSize * 4);
  ctx.lineTo(px + Math.cos(player.angle + 0.5) * cellSize * 4, py + Math.sin(player.angle + 0.5) * cellSize * 4);
  ctx.closePath(); ctx.stroke();
}

  ctx.beginPath();ctx.moveTo(cx,cy-cs);ctx.lineTo(cx,cy-5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy+5);ctx.lineTo(cx,cy+cs);ctx.stroke();

  if(successFlash>0){ctx.fillStyle=`rgba(0,255,0,${successFlash/70*0.4})`;ctx.fillRect(0,0,W,H);successFlash--;}

  renderWeapon();
}

function renderWeapon(){
  const recoilOff=player.recoil*H*0.06;
  const bobOff=player.bobAmt*H*3.5;
  const wY=H*0.54+recoilOff+bobOff;
  ctx.save();

  if(player.weapon===0){
    // ── PISTOL (Redesigned) ──
    const bx=W*0.5+W*0.08,by=wY;
    const bw=W*0.15,bh=H*0.25;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx+6,by+6,bw,bh);
    // Grip
    const gripGrd=ctx.createLinearGradient(bx,by+bh*0.4,bx+bw*0.4,by+bh);
    gripGrd.addColorStop(0,'#333');gripGrd.addColorStop(1,'#050505');
    ctx.fillStyle=gripGrd;ctx.fillRect(bx,by+bh*0.4,bw*0.4,bh*0.6);
    // Trigger guard
    ctx.strokeStyle='#111';ctx.lineWidth=Math.max(2,bw*0.05);
    ctx.beginPath();ctx.arc(bx+bw*0.25,by+bh*0.5,bw*0.12,Math.PI*0.2,Math.PI*1.1,false);ctx.stroke();
    // Barrel/Slide
    const slideGrd=ctx.createLinearGradient(bx+bw*0.1,by,bx+bw*0.1,by+bh*0.3);
    slideGrd.addColorStop(0,'#777');slideGrd.addColorStop(0.5,'#444');slideGrd.addColorStop(1,'#222');
    ctx.fillStyle=slideGrd;ctx.fillRect(bx+bw*0.1,by,bw*0.8,bh*0.3);
    // Detail lines
    ctx.fillStyle='#111';
    for(let i=0;i<4;i++) ctx.fillRect(bx+bw*0.65+i*bw*0.06, by+bh*0.05, bw*0.02, bh*0.2);
    // Sights
    ctx.fillStyle='#00ff00';ctx.fillRect(bx+bw*0.15,by-4,bw*0.05,4); // rear
    ctx.fillRect(bx+bw*0.8,by-4,bw*0.05,4); // front
    // Muzzle flash
    if(player.muzzleFlash>0){
      const mf=player.muzzleFlash/10;ctx.globalAlpha=mf;
      const mg=ctx.createRadialGradient(bx+bw,by+bh*0.15,0,bx+bw,by+bh*0.15,bw*0.6);
      mg.addColorStop(0,'#ffffff');mg.addColorStop(0.3,'#ffff00');mg.addColorStop(1,'rgba(255,0,0,0)');
      ctx.fillStyle=mg;ctx.beginPath();ctx.arc(bx+bw,by+bh*0.15,bw*0.6,0,TWO_PI);ctx.fill();
      ctx.globalAlpha=1;
    }

  }else if(player.weapon===1){
    // ── SHOTGUN (Redesigned) ──
    const bx=W*0.5-W*0.1,by=wY;
    const bw=W*0.45,bh=H*0.3;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx+8,by+8,bw,bh);
    // Stock (Wood)
    const stock=ctx.createLinearGradient(bx,by+bh*0.2,bx+bw*0.25,by+bh);
    stock.addColorStop(0,'#5c2e00');stock.addColorStop(1,'#291400');
    ctx.fillStyle=stock;ctx.fillRect(bx,by+bh*0.2,bw*0.25,bh*0.8);
    // Receiver
    ctx.fillStyle='#222';ctx.fillRect(bx+bw*0.15,by+bh*0.1,bw*0.4,bh*0.4);
    // Barrels (Dual)
    ctx.fillStyle='#444';
    ctx.fillRect(bx+bw*0.2,by,bw*0.8,bh*0.1); // Top barrel
    ctx.fillRect(bx+bw*0.2,by+bh*0.12,bw*0.8,bh*0.1); // Bottom barrel
    // Wood grip under barrel
    ctx.fillStyle=stock;ctx.fillRect(bx+bw*0.2,by+bh*0.24,bw*0.35,bh*0.25);
    // Trigger
    ctx.strokeStyle='#111';ctx.lineWidth=Math.max(2,bh*0.03);
    ctx.beginPath();ctx.arc(bx+bw*0.28,by+bh*0.4,bw*0.08,Math.PI*0.2,Math.PI*0.8,false);ctx.stroke();

    if(player.muzzleFlash>0){
      const mf=player.muzzleFlash/10;ctx.globalAlpha=mf;
      for(let b=0;b<2;b++){
        const my2=by+bh*(b===0?0.05:0.17);
        const mg=ctx.createRadialGradient(bx+bw,my2,0,bx+bw,my2,bw*0.4);
        mg.addColorStop(0,'#ffffff');mg.addColorStop(0.2,'#ff8800');mg.addColorStop(1,'rgba(255,0,0,0)');
        ctx.fillStyle=mg;ctx.beginPath();ctx.arc(bx+bw,my2,bw*0.4,0,TWO_PI);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
  } else if(player.weapon===2){
    // ── ASSAULT RIFLE ──
    const bx=W*0.5-W*0.1,by=wY;
    const bw=W*0.5,bh=H*0.35;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx+8,by+8,bw,bh);
    // Stock (Black Polymer)
    ctx.fillStyle='#1a1a1a';ctx.fillRect(bx,by+bh*0.3,bw*0.2,bh*0.6);
    // Body
    ctx.fillStyle='#2a2a2a';ctx.fillRect(bx+bw*0.15,by+bh*0.2,bw*0.4,bh*0.4);
    // Magazine (Curved)
    ctx.fillStyle='#111';
    ctx.beginPath();
    ctx.moveTo(bx+bw*0.35, by+bh*0.6);
    ctx.lineTo(bx+bw*0.45, by+bh*0.6);
    ctx.lineTo(bx+bw*0.48, by+bh*0.9);
    ctx.lineTo(bx+bw*0.38, by+bh*0.9);
    ctx.fill();
    // Barrel
    ctx.fillStyle='#333';ctx.fillRect(bx+bw*0.55,by+bh*0.25,bw*0.45,bh*0.08);
    // Handguard
    ctx.fillStyle='#1a1a1a';ctx.fillRect(bx+bw*0.55,by+bh*0.22,bw*0.25,bh*0.14);
    // Sight (Red dot)
    ctx.fillStyle='#111';ctx.fillRect(bx+bw*0.3,by+bh*0.1,bw*0.08,bh*0.1);
    ctx.fillStyle='#ff0000';ctx.fillRect(bx+bw*0.36,by+bh*0.12,4,4);

    if(player.muzzleFlash>0){
      const mf=player.muzzleFlash/10;ctx.globalAlpha=mf;
      const mg=ctx.createRadialGradient(bx+bw,by+bh*0.29,0,bx+bw,by+bh*0.29,bw*0.5);
      mg.addColorStop(0,'#ffffff');mg.addColorStop(0.2,'#00ffff');mg.addColorStop(1,'rgba(0,0,255,0)');
      ctx.fillStyle=mg;ctx.beginPath();ctx.arc(bx+bw,by+bh*0.29,bw*0.5,0,TWO_PI);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}

// ── LEVEL UP SCREEN ───────────────────────────────────────────
function renderLevelUp(){
  ctx.fillStyle='rgba(0,0,0,0.95)';ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.shadowColor='#00ffaa';ctx.shadowBlur=30;

  ctx.fillText('STAGE CLEARED!',W*0.5,H*0.4);
  ctx.shadowBlur=0;
  
  ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.floor(H*0.03)}px Courier New`;

    ctx.fillText(`ENTERING: ${LEVELS[player.currentLevelIdx].name}`,W*0.5,H*0.55);
  }
  ctx.restore();
  
  levelUpTimer--;
  if(levelUpTimer<=0){
    if(player.currentLevelIdx >= LEVELS.length) {
      gameState = GS.WIN; winTimer=300;
    } else {
      initLevelMap(); // Build new map
      gameState = GS.GAME;
    }
  }
}

      const by=H*0.444+i*(H*0.1175);

      ctx.fillStyle=borderColors[i];ctx.font=`bold ${Math.floor(H*0.03)}px Courier New`;ctx.textAlign='left';

      ctx.fillStyle='#ffffff';ctx.font=`${Math.floor(H*0.026)}px Courier New`;
      let choiceText=choice;
      while(ctx.measureText(choiceText).width>(bw2-70)&&choiceText.length>4)choiceText=choiceText.slice(0,-1)+'…';
      ctx.fillText(choiceText,bx+52,by+bh*0.65);
      menuBtns.push({x:bx,y:by,w:bw2,h:bh,action:()=>answerQuestion(i)});
    });
  }
  ctx.textAlign='left';
}

function renderSentenceWithUnderline(sentence, targetWord, centerX, startY, maxW, fontSize) {
  ctx.font = `${fontSize}px Courier New`;
  ctx.textAlign = 'left';

  const targetIdx = sentence.indexOf(targetWord);
  if (targetIdx === -1) {
    ctx.textAlign = 'center'; ctx.fillStyle = '#ffffff'; ctx.fillText(sentence, centerX, startY); return;
  }

  const before = sentence.substring(0, targetIdx);
  const target = targetWord;
  const after = sentence.substring(targetIdx + targetWord.length);

  function tokenize(text, isU) {
    return text.split(' ').map((w, i, a) => ({ t: w + (i < a.length - 1 ? ' ' : ''), u: isU }));
  }

  let tokens = [...tokenize(before, false), ...tokenize(target, true), ...tokenize(after, false)].filter(tok => tok.t.length > 0);
  let lines = [], curLine = [], curW = 0;

  tokens.forEach(tok => {
    let tw = ctx.measureText(tok.t).width;
    if (curW + ctx.measureText(tok.t.trim()).width > maxW && curLine.length > 0) { lines.push(curLine); curLine = []; curW = 0; }
    curLine.push(tok); curW += tw;
  });
  if (curLine.length > 0) lines.push(curLine);

  const lineH = fontSize * 1.55;
  lines.forEach((line, li) => {
    const y = startY + li * lineH;
    let lineW = 0;
    line.forEach(tok => lineW += ctx.measureText(tok.t).width);
    let lastTok = line[line.length - 1];
    if (lastTok.t.endsWith(' ')) lineW -= ctx.measureText(' ').width;
    let sx = centerX - lineW * 0.5;

    line.forEach((tok, i) => {
      let textToDraw = tok.t;
      if (i === line.length - 1 && textToDraw.endsWith(' ')) textToDraw = textToDraw.slice(0, -1);
      let drawW = ctx.measureText(textToDraw).width;
      let fullW = ctx.measureText(tok.t).width;

      ctx.fillStyle = tok.u ? '#00ffcc' : '#ffffff';
      ctx.fillText(textToDraw, sx, y);

      if (tok.u) {
        ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = Math.max(2, fontSize * 0.1); ctx.beginPath();
        let underlineW = drawW;
        if (i < line.length - 1 && line[i+1].u && tok.t.endsWith(' ')) underlineW = fullW;
        const underlineY = y + fontSize * 0.2;
        ctx.moveTo(sx, underlineY); ctx.lineTo(sx + underlineW, underlineY); ctx.stroke();
      }
      sx += fullW;
    });
  });
  ctx.textAlign = 'left';
}

    const x=(i/24)*W+(Math.sin(menuAnim*0.9+i*1.1)*18);
    const h=25+Math.sin(menuAnim*0.65+i*0.85)*22+Math.cos(i*1.4)*12;
    ctx.fillStyle=`rgba(0,255,100,${0.25+Math.sin(menuAnim+i*0.55)*0.18})`;
    ctx.fillRect(x,0,4,h);
  }
  ctx.save();
  ctx.shadowColor='#00ffff';ctx.shadowBlur=28;
  ctx.fillStyle='#00ffff';ctx.font=`bold ${Math.floor(H*0.072)}px Courier New`;ctx.textAlign='center';
  ctx.fillText('GRAMMAR ESCAPE',W*0.5,H*0.2);
  ctx.shadowColor='#ff00ff';
  ctx.fillStyle='#ff00ff';ctx.font=`bold ${Math.floor(H*0.046)}px Courier New`;
  ctx.fillText('ULTIMATE EDITION',W*0.5,H*0.285);
  ctx.restore();

  const hasSave = localStorage.getItem('ge_save_v2') !== null;
  const btns=[];
  if(hasSave) btns.push({label:'▶ CONTINUE GAME',action:()=> { if(loadGameProgress()){ initLevelMap(); gameState=GS.GAME;} else startGame(); }});
  btns.push({label: hasSave ? '↻ NEW GAME' : '▶ START GAME',action:()=>{ clearSave(); startGame(); }});
  btns.push({label:'⚙ SETTINGS',action:()=>{ prevGameState=GS.MENU; gameState=GS.SETTINGS; }});

  btns.forEach((b,i)=>{
    const bx=W*0.5-160,by=H*0.42+i*82,bw2=320,bh=58;
    ctx.fillStyle='rgba(0,50,100,0.75)';ctx.fillRect(bx,by,bw2,bh);
    ctx.strokeStyle='#00ffff';ctx.lineWidth=3;ctx.strokeRect(bx,by,bw2,bh);
    ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.floor(H*0.029)}px Courier New`;ctx.textAlign='center';
    ctx.fillText(b.label,W*0.5,by+bh*0.65);
    menuBtns.push({x:bx,y:by,w:bw2,h:bh,action:b.action});
  });
  ctx.textAlign='left';
}

  const items=[
    {label:'SENSITIVITY',value:cfg.sensitivity.toFixed(1),up:()=>{cfg.sensitivity=Math.min(5,+(cfg.sensitivity+0.1).toFixed(1));saveSettings();},dn:()=>{cfg.sensitivity=Math.max(0.5,+(cfg.sensitivity-0.1).toFixed(1));saveSettings();}},
    {label:'SOUND',value:cfg.soundOn?'ON':'OFF',up:()=>{cfg.soundOn=!cfg.soundOn;saveSettings();},dn:()=>{cfg.soundOn=!cfg.soundOn;saveSettings();}},

  ctx.textAlign='left';
}

function renderPaused(){
  menuBtns=[];
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#00ffff';ctx.font=`bold ${Math.floor(H*0.065)}px Courier New`;ctx.textAlign='center';

  const btns=[

function renderDead(){
  const t=1-(deathTimer/200);
  ctx.fillStyle=`rgba(255,0,0,${t*0.6})`;ctx.fillRect(0,0,W,H);
  deathTimer--;
  if(deathTimer<=0){
    if(player.revives>0){
      player.revives--; player.hp=100;
      initLevelMap(); // Restart level geometry
      gameState=GS.GAME;successFlash=60;
    }else{
      clearSave();
      gameState=GS.GAMEOVER;
    }
  }
}

// ── MOBILE CONTROLS ──────────────────────────────────────────
function renderMobileControls(){
  if(!('ontouchstart' in window)&&!navigator.maxTouchPoints)return;
  updateBtnPositions();
  const a=cfg.ctrlOpacity;
  ctx.save();ctx.globalAlpha=a;

  const jx=touch.lActive?touch.lox:W*0.14,jy=touch.lActive?touch.loy:H-128;
  ctx.strokeStyle='rgba(0,255,255,0.5)';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(jx,jy,touch.joyR,0,TWO_PI);ctx.stroke();
  if(touch.lActive){
    const kx=jx+touch.lx*touch.joyR,ky=jy+touch.ly*touch.joyR;
    ctx.fillStyle='rgba(0,255,255,0.5)';ctx.beginPath();ctx.arc(kx,ky,24,0,TWO_PI);ctx.fill();
  }else{
    ctx.fillStyle='rgba(0,255,255,0.2)';ctx.beginPath();ctx.arc(jx,jy,22,0,TWO_PI);ctx.fill();
  }

  const fg=ctx.createRadialGradient(BTN.fire.x,BTN.fire.y,0,BTN.fire.x,BTN.fire.y,BTN.fire.r);
  fg.addColorStop(0,'rgba(255,0,0,0.8)');fg.addColorStop(1,'rgba(100,0,0,0.6)');
  ctx.fillStyle=fg;ctx.beginPath();ctx.arc(BTN.fire.x,BTN.fire.y,BTN.fire.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#ffaaaa';ctx.lineWidth=3;ctx.beginPath();ctx.arc(BTN.fire.x,BTN.fire.y,BTN.fire.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.floor(H*0.022)}px Courier New`;ctx.textAlign='center';
  ctx.fillText('FIRE',BTN.fire.x,BTN.fire.y+7);

  ctx.fillStyle='rgba(0,100,255,0.6)';ctx.beginPath();ctx.arc(BTN.reload.x,BTN.reload.y,BTN.reload.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#00ffff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(BTN.reload.x,BTN.reload.y,BTN.reload.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`${Math.floor(H*0.016)}px Courier New`;
  ctx.fillText('RLD',BTN.reload.x,BTN.reload.y+6);

  ctx.fillStyle='rgba(100,0,255,0.6)';ctx.beginPath();ctx.arc(BTN.weapon.x,BTN.weapon.y,BTN.weapon.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#ff00ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(BTN.weapon.x,BTN.weapon.y,BTN.weapon.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`${Math.floor(H*0.015)}px Courier New`;
  ctx.fillText('WPN',BTN.weapon.x,BTN.weapon.y+5);

  ctx.fillStyle='rgba(50,50,50,0.8)';ctx.beginPath();ctx.arc(BTN.pause.x,BTN.pause.y,BTN.pause.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(BTN.pause.x,BTN.pause.y,BTN.pause.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`bold 16px Courier New`;ctx.fillText('II',BTN.pause.x,BTN.pause.y+6);
  
  if(interactTarget!==null){
    ctx.fillStyle='rgba(0,255,100,0.6)';ctx.beginPath();ctx.arc(BTN.interact.x,BTN.interact.y,BTN.interact.r,0,TWO_PI);ctx.fill();
    ctx.strokeStyle='#00ff00';ctx.lineWidth=3;ctx.beginPath();ctx.arc(BTN.interact.x,BTN.interact.y,BTN.interact.r,0,TWO_PI);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font=`bold 16px Courier New`;ctx.textAlign='center';
    ctx.fillText('OPEN',BTN.interact.x,BTN.interact.y+6);
  }

  ctx.textAlign='left';
  ctx.restore();
}

function togglePause(){
  if(gameState===GS.GAME) { gameState=GS.PAUSED; saveGameProgress(); } // Auto-save on pause
  else if(gameState===GS.PAUSED)gameState=GS.GAME;
}
document.addEventListener('keydown',e=>{if(e.code==='Escape')togglePause();});

function startGame(){
  player.currentLevelIdx=0;
  player.hp=100;player.xp=0;player.level=1;player.kills=0;
  player.weaponsUnlocked = 1;
  player.ammo=[18,6,30];player.reloading=false;player.reloadTimer=0;
  player.muzzleFlash=0;player.recoil=0;player.recoilY=0;
  player.bobAmt=0;player.bobPhase=0;player.weapon=0;
  player.stepTimer=0;player.revives=3;
  score=0;gameTime=0;
  shakeX=0;shakeY=0;shakeTimer=0;
  dmgFlash=0;successFlash=0;
  usedQuestions=[];currentQuestion=null;
  particles=[];interactTarget=null;
  flickerTimer=10;flickerVal=1;
  
  initLevelMap(); // Builds the dynamic stage

  deathTimer=0;winTimer=0;
  gameState=GS.GAME;
  saveGameProgress();
}

// ── MAIN LOOP ────────────────────────────────────────────────
let lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,(ts-lastTime)/16.67);lastTime=ts;
  ctx.save();
  if(shakeTimer>0){ctx.translate((Math.random()-0.5)*shakeX,(Math.random()-0.5)*shakeY);}

  switch(gameState){
    case GS.MENU:renderMenu();break;
    case GS.SETTINGS:renderSettings();break;
    case GS.GAME:
      updatePlayer();updateZombies();updateParticles();updateShake();checkWin();gameTime++;
      {const zb=raycast();renderSprites(zb);}
      renderFlashlight();
      renderHUD();renderMobileControls();
      break;
    case GS.QUESTION:
      {const zb=raycast();renderSprites(zb);}
      renderFlashlight();
      renderQuestion();
      break;
    case GS.LEVEL_UP:
      {const zb=raycast();renderSprites(zb);}
      renderLevelUp();
      break;
    case GS.PAUSED:
      {const zb=raycast();renderSprites(zb);}
      renderFlashlight();
      renderPaused();renderMobileControls();
      break;
    case GS.DEAD:
      {const zb=raycast();renderSprites(zb);}
      renderDead();
      break;
    case GS.GAMEOVER:renderGameOver();break;
    case GS.WIN:winTimer--;renderWin();break;
  }
  ctx.restore();
}

let pointerLocked=false;
document.addEventListener('pointerlockchange',()=>{pointerLocked=!!document.pointerLockElement;});
canvas.addEventListener('click',()=>{if(gameState===GS.GAME&&!('ontouchstart' in window))canvas.requestPointerLock();});
document.addEventListener('mousemove',e=>{if(gameState===GS.GAME&&pointerLocked)player.angle+=e.movementX*cfg.sensitivity*0.003;});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&gameState===GS.GAME&&pointerLocked)doShoot();
  if(e.button===2&&gameState===GS.GAME&&pointerLocked)doReload();
});
document.addEventListener('contextmenu',e=>e.preventDefault());

canvas.addEventListener('touchstart',()=>unlockAC(),{once:true,passive:true});
requestAnimationFrame(loop);
</script>
