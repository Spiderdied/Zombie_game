// ── AUDIO ─────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function unlockAC(){if(AC.state==='suspended')AC.resume();}
function playSound(type){
  if(!cfg.soundOn)return;
  try{
    const g=AC.createGain();g.connect(AC.destination);
    if(type==='shoot'){
      const b=AC.createBufferSource();
      const buf=AC.createBuffer(1,AC.sampleRate*0.12,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.04));
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.6,AC.currentTime);b.start();
    }else if(type==='shotgun'){
      const b=AC.createBufferSource();
      const buf=AC.createBuffer(1,AC.sampleRate*0.28,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.09))*1.6;
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.95,AC.currentTime);b.start();
    }else if(type==='zombie'){
      const o=AC.createOscillator();o.type='sawtooth';
      o.frequency.setValueAtTime(70+Math.random()*50,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(35,AC.currentTime+0.5);
      o.connect(g);g.gain.setValueAtTime(0.18,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.55);
      o.start();o.stop(AC.currentTime+0.55);
    }else if(type==='step'){
      const b=AC.createBufferSource();
      const buf=AC.createBuffer(1,AC.sampleRate*0.07,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.022))*0.35;
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.22,AC.currentTime);b.start();
    }else if(type==='reload'){
      const o=AC.createOscillator();o.type='square';o.frequency.value=280;
      o.connect(g);g.gain.setValueAtTime(0.12,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.18);
      o.start();o.stop(AC.currentTime+0.18);
    }else if(type==='hit'){
      const b=AC.createBufferSource();
      const buf=AC.createBuffer(1,AC.sampleRate*0.12,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.035));
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.45,AC.currentTime);b.start();
    }else if(type==='beep'){
      const o=AC.createOscillator();o.type='sine';o.frequency.value=900;
      o.connect(g);g.gain.setValueAtTime(0.15,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
      o.start();o.stop(AC.currentTime+0.1);
    }else if(type==='wrong'){
      const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=110;
      o.connect(g);g.gain.setValueAtTime(0.35,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.35);
      o.start();o.stop(AC.currentTime+0.35);
    }else if(type==='checkpoint'){
      const o=AC.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(440,AC.currentTime);
      o.frequency.setValueAtTime(660,AC.currentTime+0.1);
      o.frequency.setValueAtTime(880,AC.currentTime+0.2);
      o.connect(g);g.gain.setValueAtTime(0.2,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.4);
      o.start();o.stop(AC.currentTime+0.4);
    }
  }catch(e){}
}

// ── COLLISION HELPERS ─────────────────────────────────────────
function cellSolid(mx,my){
  if(mx<0||mx>=MAPW||my<0||my>=MAPH)return true;
  const c=MAP[my][mx];
  if(c===1)return true;
  if(c===2){const gi=getGateIdx(mx,my);return gi>=0&&!gatesUnlocked[gi];}
  if(c===3&&!openedCrates.has(mx+','+my))return true;
  return false;
}
function getGateIdx(mx,my){
  if(mx===4&&my===11)return 0;
  if(mx===36&&my===11)return 1;
  if(mx===19&&my===19)return 2;
  if(mx===19&&my===20)return 3;
  return -1;
}
function isWall(x,y){return cellSolid(Math.floor(x),Math.floor(y));}

// Swept circle collision for player
function tryMovePlayer(nx,ny){
  const r=0.28;
  const ox=player.x,oy=player.y;
  // Try full move
  if(!circleBlockedAt(nx,ny,r)){player.x=nx;player.y=ny;return;}
  // Try slide X
  if(!circleBlockedAt(nx,oy,r)){player.x=nx;return;}
  // Try slide Y
  if(!circleBlockedAt(ox,ny,r)){player.y=ny;return;}
}
function circleBlockedAt(cx,cy,r){
  const x0=Math.floor(cx-r),x1=Math.floor(cx+r);
  const y0=Math.floor(cy-r),y1=Math.floor(cy+r);
  for(let ty=y0;ty<=y1;ty++)for(let tx=x0;tx<=x1;tx++){
    if(!cellSolid(tx,ty))continue;
    // AABB vs circle
    const nearX=Math.max(tx,Math.min(tx+1,cx));
    const nearY=Math.max(ty,Math.min(ty+1,cy));
    const dx=cx-nearX,dy=cy-nearY;
    if(dx*dx+dy*dy<r*r)return true;
  }
  return false;
}

// Zombie collision: circle vs cells
function moveZombieCollide(z,nx,ny){
  const r=z.radius||0.35;
  if(!circleBlockedAt(nx,ny,r)){z.x=nx;z.y=ny;return;}
  if(!circleBlockedAt(nx,z.y,r)){z.x=nx;return;}
  if(!circleBlockedAt(z.x,ny,r)){z.y=ny;return;}
  // Bounce angle
  z.angle+=Math.PI*(0.5+Math.random()*0.5);
}

// ── TOUCH ─────────────────────────────────────────────────────
const touch={lx:0,ly:0,rx:0,ry:0,lActive:false,rActive:false,lId:-1,rId:-1,lox:0,loy:0,rox:0,roy:0,joyR:60};
canvas.addEventListener('touchstart',e=>{
  unlockAC();e.preventDefault();
  for(const t of e.changedTouches){
    if(checkBtnTouch(t.clientX,t.clientY))continue;
    if(t.clientX<W*0.5&&!touch.lActive){
      touch.lActive=true;touch.lId=t.identifier;
      touch.lox=t.clientX;touch.loy=t.clientY;touch.lx=0;touch.ly=0;
    }else if(t.clientX>=W*0.5&&!touch.rActive){
      touch.rActive=true;touch.rId=t.identifier;
      touch.rox=t.clientX;touch.roy=t.clientY;touch.rx=0;touch.ry=0;
    }
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touch.lId){
      const dx=t.clientX-touch.lox,dy=t.clientY-touch.loy;
      touch.lx=Math.max(-1,Math.min(1,dx/touch.joyR));
      touch.ly=Math.max(-1,Math.min(1,dy/touch.joyR));
    }else if(t.identifier===touch.rId){
      const dx=t.clientX-touch.rox,dy=t.clientY-touch.roy;
      touch.rx=Math.max(-1,Math.min(1,dx/touch.joyR));
      touch.ry=Math.max(-1,Math.min(1,dy/touch.joyR));
      touch.rox=t.clientX;touch.roy=t.clientY;
    }
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touch.lId){touch.lActive=false;touch.lId=-1;touch.lx=0;touch.ly=0;}
    if(t.identifier===touch.rId){touch.rActive=false;touch.rId=-1;touch.rx=0;touch.ry=0;}
  }
},{passive:false});

  BTN.pause.x=W-42;BTN.pause.y=52;
  BTN.weapon.x=W-195;BTN.weapon.y=H-185;
}
function checkBtnTouch(bx,by){
  if(gameState===GS.GAME||gameState===GS.PAUSED){
    if(d2(bx,by,BTN.fire.x,BTN.fire.y)<BTN.fire.r*BTN.fire.r){if(gameState===GS.GAME)doShoot();return true;}
    if(d2(bx,by,BTN.reload.x,BTN.reload.y)<BTN.reload.r*BTN.reload.r){if(gameState===GS.GAME)doReload();return true;}
    if(d2(bx,by,BTN.pause.x,BTN.pause.y)<BTN.pause.r*BTN.pause.r){togglePause();return true;}
    if(d2(bx,by,BTN.weapon.x,BTN.weapon.y)<BTN.weapon.r*BTN.weapon.r){if(gameState===GS.GAME){player.weapon=1-player.weapon;playSound('reload');}return true;}
  }
  return false;
}
function d2(x1,y1,x2,y2){return(x1-x2)**2+(y1-y2)**2;}

let menuBtns=[];
function handleClick(cx,cy){
  for(const b of menuBtns){
    if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){playSound('beep');b.action();return;}
  }

    for(let i=0;i<currentQuestion.c.length;i++){
      const by=H*0.44+i*(H*0.112);
      const bx=W*0.06;const bw=W*0.88;const bh=H*0.096;
      if(cx>=bx&&cx<=bx+bw&&cy>=by&&cy<=by+bh){answerQuestion(i);return;}

}

// ── SHOOT ────────────────────────────────────────────────────
function doShoot(){
  if(player.reloading)return;
  if(player.ammo[player.weapon]<=0){triggerQuestion('ammo');return;}
  player.ammo[player.weapon]--;
  player.muzzleFlash=10;
  player.recoil=0.18;player.recoilY=0.12;
  playSound(player.weapon===0?'shoot':'shotgun');
  shakeTimer=10;shakeX=player.weapon===0?4:9;shakeY=player.weapon===0?4:9;
  const shots=WEAPON_SHOTS[player.weapon];
  const range=WEAPON_RANGE[player.weapon];
  for(let s=0;s<shots;s++){
    const spread=(Math.random()-0.5)*WEAPON_SPREAD[player.weapon];
    const angle=player.angle+spread;
    let hitZ=null,hitDist=Infinity;
    for(const z of zombies){
      if(z.state==='dead'||z.state==='dying')continue;
      const dx=z.x-player.x,dy=z.y-player.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>range)continue;
      const za=Math.atan2(dy,dx);
      let da=za-angle;
      while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
      const hitAngle=Math.atan2(z.radius,dist);
      if(Math.abs(da)<hitAngle+0.05&&dist<hitDist){hitDist=dist;hitZ=z;}
    }
    if(hitZ){
      const dmg=WEAPON_DAMAGE[player.weapon]/shots;
      hitZ.hp-=dmg;hitZ.hitFlash=10;
      spawnBloodParticles(hitZ.x,hitZ.y,7);
      if(hitZ.hp<=0&&hitZ.state!=='dead'&&hitZ.state!=='dying'){
        hitZ.state='dying';hitZ.deathTimer=35;
        player.kills++;
        const xp=ZOMBIE_TYPES[hitZ.type].score;
        player.xp+=xp;score+=xp;
        checkLevelUp();playSound('zombie');
      }else if(hitZ.state!=='dying'){hitZ.state='chase';}
    }
  }
  spawnMuzzleParticles();
}
function doReload(){
  if(player.reloading)return;
  if(player.ammo[player.weapon]===player.maxAmmo[player.weapon])return;
  player.reloading=true;
  player.reloadTimer=Math.round(WEAPON_RELOAD_TIME[player.weapon]*60);
  playSound('reload');
}
function checkLevelUp(){
  const needed=player.level*200;
  if(player.xp>=needed){player.level++;player.xp-=needed;player.hp=Math.min(player.maxHp,player.hp+25);successFlash=40;}
}

// ── QUESTIONS ────────────────────────────────────────────────
function triggerQuestion(trigger){
  if(gameState!==GS.GAME)return;
  const pool=QUESTIONS.filter((_,i)=>!usedQuestions.includes(i));
  if(pool.length===0){usedQuestions=[];}
  const avail=QUESTIONS.filter((_,i)=>!usedQuestions.includes(i));
  const q=avail[Math.floor(Math.random()*avail.length)];
  const idx=QUESTIONS.indexOf(q);
  currentQuestion=q;usedQuestions.push(idx);
  questionTrigger=trigger;
  gameState=GS.QUESTION;
  playSound('beep');
}
function answerQuestion(choice){
  if(!currentQuestion)return;
  if(choice===currentQuestion.a){
    playSound('beep');successFlash=70;
    const reward=player.weapon===0?6:3;
    player.ammo[player.weapon]=Math.min(player.maxAmmo[player.weapon],player.ammo[player.weapon]+reward);
    player.xp+=50;score+=100;checkLevelUp();
    let nearest=null,nd=Infinity;
    for(const z of zombies){
      if(z.state!=='dead'&&z.state!=='dying'){
        const dist=Math.hypot(z.x-player.x,z.y-player.y);
        if(dist<nd){nd=dist;nearest=z;}
      }
    }
    if(nearest&&nd<9){nearest.hp=0;nearest.state='dying';nearest.deathTimer=35;player.kills++;spawnBloodParticles(nearest.x,nearest.y,12);}
    if(questionTrigger==='gate'&&typeof interactTarget==='number'&&interactTarget>=0)gatesUnlocked[interactTarget]=true;
    gameState=GS.GAME;
  }else{
    playSound('wrong');dmgFlash=50;
    player.hp-=15;
    shakeTimer=22;shakeX=10;shakeY=10;
    for(const z of zombies){
      if(z.state==='roam'&&Math.hypot(z.x-player.x,z.y-player.y)<14)z.state='chase';
    }
    if(player.hp<=0){gameState=GS.DEAD;deathTimer=200;}
    else gameState=GS.GAME;
  }
  currentQuestion=null;
}

// ── PARTICLES ────────────────────────────────────────────────
function spawnBloodParticles(x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=0.02+Math.random()*0.05;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:35+Math.random()*35,type:'blood',r:0.07+Math.random()*0.09});
  }
}
function spawnMuzzleParticles(){
  const a=player.angle;
  for(let i=0;i<8;i++){
    const sa=a+(Math.random()-0.5)*0.45;const sp=0.07+Math.random()*0.06;
    particles.push({x:player.x+Math.cos(a)*0.5,y:player.y+Math.sin(a)*0.5,vx:Math.cos(sa)*sp,vy:Math.sin(sa)*sp,life:14,type:'muzzle'});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)particles.splice(i,1);
  }
}

// ── ZOMBIE AI (improved) ──────────────────────────────────────
function updateZombies(){
  // Compute separation forces first
  for(let i=0;i<zombies.length;i++){
    zombies[i].separationX=0;zombies[i].separationY=0;
    for(let j=0;j<zombies.length;j++){
      if(i===j)continue;
      const zi=zombies[i],zj=zombies[j];
      if(zi.state==='dead'||zj.state==='dead')continue;
      const dx=zi.x-zj.x,dy=zi.y-zj.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minDist=(zi.radius||0.35)+(zj.radius||0.35)+0.1;
      if(dist<minDist&&dist>0.001){
        const force=(minDist-dist)/minDist*0.015;
        zombies[i].separationX+=dx/dist*force;
        zombies[i].separationY+=dy/dist*force;
      }
    }
  }

  for(const z of zombies){
    if(z.state==='dead')continue;
    if(z.state==='dying'){z.deathTimer--;if(z.deathTimer<=0)z.state='dead';continue;}
    if(z.hitFlash>0)z.hitFlash--;

    const dx=player.x-z.x,dy=player.y-z.y;
    const distToPlayer=Math.sqrt(dx*dx+dy*dy);

    // Apply separation
    const nx0=z.x+z.separationX,ny0=z.y+z.separationY;
    if(!circleBlockedAt(nx0,ny0,z.radius)){z.x=nx0;z.y=ny0;}

    if(z.state==='roam'){
      if(distToPlayer<z.alertRadius){z.state='chase';playSound('zombie');}
      z.roamTimer--;
      if(z.roamTimer<=0){z.angle=Math.random()*Math.PI*2;z.roamTimer=70+Math.random()*130;}
      const spd=z.speed;
      const nx=z.x+Math.cos(z.angle)*spd,ny=z.y+Math.sin(z.angle)*spd;
      if(!circleBlockedAt(nx,ny,z.radius)){z.x=nx;z.y=ny;}
      else{z.angle+=Math.PI*(0.4+Math.random()*0.6);z.roamTimer=15;}
    }else if(z.state==='chase'){
      if(distToPlayer>z.alertRadius*2.2)z.state='roam';
      const attackDist=(z.radius||0.35)+0.55;
      if(distToPlayer<attackDist){z.state='attack';z.attackTimer=45;}
      else{
        const spd=z.speed*1.6;
        const ta=Math.atan2(dy,dx);
        // Try direct
        const nx=z.x+Math.cos(ta)*spd,ny=z.y+Math.sin(ta)*spd;
        if(!circleBlockedAt(nx,ny,z.radius)){z.x=nx;z.y=ny;}
        else{
          // Try slight left/right
          let moved=false;
          for(const offset of[0.4,-0.4,0.8,-0.8,1.2,-1.2]){
            const a2=ta+offset;
            const nx2=z.x+Math.cos(a2)*spd,ny2=z.y+Math.sin(a2)*spd;
            if(!circleBlockedAt(nx2,ny2,z.radius)){z.x=nx2;z.y=ny2;z.angle=a2;moved=true;break;}
          }
          if(!moved)z.angle=ta+Math.PI*(0.5+Math.random()*0.5);
        }
        z.angle=ta;
      }
    }else if(z.state==='attack'){
      z.attackTimer--;
      if(z.attackTimer<=0){
        const ad=(z.radius||0.35)+0.65;
        if(distToPlayer<ad){
          player.hp-=z.dmg;dmgFlash=35;
          shakeTimer=18;shakeX=8;shakeY=8;
          playSound('hit');
          if(player.hp<=0){gameState=GS.DEAD;deathTimer=200;}
        }
        z.attackTimer=65;
      }
      if(distToPlayer>((z.radius||0.35)+1.3))z.state='chase';
    }
  }
}

// ── PLAYER UPDATE ─────────────────────────────────────────────
function updatePlayer(){
  if(gameState!==GS.GAME)return;
  if(player.reloading){
    player.reloadTimer--;
    if(player.reloadTimer<=0){player.reloading=false;player.ammo[player.weapon]=player.maxAmmo[player.weapon];playSound('beep');}
  }
  if(player.muzzleFlash>0)player.muzzleFlash--;
  if(player.recoil>0)player.recoil*=0.75;else player.recoil=0;
  if(player.recoilY>0)player.recoilY*=0.75;else player.recoilY=0;

  const spd=player.moveSpeed;
  let moved=false;
  if(keys['KeyW']||keys['ArrowUp']){tryMovePlayer(player.x+Math.cos(player.angle)*spd,player.y+Math.sin(player.angle)*spd);moved=true;}
  if(keys['KeyS']||keys['ArrowDown']){tryMovePlayer(player.x-Math.cos(player.angle)*spd,player.y-Math.sin(player.angle)*spd);moved=true;}
  if(keys['KeyA']){player.angle-=player.turnSpeed;}
  if(keys['KeyD']||keys['ArrowRight']){player.angle+=player.turnSpeed;}
  if(keys['ArrowLeft']){player.angle-=player.turnSpeed;}
  if(keys['Space']&&!keys['_sl']){doShoot();}keys['_sl']=keys['Space'];
  if(keys['KeyR'])doReload();
  if(keys['KeyE']&&!keys['_el']){checkInteract();}keys['_el']=keys['KeyE'];

  if(touch.lActive){
    const fw=-touch.ly*spd,st=touch.lx*spd;
    const nx=player.x+Math.cos(player.angle)*fw+Math.cos(player.angle+Math.PI/2)*st;
    const ny=player.y+Math.sin(player.angle)*fw+Math.sin(player.angle+Math.PI/2)*st;
    tryMovePlayer(nx,ny);
    if(Math.abs(touch.lx)>0.1||Math.abs(touch.ly)>0.1)moved=true;
  }
  if(touch.rActive){player.angle+=touch.rx*cfg.sensitivity*0.045;touch.rx=0;}

  if(moved){player.bobPhase+=0.16;player.bobAmt=Math.sin(player.bobPhase)*0.014;}
  else{player.bobAmt*=0.82;}
  if(moved){player.stepTimer++;if(player.stepTimer%20===0)playSound('step');}

  player.zone=getZone(Math.floor(player.x),Math.floor(player.y));

  // Checkpoint detection
  CHECKPOINTS.forEach((cp,i)=>{
    if(i>player.checkpointIdx&&Math.hypot(player.x-cp.x,player.y-cp.y)<2.5){
      player.checkpointIdx=i;
      checkpointFlash=180;checkpointLabel=cp.label;
      playSound('checkpoint');
    }
  });

  // Interact check
  interactTarget=null;
  const fx=Math.floor(player.x+Math.cos(player.angle)*1.3);
  const fy=Math.floor(player.y+Math.sin(player.angle)*1.3);
  if(fx>=0&&fx<MAPW&&fy>=0&&fy<MAPH){
    const cell=MAP[fy][fx];
    if(cell===2){const gi=getGateIdx(fx,fy);if(gi>=0&&!gatesUnlocked[gi])interactTarget=gi;}
    if(cell===3&&!openedCrates.has(fx+','+fy))interactTarget='crate:'+fx+','+fy;
  }

  // Flicker effect
  flickerTimer--;
  if(flickerTimer<=0){
    flickerTimer=Math.floor(3+Math.random()*30);
    flickerVal=0.85+Math.random()*0.15;
    if(Math.random()<0.05)flickerVal=0.4+Math.random()*0.3;
  }
}

function checkInteract(){
  if(interactTarget===null)return;
  if(typeof interactTarget==='number'){triggerQuestion('gate');}
  else if(typeof interactTarget==='string'&&interactTarget.startsWith('crate:')){
    const key=interactTarget.substring(6);
    openedCrates.add(key);
    const [cx,cy]=key.split(',').map(Number);MAP[cy][cx]=0;
    if(Math.random()<0.5)triggerQuestion('crate');
    else{player.ammo[player.weapon]=Math.min(player.maxAmmo[player.weapon],player.ammo[player.weapon]+Math.ceil(player.maxAmmo[player.weapon]/2));playSound('beep');}
  }
}

function updateShake(){if(shakeTimer>0)shakeTimer--;}

function checkWin(){
  if(player.kills>=15&&player.zone===3&&gameState===GS.GAME){gameState=GS.WIN;winTimer=300;}
}

// ── RAYCASTING ────────────────────────────────────────────────
const TWO_PI=Math.PI*2;
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

function raycast(){
  const fov=Math.PI/3;
  const cols=cfg.quality===0?Math.floor(W/4):cfg.quality===1?Math.floor(W/2):W;
  const colW=W/cols;
  const halfH=H/2;
  const fog=ZONE_FOG[player.zone]*flickerVal;
  const zone=player.zone;
  const zbuf=new Float32Array(W);

  ctx.fillStyle=ZONE_CEIL_COLOR[zone];ctx.fillRect(0,0,W,halfH+player.bobAmt*H);
  ctx.fillStyle=ZONE_FLOOR_COLOR[zone];ctx.fillRect(0,halfH+player.bobAmt*H,W,H);

  // Zone-specific wall base colors (R,G,B)
  const wallBase=[[55,35,10],[10,55,30],[8,8,70],[48,48,48]];
  const gateBase=[120,90,0];
  const crateBase=[80,55,15];
  const wb=wallBase[zone];

  for(let col=0;col<cols;col++){
    const rayA=player.angle-fov*0.5+fov*(col/cols);
    const cosR=Math.cos(rayA),sinR=Math.sin(rayA);
    let mx=Math.floor(player.x),my=Math.floor(player.y);
    const dDX=Math.abs(1/(cosR||1e-10)),dDY=Math.abs(1/(sinR||1e-10));
    let sX,sY,stepX,stepY;
    if(cosR<0){stepX=-1;sX=(player.x-mx)*dDX;}else{stepX=1;sX=(mx+1-player.x)*dDX;}
    if(sinR<0){stepY=-1;sY=(player.y-my)*dDY;}else{stepY=1;sY=(my+1-player.y)*dDY;}
    let hit=false,side=0,dist=0,cellHit=0;
    for(let i=0;i<80;i++){
      if(sX<sY){sX+=dDX;mx+=stepX;side=0;}else{sY+=dDY;my+=stepY;side=1;}
      if(mx<0||mx>=MAPW||my<0||my>=MAPH){dist=25;break;}
      const c=MAP[my][mx];
      if(c===1){hit=true;cellHit=1;dist=side===0?sX-dDX:sY-dDY;break;}
      if(c===2){const gi=getGateIdx(mx,my);if(gi>=0&&!gatesUnlocked[gi]){hit=true;cellHit=2;dist=side===0?sX-dDX:sY-dDY;break;}}
      if(c===3&&!openedCrates.has(mx+','+my)){hit=true;cellHit=3;dist=side===0?sX-dDX:sY-dDY;break;}
    }
    dist*=Math.cos(rayA-player.angle);
    dist=Math.max(0.1,dist);
    const wallH=Math.floor(H/dist);
    const wallTop=halfH-wallH*0.5+player.bobAmt*H;
    const bright=clamp(1-dist*fog,0,1)*flickerVal;
    const shade=side===1?0.6:1.0;
    let r=wb[0],g=wb[1],b=wb[2];
    if(cellHit===2){r=gateBase[0];g=gateBase[1];b=gateBase[2];}
    else if(cellHit===3){r=crateBase[0];g=crateBase[1];b=crateBase[2];}
    r=Math.floor(r*bright*shade);g=Math.floor(g*bright*shade);b=Math.floor(b*bright*shade);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(col*colW,wallTop,colW+1,wallH);

    // Gate/crate accent stripe
    if(cellHit===2){
      ctx.fillStyle=`rgba(220,160,0,${bright*0.5})`;
      ctx.fillRect(col*colW,wallTop+wallH*0.1,colW+1,wallH*0.08);
      ctx.fillRect(col*colW,wallTop+wallH*0.82,colW+1,wallH*0.08);
    }else if(cellHit===3){
      ctx.fillStyle=`rgba(200,140,0,${bright*0.4})`;
      ctx.fillRect(col*colW,wallTop,colW+1,wallH*0.06);
    }

    const sc=Math.floor(col*colW),ec=Math.min(W-1,Math.floor((col+1)*colW));
    for(let px=sc;px<=ec;px++)zbuf[px]=dist;
  }
  return zbuf;
}

// ── SPRITES ──────────────────────────────────────────────────
function renderSprites(zbuf){
  const fov=Math.PI/3;
  const alive=zombies.filter(z=>z.state!=='dead').map(z=>{
    const dx=z.x-player.x,dy=z.y-player.y;
    return{...z,_dist:Math.sqrt(dx*dx+dy*dy),_dx:dx,_dy:dy};
  }).sort((a,b)=>b._dist-a._dist);

  for(const z of alive){
    let angle=Math.atan2(z._dy,z._dx)-player.angle;
    while(angle>Math.PI)angle-=TWO_PI;while(angle<-Math.PI)angle+=TWO_PI;
    if(Math.abs(angle)>fov*0.72)continue;
    const screenX=Math.floor((0.5+angle/fov)*W);
    const dist=Math.max(0.5,z._dist);
    const size=Math.floor(H/dist);
    const top=Math.floor(H*0.5-size*0.5+player.bobAmt*H);
    const left=Math.floor(screenX-size*0.5);
    if(left+size<0||left>W)continue;
    // Occlusion check (centre of sprite)
    if(zbuf[clamp(screenX,0,W-1)]<dist-0.1)continue;

    const fog=ZONE_FOG[player.zone];
    const bright=clamp(1-dist*fog,0.08,1);
    ctx.save();
    ctx.globalAlpha=bright;

    const isDying=z.state==='dying';
    const isAttacking=z.state==='attack';
    const flash=z.hitFlash>0;
    if(isDying){ctx.globalAlpha=bright*(z.deathTimer/35);}

    const cw=Math.floor(size*0.58);
    const cx2=screenX;
    const headH=Math.floor(size*0.27);
    const bodyH=Math.floor(size*0.44);
    const legH=Math.floor(size*0.29);
    const legAnim=Math.sin(Date.now()*0.008*(1+z.type))*0.35;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath();ctx.ellipse(cx2,top+headH+bodyH+legH+2,cw*0.35,size*0.03,0,0,TWO_PI);ctx.fill();

    // Legs
    const legCol=flash?'#ff2200':z.color;
    ctx.fillStyle=legCol;
    ctx.fillRect(cx2-cw*0.32+legAnim*size*0.04,top+headH+bodyH,cw*0.28,legH);
    ctx.fillRect(cx2+cw*0.04-legAnim*size*0.04,top+headH+bodyH,cw*0.28,legH);

    // Body gradient
    const bodyGrd=ctx.createLinearGradient(cx2-cw*0.5,top+headH,cx2+cw*0.5,top+headH+bodyH);
    bodyGrd.addColorStop(0,flash?'#ff4422':z.color);
    bodyGrd.addColorStop(1,flash?'#880000':'#0a0000');
    ctx.fillStyle=bodyGrd;
    ctx.fillRect(cx2-cw*0.5,top+headH,cw,bodyH);

    // Chest wound detail
    if(!flash){
      ctx.fillStyle='rgba(80,0,0,0.6)';
      ctx.fillRect(cx2-cw*0.15,top+headH+bodyH*0.3,cw*0.3,bodyH*0.18);
    }

    // Arms
    if(isAttacking){
      const sw=Math.sin(Date.now()*0.025)*0.35;
      ctx.fillStyle=flash?'#ff4422':z.color;
      ctx.fillRect(cx2-cw*0.78,top+headH+size*0.03+sw*size*0.12,cw*0.26,bodyH*0.62);
      ctx.fillRect(cx2+cw*0.52,top+headH+size*0.03-sw*size*0.12,cw*0.26,bodyH*0.62);
    }else{
      ctx.fillStyle=flash?'#ff4422':z.color;
      ctx.fillRect(cx2-cw*0.78,top+headH+size*0.04,cw*0.26,bodyH*0.6);
      ctx.fillRect(cx2+cw*0.52,top+headH+size*0.04,cw*0.26,bodyH*0.6);
    }

    // Head
    const headGrd=ctx.createLinearGradient(cx2-cw*0.3,top,cx2+cw*0.3,top+headH);
    headGrd.addColorStop(0,flash?'#ff5533':'#3a1808');
    headGrd.addColorStop(1,flash?'#cc2200':'#1a0800');
    ctx.fillStyle=headGrd;
    ctx.fillRect(cx2-cw*0.3,top,cw*0.6,headH);

    // Eyes glow
    const eyeS=Math.max(2,Math.floor(size*0.07));
    const eyeY=top+headH*0.32;
    if(flash){ctx.fillStyle='#ffffff';}else{
      // Eye glow
      const eg=ctx.createRadialGradient(cx2-cw*0.12,eyeY,0,cx2-cw*0.12,eyeY,eyeS*1.5);
      eg.addColorStop(0,z.eyeColor);eg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=eg;ctx.fillRect(cx2-cw*0.2,eyeY-eyeS,eyeS*3,eyeS*3);
      const eg2=ctx.createRadialGradient(cx2+cw*0.12,eyeY,0,cx2+cw*0.12,eyeY,eyeS*1.5);
      eg2.addColorStop(0,z.eyeColor);eg2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=eg2;ctx.fillRect(cx2+cw*0.04,eyeY-eyeS,eyeS*3,eyeS*3);
    }
    ctx.fillStyle=flash?'#ffffff':z.eyeColor;
    ctx.fillRect(cx2-cw*0.18,eyeY,eyeS,eyeS);
    ctx.fillRect(cx2+cw*0.1,eyeY,eyeS,eyeS);

    // HP bar if close
    if(dist<7&&z.state!=='dying'){
      const hp=z.hp/z.maxHp;
      const bw2=Math.floor(size*0.85),bx=cx2-bw2*0.5,by2=top-12;
      ctx.fillStyle='#1a0000';ctx.fillRect(bx,by2,bw2,6);
      ctx.fillStyle=hp>0.5?'#00dd22':hp>0.25?'#ddcc00':'#dd2200';
      ctx.fillRect(bx,by2,bw2*hp,6);
      ctx.strokeStyle='#440000';ctx.lineWidth=1;ctx.strokeRect(bx,by2,bw2,6);
    }
    ctx.restore();
  }
}

// ── HUD ───────────────────────────────────────────────────────
function renderHUD(){
  const pad=14;
  const fs=Math.max(10,Math.floor(H*0.02));
  const fs2=Math.max(9,Math.floor(H*0.016));

  // HP bar panel
  const hpW=Math.min(210,W*0.3);
  const hpPct=player.hp/player.maxHp;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(pad-2,H-68-pad,hpW+10,56);
  ctx.strokeStyle='#440000';ctx.lineWidth=1;ctx.strokeRect(pad-2,H-68-pad,hpW+10,56);
  ctx.fillStyle='#ff4444';ctx.font=`bold ${fs}px Courier New`;
  ctx.fillText(`HP  ${Math.ceil(player.hp)}/${player.maxHp}`,pad+2,H-72-pad);
  ctx.fillStyle='#330000';ctx.fillRect(pad,H-62-pad,hpW,14);
  const hpColor=hpPct>0.5?'#dd2200':hpPct>0.25?'#ff6600':'#ff0000';
  ctx.fillStyle=hpColor;ctx.fillRect(pad,H-62-pad,hpW*hpPct,14);
  ctx.strokeStyle='#880000';ctx.lineWidth=1;ctx.strokeRect(pad,H-62-pad,hpW,14);

  // XP bar
  const xpW=Math.min(210,W*0.3);
  const xpPct=player.xp/(player.level*200);
  ctx.fillStyle='#001833';ctx.fillRect(pad,H-42-pad,xpW,8);
  ctx.fillStyle='#0055ff';ctx.fillRect(pad,H-42-pad,xpW*xpPct,8);
  ctx.strokeStyle='#002266';ctx.lineWidth=1;ctx.strokeRect(pad,H-42-pad,xpW,8);
  ctx.fillStyle='#4488ff';ctx.font=`${fs2}px Courier New`;
  ctx.fillText(`LV ${player.level}   XP ${player.xp}/${player.level*200}`,pad,H-47-pad);

  // Revive hearts
  ctx.font=`${Math.floor(H*0.024)}px Courier New`;
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<player.revives?'#ff3300':'#2a0000';
    ctx.fillText('♥',pad+i*26,H-28-pad);
  }

  // Ammo panel
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(W-148-pad,H-72-pad,146,62);
  ctx.strokeStyle='#554400';ctx.lineWidth=1;ctx.strokeRect(W-148-pad,H-72-pad,146,62);
  ctx.fillStyle='#cc8800';ctx.font=`${fs2}px Courier New`;ctx.textAlign='right';
  ctx.fillText(WEAPON_NAMES[player.weapon],W-pad-4,H-74-pad);
  ctx.fillStyle='#ffcc00';ctx.font=`bold ${Math.floor(H*0.032)}px Courier New`;
  ctx.fillText(`${player.ammo[player.weapon]}`,W-pad-50,H-50-pad);
  ctx.fillStyle='#886600';ctx.font=`${Math.floor(H*0.02)}px Courier New`;
  ctx.fillText(`/${player.maxAmmo[player.weapon]}`,W-pad-4,H-50-pad);
  if(player.reloading){
    const rp=1-(player.reloadTimer/(WEAPON_RELOAD_TIME[player.weapon]*60));
    ctx.fillStyle='#ff4400';ctx.font=`${fs2}px Courier New`;
    ctx.fillText(`RELOADING ${Math.floor(rp*100)}%`,W-pad-4,H-30-pad);
  }
  ctx.textAlign='left';

  // Zone / kills
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(pad-2,pad-2,220,62);
  ctx.strokeStyle='#330000';ctx.lineWidth=1;ctx.strokeRect(pad-2,pad-2,220,62);
  ctx.fillStyle='#ff2200';ctx.font=`bold ${fs}px Courier New`;
  ctx.fillText(`KILLS: ${player.kills}  TARGET: 15`,pad+4,pad+18);
  ctx.fillStyle=ZONE_ACCENT[player.zone];ctx.font=`${fs2}px Courier New`;
  ctx.fillText(`◈ ${ZONE_NAMES[player.zone]}`,pad+4,pad+36);
  ctx.fillStyle='#555';ctx.fillText(`SCORE: ${score}`,pad+4,pad+52);

  // Crosshair
  const cx=W*0.5,cy=H*0.5+player.bobAmt*H;
  const cs=9+player.recoil*18;
  ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx-cs,cy);ctx.lineTo(cx-5,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+5,cy);ctx.lineTo(cx+cs,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-cs);ctx.lineTo(cx,cy-5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy+5);ctx.lineTo(cx,cy+cs);ctx.stroke();
  ctx.strokeStyle='rgba(255,80,80,0.6)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.arc(cx,cy,3.5,0,TWO_PI);ctx.stroke();

  // Interact prompt
  if(interactTarget!==null){
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(W*0.5-145,H*0.5+58,290,34);
    ctx.strokeStyle='#886600';ctx.lineWidth=1;ctx.strokeRect(W*0.5-145,H*0.5+58,290,34);
    ctx.fillStyle='#ffcc00';ctx.font=`bold ${fs2}px Courier New`;ctx.textAlign='center';
    if(typeof interactTarget==='number')ctx.fillText('[E]  ANSWER QUESTION → UNLOCK GATE',W*0.5,H*0.5+80);
    else ctx.fillText('[E]  OPEN CRATE',W*0.5,H*0.5+80);
    ctx.textAlign='left';
  }

  // Checkpoint flash
  if(checkpointFlash>0){
    const alpha=Math.min(1,checkpointFlash/30)*0.9;
    ctx.fillStyle=`rgba(0,180,60,${alpha*0.25})`;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=`rgba(0,255,80,${alpha})`;ctx.font=`bold ${Math.floor(H*0.04)}px Courier New`;ctx.textAlign='center';
    ctx.fillText(`✓ CHECKPOINT: ${checkpointLabel}`,W*0.5,H*0.5-40);
    ctx.font=`${Math.floor(H*0.022)}px Courier New`;
    ctx.fillStyle=`rgba(0,200,60,${alpha})`;
    ctx.fillText('Respawn point saved',W*0.5,H*0.5);
    ctx.textAlign='left';
    checkpointFlash--;
  }

  // Muzzle flash overlay
  if(player.muzzleFlash>0){
    const a=player.muzzleFlash/10*0.65;
    const grd=ctx.createRadialGradient(W*0.5,H*0.5+40,0,W*0.5,H*0.5+40,W*0.28);
    grd.addColorStop(0,`rgba(255,210,80,${a})`);
    grd.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  }

  // Damage flash
  if(dmgFlash>0){ctx.fillStyle=`rgba(180,0,0,${dmgFlash/60*0.55})`;ctx.fillRect(0,0,W,H);dmgFlash--;}
  if(successFlash>0){ctx.fillStyle=`rgba(0,180,0,${successFlash/70*0.3})`;ctx.fillRect(0,0,W,H);successFlash--;}

  renderWeapon();
}

// ── WEAPON RENDERING (improved) ──────────────────────────────
function renderWeapon(){
  const recoilOff=player.recoil*H*0.06;
  const bobOff=player.bobAmt*H*3.5;
  const wY=H*0.54+recoilOff+bobOff;
  ctx.save();

  if(player.weapon===0){
    // ── PISTOL ──
    const bx=W*0.5+W*0.08,by=wY;
    const bw=W*0.18,bh=H*0.28;

    // Drop shadow
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(bx+6,by+6,bw,bh);

    // Grip (dark polymer)
    const gripGrd=ctx.createLinearGradient(bx,by+bh*0.45,bx+bw*0.45,by+bh);
    gripGrd.addColorStop(0,'#2a2a2a');gripGrd.addColorStop(1,'#111111');
    ctx.fillStyle=gripGrd;
    ctx.fillRect(bx,by+bh*0.42,bw*0.42,bh*0.58);
    // Grip texture
    ctx.fillStyle='rgba(0,0,0,0.3)';
    for(let i=0;i<6;i++)ctx.fillRect(bx+4,by+bh*0.5+i*bh*0.07,bw*0.36,2);

    // Trigger guard
    ctx.strokeStyle='#222';ctx.lineWidth=Math.max(2,bw*0.06);
    ctx.beginPath();ctx.arc(bx+bw*0.28,by+bh*0.52,bw*0.14,Math.PI*0.3,Math.PI,false);ctx.stroke();

    // Frame
    const frameGrd=ctx.createLinearGradient(bx+bw*0.08,by,bx+bw*0.08+bw*0.78,by+bh*0.42);
    frameGrd.addColorStop(0,'#3a3a3a');frameGrd.addColorStop(0.5,'#2a2a2a');frameGrd.addColorStop(1,'#1a1a1a');
    ctx.fillStyle=frameGrd;
    ctx.fillRect(bx+bw*0.08,by+bh*0.25,bw*0.78,bh*0.26);

    // Slide
    const slideGrd=ctx.createLinearGradient(bx+bw*0.08,by,bx+bw*0.08,by+bh*0.28);
    slideGrd.addColorStop(0,'#555');slideGrd.addColorStop(0.4,'#383838');slideGrd.addColorStop(1,'#222');
    ctx.fillStyle=slideGrd;
    ctx.fillRect(bx+bw*0.08,by,bw*0.82,bh*0.27);
    // Slide serrations
    ctx.fillStyle='rgba(0,0,0,0.5)';
    for(let i=0;i<5;i++)ctx.fillRect(bx+bw*0.55+i*bw*0.06,by+bh*0.04,bw*0.025,bh*0.19);
    // Slide top highlight
    ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(bx+bw*0.09,by,bw*0.8,3);

    // Barrel tip
    ctx.fillStyle='#111';ctx.fillRect(bx+bw*0.82,by+bh*0.09,bw*0.18,bh*0.1);
    ctx.fillStyle='#333';ctx.fillRect(bx+bw*0.88,by+bh*0.11,bw*0.12,bh*0.06);

    // Sight
    ctx.fillStyle='#ff0000';ctx.fillRect(bx+bw*0.12,by+1,bw*0.06,4);
    ctx.fillStyle='#ff4400';ctx.fillRect(bx+bw*0.78,by+1,bw*0.08,4);

    // Muzzle flash
    if(player.muzzleFlash>0){
      const mf=player.muzzleFlash/10;
      ctx.globalAlpha=mf;
      const mg=ctx.createRadialGradient(bx+bw,by+bh*0.14,0,bx+bw,by+bh*0.14,bw*0.6);
      mg.addColorStop(0,'#ffffaa');mg.addColorStop(0.3,'#ffaa00');mg.addColorStop(1,'rgba(255,60,0,0)');
      ctx.fillStyle=mg;ctx.beginPath();ctx.arc(bx+bw,by+bh*0.14,bw*0.6,0,TWO_PI);ctx.fill();
      ctx.globalAlpha=1;
    }

  }else{
    // ── SHOTGUN ──
    const bx=W*0.5-W*0.15,by=wY;
    const bw=W*0.55,bh=H*0.32;

    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx+8,by+8,bw,bh);

    // Stock (wood)
    const stockGrd=ctx.createLinearGradient(bx,by+bh*0.25,bx+bw*0.32,by+bh);
    stockGrd.addColorStop(0,'#6a3a10');stockGrd.addColorStop(0.5,'#4a2808');stockGrd.addColorStop(1,'#2a1400');
    ctx.fillStyle=stockGrd;
    ctx.fillRect(bx,by+bh*0.22,bw*0.3,bh*0.78);
    // Wood grain
    ctx.fillStyle='rgba(0,0,0,0.2)';
    for(let i=0;i<8;i++)ctx.fillRect(bx+4,by+bh*0.28+i*bh*0.08,bw*0.24,1);
    // Stock curve highlight
    ctx.fillStyle='rgba(180,100,30,0.2)';ctx.fillRect(bx,by+bh*0.22,4,bh*0.78);

    // Receiver (main body)
    const recGrd=ctx.createLinearGradient(bx+bw*0.18,by+bh*0.1,bx+bw*0.18,by+bh*0.55);
    recGrd.addColorStop(0,'#4a4a4a');recGrd.addColorStop(0.5,'#2a2a2a');recGrd.addColorStop(1,'#1a1a1a');
    ctx.fillStyle=recGrd;
    ctx.fillRect(bx+bw*0.18,by+bh*0.1,bw*0.55,bh*0.5);
    // Receiver detail
    ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(bx+bw*0.19,by+bh*0.11,bw*0.53,3);

    // Barrels (double)
    const barGrd=ctx.createLinearGradient(bx+bw*0.2,by,bx+bw*0.2,by+bh*0.16);
    barGrd.addColorStop(0,'#555');barGrd.addColorStop(1,'#1a1a1a');
    ctx.fillStyle=barGrd;
    ctx.fillRect(bx+bw*0.2,by,bw*0.78,bh*0.12);
    ctx.fillRect(bx+bw*0.2,by+bh*0.13,bw*0.78,bh*0.12);
    // Barrel rib
    ctx.fillStyle='#333';ctx.fillRect(bx+bw*0.2,by+bh*0.115,bw*0.78,3);
    // Barrel tip caps
    ctx.fillStyle='#111';
    ctx.fillRect(bx+bw*0.95,by,bw*0.05,bh*0.12);
    ctx.fillRect(bx+bw*0.95,by+bh*0.13,bw*0.05,bh*0.12);

    // Foregrip (wood)
    ctx.fillStyle='#5a3010';ctx.fillRect(bx+bw*0.2,by+bh*0.26,bw*0.4,bh*0.3);
    ctx.fillStyle='rgba(0,0,0,0.2)';
    for(let i=0;i<4;i++)ctx.fillRect(bx+bw*0.22,by+bh*0.3+i*bh*0.06,bw*0.36,1);

    // Guard
    ctx.strokeStyle='#222';ctx.lineWidth=Math.max(2,bh*0.04);
    ctx.beginPath();ctx.arc(bx+bw*0.32,by+bh*0.42,bw*0.1,Math.PI*0.2,Math.PI*0.8,false);ctx.stroke();

    // Trigger
    ctx.fillStyle='#888';ctx.fillRect(bx+bw*0.3,by+bh*0.28,4,bh*0.14);

    // Muzzle flash (double barrel)
    if(player.muzzleFlash>0){
      const mf=player.muzzleFlash/10;
      ctx.globalAlpha=mf;
      for(let b=0;b<2;b++){
        const my2=by+bh*(b===0?0.06:0.19);
        const mg=ctx.createRadialGradient(bx+bw,my2,0,bx+bw,my2,bw*0.5);
        mg.addColorStop(0,'#ffffaa');mg.addColorStop(0.25,'#ff8800');mg.addColorStop(1,'rgba(255,40,0,0)');
        ctx.fillStyle=mg;ctx.beginPath();ctx.arc(bx+bw,my2,bw*0.5,0,TWO_PI);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}

function renderGrain(){

// ── QUESTION SCREEN ───────────────────────────────────────────
function renderQuestion(){
  menuBtns=[];
  ctx.fillStyle='rgba(0,0,0,0.94)';ctx.fillRect(0,0,W,H);

  // Outer horror border
  ctx.strokeStyle='#990000';ctx.lineWidth=5;ctx.strokeRect(5,5,W-10,H-10);
  ctx.strokeStyle='#440000';ctx.lineWidth=2;ctx.strokeRect(14,14,W-28,H-28);

  // Header stripe
  ctx.fillStyle='rgba(100,0,0,0.4)';ctx.fillRect(0,0,W,H*0.13);
  ctx.strokeStyle='#880000';ctx.lineWidth=1;ctx.strokeRect(0,H*0.13,W,0);

  // Title
  ctx.fillStyle='#ff2200';ctx.font=`bold ${Math.floor(H*0.038)}px Courier New`;ctx.textAlign='center';
  ctx.shadowColor='#ff0000';ctx.shadowBlur=12;
  ctx.fillText('⚠  VOCABULARY CHALLENGE  ⚠',W*0.5,H*0.085);
  ctx.shadowBlur=0;

  ctx.fillStyle='#664400';ctx.font=`${Math.floor(H*0.018)}px Courier New`;
  ctx.fillText(`Question ${usedQuestions.length} / 50`,W*0.5,H*0.115);

  if(currentQuestion){
    // Sentence panel
    ctx.fillStyle='rgba(20,10,0,0.7)';ctx.fillRect(W*0.05,H*0.14,W*0.9,H*0.24);
    ctx.strokeStyle='#441100';ctx.lineWidth=1;ctx.strokeRect(W*0.05,H*0.14,W*0.9,H*0.24);

    // Render sentence with underlined target word
    renderSentenceWithUnderline(currentQuestion.s,currentQuestion.w,W*0.5,H*0.18,W*0.84,Math.floor(H*0.026));

    // "means:" label
    ctx.fillStyle='rgba(10,5,0,0.8)';ctx.fillRect(W*0.05,H*0.39,W*0.9,H*0.042);
    ctx.fillStyle='#cc7700';ctx.font=`italic ${Math.floor(H*0.022)}px Courier New`;ctx.textAlign='center';
    ctx.fillText(`"${currentQuestion.w}"  —  choose the correct meaning:`,W*0.5,H*0.418);

    // Answer buttons
    const labels=['A','B','C','D'];
    const btnColors=['#006622','#004488','#775500','#550066'];
    const borderColors=['#00bb44','#2288ff','#ffbb00','#dd22ff'];

    currentQuestion.c.forEach((choice,i)=>{
      const by=H*0.444+i*(H*0.1175);
      const bx=W*0.06;const bw2=W*0.88;const bh=H*0.098;
      ctx.fillStyle=`rgba(${btnColors[i].replace('#','').match(/../g).map(h=>parseInt(h,16)).join(',')},0.85)`;
      ctx.fillRect(bx,by,bw2,bh);
      // Hover-style inner glow (always subtle)
      const ig=ctx.createLinearGradient(bx,by,bx,by+bh);
      ig.addColorStop(0,'rgba(255,255,255,0.06)');ig.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=ig;ctx.fillRect(bx,by,bw2,bh);

      ctx.strokeStyle=borderColors[i];ctx.lineWidth=1.5;ctx.strokeRect(bx,by,bw2,bh);

      // Label
      ctx.fillStyle=borderColors[i];ctx.font=`bold ${Math.floor(H*0.03)}px Courier New`;ctx.textAlign='left';
      ctx.fillText(`${labels[i]}`,bx+14,by+bh*0.65);
      // Choice text
      ctx.fillStyle='#ffffff';ctx.font=`${Math.floor(H*0.026)}px Courier New`;
      // Truncate if too long
      let choiceText=choice;
      const maxW2=bw2-70;
      while(ctx.measureText(choiceText).width>maxW2&&choiceText.length>4)choiceText=choiceText.slice(0,-1)+'…';
      ctx.fillText(choiceText,bx+52,by+bh*0.65);

      menuBtns.push({x:bx,y:by,w:bw2,h:bh,action:()=>answerQuestion(i)});
    });

    // Bottom hint
    ctx.fillStyle='rgba(80,0,0,0.6)';ctx.fillRect(0,H*0.92,W,H*0.08);
    ctx.fillStyle='#664444';ctx.font=`${Math.floor(H*0.017)}px Courier New`;ctx.textAlign='center';
    ctx.fillText('✓ Correct = Ammo + XP + Kill nearest zombie    ✗ Wrong = −15 HP + Alert zombies',W*0.5,H*0.96);
  }
  ctx.textAlign='left';ctx.shadowBlur=0;
}

function renderSentenceWithUnderline(sentence,word,centerX,startY,maxW,fontSize){
  // Build parts: before word, the word itself, after word
  // sentence uses ___ for blank, word is the answer
  // We display sentence with ___ replaced by styled underlined word
  ctx.font=`${fontSize}px Courier New`;
  ctx.textAlign='center';
  const fullText=sentence.replace('___',word);
  // Word-wrap
  const words2=fullText.split(' ');
  let lines=[],line='';
  for(const w of words2){
    const test=line+w+' ';
    if(ctx.measureText(test).width>maxW&&line!==''){lines.push(line.trim());line=w+' ';}else line=test;
  }
  if(line.trim())lines.push(line.trim());

  const lineH=fontSize*1.55;
  lines.forEach((ln,li)=>{
    const y=startY+li*lineH;
    // Check if this line contains the target word
    if(ln.includes(word)){
      // Find word position in line to underline it
      const before=ln.substring(0,ln.indexOf(word));
      const after=ln.substring(ln.indexOf(word)+word.length);
      const totalW=ctx.measureText(ln).width;
      const startXLine=centerX-totalW*0.5;
      const beforeW=ctx.measureText(before).width;
      const wordW=ctx.measureText(word).width;

      // Draw before
      ctx.fillStyle='#dddddd';ctx.textAlign='left';
      ctx.fillText(before,startXLine,y);
      // Draw word (highlighted)
      ctx.fillStyle='#ffdd44';
      ctx.fillText(word,startXLine+beforeW,y);
      // Underline
      ctx.strokeStyle='#ffdd44';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(startXLine+beforeW,y+3);ctx.lineTo(startXLine+beforeW+wordW,y+3);ctx.stroke();
      // Draw after
      ctx.fillStyle='#dddddd';
      ctx.fillText(after,startXLine+beforeW+wordW,y);
      ctx.textAlign='center';
    }else{
      ctx.fillStyle='#dddddd';ctx.textAlign='center';
      ctx.fillText(ln,centerX,y);
    }
  });
}

// ── DEATH TRANSITION ─────────────────────────────────────────
function renderDead(){
  const t=1-(deathTimer/200);
  ctx.fillStyle=`rgba(100,0,0,${t*0.96})`;ctx.fillRect(0,0,W,H);
  deathTimer--;
  if(deathTimer<=0){
    if(player.revives>0){
      player.revives--;
      player.hp=100;
      // Respawn at last checkpoint
      const cp=CHECKPOINTS[player.checkpointIdx];
      player.x=cp.x;player.y=cp.y;
      gameState=GS.GAME;successFlash=60;
    }else{gameState=GS.GAMEOVER;}
  }
  if(t>0.45){
    ctx.fillStyle='#cc0000';ctx.font=`bold ${Math.floor(H*0.065)}px Courier New`;ctx.textAlign='center';
    ctx.shadowColor='#ff0000';ctx.shadowBlur=20;
    ctx.fillText('YOU DIED',W*0.5,H*0.42);ctx.shadowBlur=0;
    ctx.fillStyle='#880000';ctx.font=`${Math.floor(H*0.026)}px Courier New`;
    if(player.revives>0)ctx.fillText(`CHECKPOINT REVIVES REMAINING: ${player.revives}`,W*0.5,H*0.52);
    else ctx.fillText('NO REVIVES LEFT — RESTARTING',W*0.5,H*0.52);
    ctx.textAlign='left';
  }
}

// ── MOBILE CONTROLS ──────────────────────────────────────────
function renderMobileControls(){
  if(!('ontouchstart' in window)&&!navigator.maxTouchPoints)return;
  updateBtnPositions();
  const a=cfg.ctrlOpacity;
  ctx.save();ctx.globalAlpha=a;

  // Left joystick
  const jx=touch.lActive?touch.lox:W*0.14,jy=touch.lActive?touch.loy:H-128;
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(jx,jy,touch.joyR,0,TWO_PI);ctx.stroke();
  if(touch.lActive){
    const kx=jx+touch.lx*touch.joyR,ky=jy+touch.ly*touch.joyR;
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(kx,ky,24,0,TWO_PI);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(kx,ky,24,0,TWO_PI);ctx.stroke();
  }else{
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.beginPath();ctx.arc(jx,jy,22,0,TWO_PI);ctx.fill();
  }

  // Fire
  const fg=ctx.createRadialGradient(BTN.fire.x,BTN.fire.y,0,BTN.fire.x,BTN.fire.y,BTN.fire.r);
  fg.addColorStop(0,'rgba(220,40,40,0.7)');fg.addColorStop(1,'rgba(140,0,0,0.5)');
  ctx.fillStyle=fg;ctx.beginPath();ctx.arc(BTN.fire.x,BTN.fire.y,BTN.fire.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#ff5555';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(BTN.fire.x,BTN.fire.y,BTN.fire.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.floor(H*0.022)}px Courier New`;ctx.textAlign='center';
  ctx.fillText('FIRE',BTN.fire.x,BTN.fire.y+7);

  // Reload
  ctx.fillStyle='rgba(20,80,180,0.6)';ctx.beginPath();ctx.arc(BTN.reload.x,BTN.reload.y,BTN.reload.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#55aaff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(BTN.reload.x,BTN.reload.y,BTN.reload.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#ddf';ctx.font=`${Math.floor(H*0.016)}px Courier New`;
  ctx.fillText('RELOAD',BTN.reload.x,BTN.reload.y+6);

  // Weapon switch
  ctx.fillStyle='rgba(80,80,20,0.6)';ctx.beginPath();ctx.arc(BTN.weapon.x,BTN.weapon.y,BTN.weapon.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#cccc44';ctx.lineWidth=2;ctx.beginPath();ctx.arc(BTN.weapon.x,BTN.weapon.y,BTN.weapon.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#eee';ctx.font=`${Math.floor(H*0.015)}px Courier New`;
  ctx.fillText(WEAPON_NAMES[player.weapon],BTN.weapon.x,BTN.weapon.y+5);

  // Pause
  ctx.fillStyle='rgba(40,40,40,0.7)';ctx.beginPath();ctx.arc(BTN.pause.x,BTN.pause.y,BTN.pause.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(BTN.pause.x,BTN.pause.y,BTN.pause.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#ccc';ctx.font=`bold 14px Courier New`;ctx.fillText('II',BTN.pause.x,BTN.pause.y+5);
  ctx.textAlign='left';
  ctx.restore();
}

// ── TOGGLE PAUSE ─────────────────────────────────────────────
function togglePause(){
  if(gameState===GS.GAME)gameState=GS.PAUSED;
  else if(gameState===GS.PAUSED)gameState=GS.GAME;
}
document.addEventListener('keydown',e=>{if(e.code==='Escape')togglePause();});

// ── START GAME ───────────────────────────────────────────────
function startGame(){
  player.x=2.5;player.y=2.5;player.angle=0;
  player.hp=100;player.xp=0;player.level=1;player.kills=0;
  player.ammo=[18,6];player.reloading=false;player.reloadTimer=0;
  player.muzzleFlash=0;player.recoil=0;player.recoilY=0;
  player.bobAmt=0;player.bobPhase=0;player.weapon=0;
  player.zone=0;player.stepTimer=0;player.revives=3;player.checkpointIdx=0;
  score=0;gameTime=0;
  shakeX=0;shakeY=0;shakeTimer=0;
  dmgFlash=0;successFlash=0;
  usedQuestions=[];currentQuestion=null;
  gatesUnlocked=[false,false,false,false];
  openedCrates.clear();
  particles=[];interactTarget=null;
  flickerTimer=10;flickerVal=1;
  checkpointFlash=0;checkpointLabel='';
  // Reset map
  CRATE_POSITIONS.forEach(([x,y])=>{if(MAP[y])MAP[y][x]=3;});
  MAP[11][4]=2;MAP[11][36]=2;MAP[19][19]=2;MAP[20][19]=2;
  initZombies();
  deathTimer=0;winTimer=0;
  gameState=GS.GAME;
}

// ── MAIN LOOP ────────────────────────────────────────────────
let lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,(ts-lastTime)/16.67);lastTime=ts;
  ctx.save();
  if(shakeTimer>0){ctx.translate((Math.random()-0.5)*shakeX,(Math.random()-0.5)*shakeY);}

  switch(gameState){
    case GS.MENU:renderMenu();break;
    case GS.SETTINGS:renderSettings();break;
    case GS.GAME:
      updatePlayer();updateZombies();updateParticles();updateShake();checkWin();gameTime++;
      {const zb=raycast();renderSprites(zb);}
      renderFlashlight();
      if(cfg.quality>0)renderGrain();
      renderHUD();renderMobileControls();
      break;
    case GS.QUESTION:
      {const zb=raycast();renderSprites(zb);}
      renderFlashlight();
      renderQuestion();
      break;
    case GS.PAUSED:
      {const zb=raycast();renderSprites(zb);}
      renderFlashlight();
      renderPaused();renderMobileControls();
      break;
    case GS.DEAD:
      {const zb=raycast();renderSprites(zb);}
      renderDead();
      break;
    case GS.GAMEOVER:renderGameOver();break;
    case GS.WIN:winTimer--;renderWin();break;
  }
  ctx.restore();
}

// ── MOUSE LOOK ───────────────────────────────────────────────
let pointerLocked=false;
document.addEventListener('pointerlockchange',()=>{pointerLocked=!!document.pointerLockElement;});
canvas.addEventListener('click',()=>{if(gameState===GS.GAME&&!('ontouchstart' in window))canvas.requestPointerLock();});
document.addEventListener('mousemove',e=>{if(gameState===GS.GAME&&pointerLocked)player.angle+=e.movementX*cfg.sensitivity*0.003;});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&gameState===GS.GAME&&pointerLocked)doShoot();
  if(e.button===2&&gameState===GS.GAME&&pointerLocked)doReload();
});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ── BOOT ────────────────────────────────────────────────────
canvas.addEventListener('touchstart',()=>unlockAC(),{once:true,passive:true});
requestAnimationFrame(loop);
</script>
