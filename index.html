// ── AUDIO ─────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function unlockAC(){if(AC.state==='suspended')AC.resume();}
function playSound(type){
  if(!cfg.soundOn)return;
  try{
    const g=AC.createGain();
    const rev=AC.createConvolver();
    const revBuf=AC.createBuffer(2,AC.sampleRate*0.6,AC.sampleRate);
    for(let c=0;c<2;c++){const d=revBuf.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.12));}
    rev.buffer=revBuf;
    const dryG=AC.createGain();dryG.gain.value=0.75;
    const wetG=AC.createGain();wetG.gain.value=0.25;
    g.connect(dryG);dryG.connect(AC.destination);
    g.connect(rev);rev.connect(wetG);wetG.connect(AC.destination);

    if(type==='shoot'){
      const b=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*0.18,AC.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.045))*1.2;
      const f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=180;
      b.buffer=buf;b.connect(f);f.connect(g);g.gain.setValueAtTime(0.7,AC.currentTime);b.start();
    }else if(type==='shotgun'){
      const b=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*0.38,AC.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.11))*2.0;
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(1.0,AC.currentTime);b.start();
    }else if(type==='rifle'){
      const b=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*0.1,AC.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.032))*0.9;
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.75,AC.currentTime);b.start();
    }else if(type==='zombie'){
      const o=AC.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(55+Math.random()*55,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(28,AC.currentTime+0.65);o.connect(g);g.gain.setValueAtTime(0.22,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.7);o.start();o.stop(AC.currentTime+0.7);
    }else if(type==='wrong'){
      const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=100;o.connect(g);
      g.gain.setValueAtTime(0.4,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.45);o.start();o.stop(AC.currentTime+0.45);
    }else if(type==='beep'){
      const o=AC.createOscillator();o.type='sine';o.frequency.value=1100;o.connect(g);
      g.gain.setValueAtTime(0.12,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.08);o.start();o.stop(AC.currentTime+0.08);
    }else if(type==='level_up'){
      const o=AC.createOscillator();o.type='square';
      o.frequency.setValueAtTime(440,AC.currentTime);o.frequency.setValueAtTime(554,AC.currentTime+0.15);
      o.frequency.setValueAtTime(659,AC.currentTime+0.3);o.frequency.setValueAtTime(880,AC.currentTime+0.45);
      o.connect(g);g.gain.setValueAtTime(0.28,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.85);o.start();o.stop(AC.currentTime+0.85);
    }else if(type==='hit'){
      const b=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*0.12,AC.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.035));
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.5,AC.currentTime);b.start();
    }else if(type==='reload'){
      const o=AC.createOscillator();o.type='triangle';o.frequency.setValueAtTime(300,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(150,AC.currentTime+0.2);o.connect(g);
      g.gain.setValueAtTime(0.18,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.22);o.start();o.stop(AC.currentTime+0.22);
    }
  }catch(e){}
}

// ── NOISE / TEXTURE GENERATION ────────────────────────────────
function makeNoiseCanvas(w,h,scale,alpha,r,g2,b2){
  const nc=document.createElement('canvas');nc.width=w;nc.height=h;
  const nx=nc.getContext('2d');const id=nx.createImageData(w,h);const data=id.data;
  for(let i=0;i<w*h;i++){
    const v=Math.random();
    data[i*4]=r!==undefined?r:v*255;data[i*4+1]=g2!==undefined?g2:v*255;
    data[i*4+2]=b2!==undefined?b2:v*255;data[i*4+3]=v*alpha*255;
  }
  nx.putImageData(id,0,0);return nc;
}

// Pre-generate noise textures

const concreteCanvas=(()=>{
  const nc=document.createElement('canvas');nc.width=128;nc.height=128;
  const nx=nc.getContext('2d');
  nx.fillStyle='#1a1a1a';nx.fillRect(0,0,128,128);
  for(let i=0;i<900;i++){
    const x=Math.random()*128,y=Math.random()*128;
    const s=Math.random()*3+0.5;
    const v=Math.floor(Math.random()*30+10);
    nx.fillStyle=`rgba(${v},${v},${v},${Math.random()*0.8+0.2})`;
    nx.fillRect(x,y,s,s);
  }
  for(let i=0;i<18;i++){
    nx.strokeStyle=`rgba(0,0,0,${Math.random()*0.5+0.2})`;
    nx.lineWidth=Math.random()*1.5+0.3;
    nx.beginPath();nx.moveTo(Math.random()*128,Math.random()*128);
    nx.lineTo(Math.random()*128,Math.random()*128);nx.stroke();
  }
  return nc;
})();
const metalCanvas=(()=>{
  const nc=document.createElement('canvas');nc.width=64;nc.height=64;
  const nx=nc.getContext('2d');
  for(let y=0;y<64;y++){

    nx.fillStyle=`rgb(${v},${v},${v})`;nx.fillRect(0,y,64,1);
  }
  for(let i=0;i<40;i++){
    nx.fillStyle=`rgba(255,255,255,${Math.random()*0.07})`;
    nx.fillRect(Math.random()*64,Math.random()*64,Math.random()*8+1,1);
  }
  return nc;
})();

let dynLights=[];
function updateDynLights(){
  dynLights=[];
  const t=performance.now()*0.001;
  // Flickering ceiling lamps at corridor junctions
  const lampCells=[[5,11],[19,11],[5,19],[19,19],[28,19],[35,11],[11,25],[28,28]];
  for(const lc of lampCells){
    const flicker=0.7+Math.sin(t*7.3+lc[0])*0.15+Math.sin(t*13.1+lc[1])*0.1+(Math.random()<0.01?-0.4:0);
    const li=Math.min(4,player.currentLevelIdx);
    const acc=ZONE_THEME[li].acc;
    dynLights.push({x:lc[0]+0.5,y:lc[1]+0.5,radius:5,intensity:Math.max(0.1,flicker),color:acc});
  }
  // Muzzle flash light
  if(player.muzzleFlash>0){
    const mfi=player.muzzleFlash/10;
    dynLights.push({x:player.x+Math.cos(player.angle)*1.2,y:player.y+Math.sin(player.angle)*1.2,radius:4,intensity:mfi*2.5,color:'#ffeeaa'});
  }
}

let particles=[];
function spawnBloodParticles(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=0.015+Math.random()*0.06;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:40+Math.random()*40,maxLife:80,type:'blood',col:col||'#aa0000',r:2+Math.random()*3});
  }
}
function spawnMuzzleParticles(){
  const a=player.angle;
  for(let i=0;i<12;i++){
    const sa=a+(Math.random()-0.5)*0.55;const sp=0.06+Math.random()*0.08;
    particles.push({x:player.x+Math.cos(a)*0.55,y:player.y+Math.sin(a)*0.55,vx:Math.cos(sa)*sp,vy:Math.sin(sa)*sp,life:16,maxLife:16,type:'muzzle'});
  }
  // Shell casing
  const shellA=a+Math.PI*0.5+(Math.random()-0.5)*0.3;
  particles.push({x:player.x,y:player.y,vx:Math.cos(shellA)*0.04,vy:Math.sin(shellA)*0.04,life:60,maxLife:60,type:'shell'});
}
function spawnDustParticles(x,y){
  for(let i=0;i<4;i++){
    const a=Math.random()*Math.PI*2,s=0.005+Math.random()*0.015;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.008,life:80+Math.random()*60,maxLife:140,type:'dust'});
  }
}
function spawnSpark(x,y){
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2,s=0.02+Math.random()*0.04;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*20,maxLife:40,type:'spark'});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.type==='dust'||p.type==='smoke')p.vy-=0.0002;
    p.life--;if(p.life<=0)particles.splice(i,1);
  }
}

// ── MAP INIT ──────────────────────────────────────────────────
function initLevelMap(){
  player.cratesCollected=0;player.doorProgress=0;
  MAP=[];
  for(let y=0;y<MAPH;y++)MAP[y]=[...RAWMAP[y]].map(Number);
  const spawn=LEVELS[player.currentLevelIdx].spawn;
  player.x=spawn.x;player.y=spawn.y;
  let emptyCells=[];
  for(let y=1;y<MAPH-1;y++)for(let x=1;x<MAPW-1;x++)if(MAP[y][x]===0&&Math.hypot(x-player.x,y-player.y)>8)emptyCells.push({x,y});
  emptyCells.sort(()=>Math.random()-0.5);
  for(let i=0;i<7;i++)if(emptyCells[i])MAP[emptyCells[i].y][emptyCells[i].x]=3;
  if(emptyCells[7]){doorPos=emptyCells[7];MAP[doorPos.y][doorPos.x]=2;}
  zombies=[];
  const numZombies=15+(player.currentLevelIdx*5);
  for(let i=8;i<8+numZombies&&i<emptyCells.length;i++){
    const zType=Math.random()>0.6?Math.floor(Math.random()*ZOMBIE_TYPES.length):0;
    spawnZombie(emptyCells[i].x,emptyCells[i].y,zType);
  }
  particles=[];
  // Ambient dust
  for(let i=0;i<20;i++){
    const ex=emptyCells[i+numZombies+8];if(!ex)break;
    particles.push({x:ex.x+Math.random(),y:ex.y+Math.random(),vx:(Math.random()-0.5)*0.004,vy:-0.003-Math.random()*0.005,life:200+Math.random()*400,maxLife:600,type:'dust'});
  }
}

function spawnZombie(x,y,type){
  const t=ZOMBIE_TYPES[type||0];
  zombies.push({
    x:x+0.5,y:y+0.5,type:type||0,
    hp:t.hp,maxHp:t.hp,speed:t.speed*(0.8+Math.random()*0.4),
    dmg:t.dmg,skin:t.skin,shirt:t.shirt,pants:t.pants,eyeColor:t.eye,
    radius:t.radius,angle:Math.random()*Math.PI*2,state:'roam',
    attackTimer:0,roamTimer:Math.random()*120,alertRadius:5+Math.random()*5,
    hitFlash:0,deathTimer:0,dist:0,separationX:0,separationY:0,
    breathPhase:Math.random()*Math.PI*2,twitch:0,twitchDir:0
  });
}

// ── COLLISION ────────────────────────────────────────────────
function cellSolid(mx,my){
  if(mx<0||mx>=MAPW||my<0||my>=MAPH)return true;
  const c=MAP[my][mx];
  if(c===1)return true;
  if(c===2&&player.doorProgress<3)return true;
  if(c===3)return true;
  return false;
}
function tryMovePlayer(nx,ny){
  const r=0.28;const ox=player.x,oy=player.y;
  if(!circleBlockedAt(nx,ny,r)){player.x=nx;player.y=ny;return;}
  if(!circleBlockedAt(nx,oy,r)){player.x=nx;return;}
  if(!circleBlockedAt(ox,ny,r)){player.y=ny;return;}
}
function circleBlockedAt(cx,cy,r){
  const x0=Math.floor(cx-r),x1=Math.floor(cx+r);
  const y0=Math.floor(cy-r),y1=Math.floor(cy+r);
  for(let ty=y0;ty<=y1;ty++)for(let tx=x0;tx<=x1;tx++){
    if(!cellSolid(tx,ty))continue;
    const nearX=Math.max(tx,Math.min(tx+1,cx));
    const nearY=Math.max(ty,Math.min(ty+1,cy));
    if((cx-nearX)**2+(cy-nearY)**2<r*r)return true;
  }
  return false;
}

function updateBtnPositions(){BTN.fire.x=W-100;BTN.fire.y=H-128;BTN.reload.x=W-198;BTN.reload.y=H-108;BTN.pause.x=W-44;BTN.pause.y=52;BTN.weapon.x=W-198;BTN.weapon.y=H-188;BTN.interact.x=W-100;BTN.interact.y=H-244;}

// ── SHOOT ────────────────────────────────────────────────────
let autoFireTimer=0;
let score=0,gameTime=0;
let shakeX=0,shakeY=0,shakeTimer=0;
let dmgFlash=0,successFlash=0;
let currentQuestion=null,questionTrigger='';
let usedQuestions=[];
let menuAnim=0;
let deathTimer=0,winTimer=0,levelUpTimer=0;
let interactTarget=null;
let flickerTimer=0,flickerVal=1.0;
let globalTime=0;

function doShoot(){
  if(player.reloading)return;
  if(player.weapon===2&&autoFireTimer>0)return;
  if(player.ammo[player.weapon]<=0){playSound('wrong');return;}
  player.ammo[player.weapon]--;
  player.muzzleFlash=12;
  player.recoil=player.weapon===2?0.12:0.22;
  player.recoilY=0.14;
  let sfx=player.weapon===0?'shoot':player.weapon===1?'shotgun':'rifle';
  playSound(sfx);
  shakeTimer=player.weapon===2?6:12;
  shakeX=player.weapon===0?5:player.weapon===1?11:6;
  shakeY=shakeX;
  if(player.weapon===2)autoFireTimer=8;
  spawnMuzzleParticles();
  const shots=WEAPON_SHOTS[player.weapon];
  const range=WEAPON_RANGE[player.weapon];
  for(let s=0;s<shots;s++){
    const spread=(Math.random()-0.5)*WEAPON_SPREAD[player.weapon];
    const angle=player.angle+spread;
    let hitZ=null,hitDist=Infinity;
    for(const z of zombies){
      if(z.state==='dead'||z.state==='dying')continue;
      const dx=z.x-player.x,dy=z.y-player.y;
      const dist=Math.sqrt(dx*dx+dy*dy);if(dist>range)continue;
      const za=Math.atan2(dy,dx);let da=za-angle;
      while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
      const hitAngle=Math.atan2(z.radius,dist);
      if(Math.abs(da)<hitAngle+0.05&&dist<hitDist){hitDist=dist;hitZ=z;}
    }
    if(hitZ){
      const dmg=WEAPON_DAMAGE[player.weapon]/shots;
      hitZ.hp-=dmg;hitZ.hitFlash=12;
      const li=Math.min(4,player.currentLevelIdx);
      spawnBloodParticles(hitZ.x,hitZ.y,player.weapon===1?10:5,ZONE_THEME[li].blood+'0.9)');
      if(hitZ.hp<=0&&hitZ.state!=='dead'&&hitZ.state!=='dying'){
        hitZ.state='dying';hitZ.deathTimer=40;player.kills++;
        const xp=ZOMBIE_TYPES[hitZ.type].score;player.xp+=xp;score+=xp;
        checkLevelUp();playSound('zombie');
      }else if(hitZ.state!=='dying')hitZ.state='chase';
    }
  }
}

function doReload(){
  if(player.reloading)return;
  if(player.ammo[player.weapon]===player.maxAmmo[player.weapon])return;
  player.reloading=true;player.reloadTimer=Math.round(WEAPON_RELOAD_TIME[player.weapon]*60);playSound('reload');
}

function checkLevelUp(){
  const needed=player.level*200;
  if(player.xp>=needed){
    player.level++;player.xp-=needed;player.hp=Math.min(player.maxHp,player.hp+25);successFlash=50;
    if(player.level===3&&player.weaponsUnlocked<2){player.weaponsUnlocked=2;playSound('level_up');}
    if(player.level===6&&player.weaponsUnlocked<3){player.weaponsUnlocked=3;playSound('level_up');}
  }
}

// ── QUESTIONS ────────────────────────────────────────────────
function triggerQuestion(trigger){
  if(gameState!==GS.GAME)return;
  const pool=QUESTIONS.filter((_,i)=>!usedQuestions.includes(i));
  if(pool.length===0)usedQuestions=[];
  const avail=QUESTIONS.filter((_,i)=>!usedQuestions.includes(i));
  const q=avail[Math.floor(Math.random()*avail.length)];
  currentQuestion=q;questionTrigger=trigger;gameState=GS.QUESTION;playSound('beep');
}
function answerQuestion(choice){
  if(!currentQuestion)return;
  if(!confirm("Are you sure?"))return;
  const idx=QUESTIONS.indexOf(currentQuestion);
  if(choice===currentQuestion.a){
    playSound('beep');successFlash=80;
    usedQuestions.push(idx);
    for(let w=0;w<player.weaponsUnlocked;w++)player.ammo[w]=Math.min(player.maxAmmo[w],player.ammo[w]+Math.ceil(player.maxAmmo[w]*0.5));
    player.xp+=50;score+=100;checkLevelUp();
    let nearest=null,nd=Infinity;
    for(const z of zombies){if(z.state!=='dead'&&z.state!=='dying'){const dist=Math.hypot(z.x-player.x,z.y-player.y);if(dist<nd){nd=dist;nearest=z;}}}
    if(nearest&&nd<9){nearest.hp=0;nearest.state='dying';nearest.deathTimer=40;player.kills++;spawnBloodParticles(nearest.x,nearest.y,14);}
    if(questionTrigger==='crate'){MAP[interactTarget.y][interactTarget.x]=0;player.cratesCollected++;}
    else if(questionTrigger==='door'){
      player.doorProgress++;
      if(player.doorProgress>=3){MAP[interactTarget.y][interactTarget.x]=0;player.currentLevelIdx++;
        if(player.currentLevelIdx>=LEVELS.length){gameState=GS.WIN;winTimer=300;return;}
        else{gameState=GS.LEVEL_UP;levelUpTimer=160;playSound('level_up');saveGameProgress();return;}
      }else{setTimeout(()=>{triggerQuestion('door');},500);}
    }
    gameState=GS.GAME;
  }else{
    playSound('wrong');dmgFlash=60;player.hp-=15;shakeTimer=25;shakeX=12;shakeY=12;
    for(const z of zombies){if(z.state==='roam'&&Math.hypot(z.x-player.x,z.y-player.y)<14)z.state='chase';}
    if(player.hp<=0){gameState=GS.DEAD;deathTimer=200;}else gameState=GS.GAME;
  }
  currentQuestion=null;
}

// ── ZOMBIE AI ────────────────────────────────────────────────
function updateZombies(){
  const t=globalTime;
  for(let i=0;i<zombies.length;i++){
    zombies[i].separationX=0;zombies[i].separationY=0;
    for(let j=0;j<zombies.length;j++){
      if(i===j)continue;
      const zi=zombies[i],zj=zombies[j];if(zi.state==='dead'||zj.state==='dead')continue;
      const dx=zi.x-zj.x,dy=zi.y-zj.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minDist=(zi.radius||0.35)+(zj.radius||0.35)+0.1;
      if(dist<minDist&&dist>0.001){const force=(minDist-dist)/minDist*0.015;zombies[i].separationX+=dx/dist*force;zombies[i].separationY+=dy/dist*force;}
    }
  }
  for(const z of zombies){
    if(z.state==='dead')continue;
    if(z.state==='dying'){z.deathTimer--;if(z.deathTimer<=0)z.state='dead';continue;}
    if(z.hitFlash>0)z.hitFlash--;
    z.breathPhase+=0.035;z.twitch*=0.92;
    if(Math.random()<0.003){z.twitch=0.05+Math.random()*0.1;z.twitchDir=Math.random()*Math.PI*2;}
    const dx=player.x-z.x,dy=player.y-z.y;
    const distToPlayer=Math.sqrt(dx*dx+dy*dy);
    const nx0=z.x+z.separationX,ny0=z.y+z.separationY;
    if(!circleBlockedAt(nx0,ny0,z.radius)){z.x=nx0;z.y=ny0;}
    if(z.state==='roam'){
      if(distToPlayer<z.alertRadius){z.state='chase';playSound('zombie');}
      z.roamTimer--;
      if(z.roamTimer<=0){z.angle=Math.random()*Math.PI*2;z.roamTimer=70+Math.random()*130;}
      const spd=z.speed;const nx=z.x+Math.cos(z.angle)*spd,ny=z.y+Math.sin(z.angle)*spd;
      if(!circleBlockedAt(nx,ny,z.radius)){z.x=nx;z.y=ny;}else{z.angle+=Math.PI*(0.4+Math.random()*0.6);z.roamTimer=15;}
    }else if(z.state==='chase'){
      if(distToPlayer>z.alertRadius*2.2)z.state='roam';
      const attackDist=(z.radius||0.35)+0.55;
      if(distToPlayer<attackDist){z.state='attack';z.attackTimer=45;}
      else{
        const spd=z.speed*1.6;const ta=Math.atan2(dy,dx);
        const nx=z.x+Math.cos(ta)*spd,ny=z.y+Math.sin(ta)*spd;
        if(!circleBlockedAt(nx,ny,z.radius)){z.x=nx;z.y=ny;}
        else{let moved=false;for(const offset of[0.4,-0.4,0.8,-0.8,1.2,-1.2]){const a2=ta+offset;const nx2=z.x+Math.cos(a2)*spd,ny2=z.y+Math.sin(a2)*spd;if(!circleBlockedAt(nx2,ny2,z.radius)){z.x=nx2;z.y=ny2;z.angle=a2;moved=true;break;}}if(!moved)z.angle=ta+Math.PI*(0.5+Math.random()*0.5);}
        z.angle=ta;
      }
    }else if(z.state==='attack'){
      z.attackTimer--;
      if(z.attackTimer<=0){
        const ad=(z.radius||0.35)+0.65;
        if(distToPlayer<ad){player.hp-=z.dmg;dmgFlash=40;shakeTimer=20;shakeX=9;shakeY=9;playSound('hit');if(player.hp<=0){gameState=GS.DEAD;deathTimer=200;}}
        z.attackTimer=65;
      }
      if(distToPlayer>((z.radius||0.35)+1.3))z.state='chase';
    }
    if(z.state!=='dead'&&Math.random()<0.004)spawnDustParticles(z.x,z.y);
  }
}

// ── PLAYER UPDATE ────────────────────────────────────────────
function updatePlayer(){
  if(gameState!==GS.GAME)return;
  globalTime++;
  player.breathPhase+=0.018;
  player.swayTimer++;
  player.sway=Math.sin(player.swayTimer*0.025)*0.006;
  if(player.reloading){
    player.reloadTimer--;
    if(player.reloadTimer<=0){player.reloading=false;player.ammo[player.weapon]=player.maxAmmo[player.weapon];playSound('beep');}
  }
  if(autoFireTimer>0)autoFireTimer--;
  if(player.muzzleFlash>0)player.muzzleFlash--;
  if(player.recoil>0)player.recoil*=0.72;else player.recoil=0;
  if(player.recoilY>0)player.recoilY*=0.72;else player.recoilY=0;
  const spd=player.moveSpeed;let moved=false;
  if(keys['KeyW']||keys['ArrowUp']){tryMovePlayer(player.x+Math.cos(player.angle)*spd,player.y+Math.sin(player.angle)*spd);moved=true;}
  if(keys['KeyS']||keys['ArrowDown']){tryMovePlayer(player.x-Math.cos(player.angle)*spd,player.y-Math.sin(player.angle)*spd);moved=true;}
  if(keys['KeyA'])player.angle-=player.turnSpeed;
  if(keys['KeyD']||keys['ArrowRight'])player.angle+=player.turnSpeed;
  if(keys['ArrowLeft'])player.angle-=player.turnSpeed;
  let touchingFire=false;
  for(let i=0;i<currentTouches.length;i++){if(d2(currentTouches[i].clientX,currentTouches[i].clientY,BTN.fire.x,BTN.fire.y)<BTN.fire.r*BTN.fire.r)touchingFire=true;}
  if(keys['Space']||touchingFire){if(player.weapon===2)doShoot();else if(!keys['_sl'])doShoot();}
  keys['_sl']=keys['Space']||touchingFire;
  if(keys['KeyR'])doReload();
  if(keys['KeyQ']&&!keys['_ql']){player.weapon=(player.weapon+1)%player.weaponsUnlocked;playSound('reload');}keys['_ql']=keys['KeyQ'];
  if(keys['KeyE']&&!keys['_el'])checkInteract();keys['_el']=keys['KeyE'];
  if(touch.lActive){
    const fw=-touch.ly*spd,st=touch.lx*spd;
    const nx=player.x+Math.cos(player.angle)*fw+Math.cos(player.angle+Math.PI/2)*st;
    const ny=player.y+Math.sin(player.angle)*fw+Math.sin(player.angle+Math.PI/2)*st;
    tryMovePlayer(nx,ny);if(Math.abs(touch.lx)>0.1||Math.abs(touch.ly)>0.1)moved=true;
  }
  if(touch.rActive){player.angle+=touch.rx*cfg.sensitivity*0.045;touch.rx=0;}
  if(moved){player.bobPhase+=0.16;player.bobAmt=Math.sin(player.bobPhase)*0.015;}
  else{player.bobAmt*=0.8;}
  if(moved){player.stepTimer++;if(player.stepTimer%22===0)spawnDustParticles(player.x,player.y);}
  interactTarget=null;
  const fx=Math.floor(player.x+Math.cos(player.angle)*1.3);
  const fy=Math.floor(player.y+Math.sin(player.angle)*1.3);
  if(fx>=0&&fx<MAPW&&fy>=0&&fy<MAPH){const cell=MAP[fy][fx];if(cell===2)interactTarget={type:'door',x:fx,y:fy};if(cell===3)interactTarget={type:'crate',x:fx,y:fy};}
  flickerTimer--;
  if(flickerTimer<=0){
    flickerTimer=Math.floor(4+Math.random()*35);
    flickerVal=0.88+Math.random()*0.12;
    if(Math.random()<0.04){flickerVal=0.3+Math.random()*0.4;if(Math.random()<0.3)spawnSpark(player.x+Math.random()*2-1,player.y+Math.random()*2-1);}
  }
  updateDynLights();
}

function checkInteract(){
  if(interactTarget===null)return;
  if(interactTarget.type==='crate')triggerQuestion('crate');
  else if(interactTarget.type==='door'){
    if(player.cratesCollected<7){dmgFlash=18;playSound('wrong');}
    else triggerQuestion('door');
  }
}

// ── RAYCASTING WITH TEXTURING ────────────────────────────────
const TWO_PI=Math.PI*2;
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

// Wall texture color with noise at given hit offset
function getWallTexel(cellType, wallX, wallY, side, dist){
  const li=Math.min(4,player.currentLevelIdx);
  const t=globalTime;
  let r,g,b;
  if(cellType===1){
    // Concrete wall: noise + cracks
    const noiseVal=Math.sin(wallX*17.3+wallY*31.7)*0.5+Math.cos(wallX*43.1-wallY*12.9)*0.5;
    const crackVal=Math.abs(Math.sin(wallX*7.1)*Math.cos(wallY*5.3));
    const wb=ZONE_THEME[li].wb;
    const n=0.75+noiseVal*0.25+crackVal*0.08;
    r=Math.floor(wb[0]*n);g=Math.floor(wb[1]*n);b=Math.floor(wb[2]*n);
    // Blood stain
    const bloodVal=Math.max(0,Math.sin(wallX*3.7+7)*Math.cos(wallY*2.9+3));
    if(bloodVal>0.72){r=Math.min(255,r+Math.floor(bloodVal*40));g=Math.max(0,g-5);}
    // Grime stripes
    if(Math.sin(wallY*2.1)>0.85){r=Math.max(0,r-15);g=Math.max(0,g-10);b=Math.max(0,b-10);}
  }else if(cellType===2){
    // Door: wood + metal bands
    const stripe=Math.floor(wallX*6)%2;
    if(stripe===0){r=90+Math.floor(Math.sin(wallX*11)*20);g=50+Math.floor(Math.sin(wallY*9)*15);b=20;}
    else{r=40;g=35;b=30;}
    // metal band
    if(wallY>0.4&&wallY<0.45||wallY>0.55&&wallY<0.6){r=80;g=80;b=80;}
    // warning stripes
    if(Math.floor(wallX*8)%3===0){r=Math.min(255,r+80);g=Math.min(255,g+40);b=Math.max(0,b-10);}
  }else if(cellType===3){
    // Crate: wood texture
    const plank=Math.floor(wallX*4)%2;
    if(plank===0){r=100+Math.floor(Math.sin(wallX*9)*25);g=65+Math.floor(Math.sin(wallY*7)*15);b=25;}
    else{r=75;g=50;b=18;}
    if(wallY<0.05||wallY>0.95||Math.abs(wallX-0.5)<0.03){r=40;g=28;b=12;}
  }
  if(side===1){r=Math.floor(r*0.65);g=Math.floor(g*0.65);b=Math.floor(b*0.65);}
  return[r,g,b];
}

function raycast(){
  const fov=Math.PI/3;
  const cols=cfg.quality===0?Math.floor(W/4):cfg.quality===1?Math.floor(W/2):Math.floor(W/1.5);
  const colW=W/cols;
  const halfH=H/2;
  const li=Math.min(4,player.currentLevelIdx);
  const theme=ZONE_THEME[li];
  const fog=theme.fog*flickerVal;
  const zbuf=new Float32Array(W);

  // Ceiling & floor with gradient depth
  const ceilGrad=ctx.createLinearGradient(0,0,0,halfH);
  ceilGrad.addColorStop(0,theme.ceil);
  ceilGrad.addColorStop(1,theme.amb+'0.6)');
  ctx.fillStyle=ceilGrad;ctx.fillRect(0,0,W,halfH+player.bobAmt*H);

  const floorGrad=ctx.createLinearGradient(0,halfH+player.bobAmt*H,0,H);
  floorGrad.addColorStop(0,theme.amb+'0.8)');
  floorGrad.addColorStop(1,theme.floor);
  ctx.fillStyle=floorGrad;ctx.fillRect(0,halfH+player.bobAmt*H,W,H);

  // Column rendering
  for(let col=0;col<cols;col++){
    const rayA=player.angle-fov*0.5+fov*(col/cols);
    const cosR=Math.cos(rayA),sinR=Math.sin(rayA);
    let mx=Math.floor(player.x),my=Math.floor(player.y);
    const dDX=Math.abs(1/(cosR||1e-10)),dDY=Math.abs(1/(sinR||1e-10));
    let sX,sY,stepX,stepY;
    if(cosR<0){stepX=-1;sX=(player.x-mx)*dDX;}else{stepX=1;sX=(mx+1-player.x)*dDX;}
    if(sinR<0){stepY=-1;sY=(player.y-my)*dDY;}else{stepY=1;sY=(my+1-player.y)*dDY;}
    let hit=false,side=0,dist=0,cellHit=0,wallX=0;
    for(let i=0;i<80;i++){
      if(sX<sY){sX+=dDX;mx+=stepX;side=0;}else{sY+=dDY;my+=stepY;side=1;}
      if(mx<0||mx>=MAPW||my<0||my>=MAPH){dist=25;break;}
      const c=MAP[my][mx];
      if(c===1||c===2||c===3){hit=true;cellHit=c;dist=side===0?sX-dDX:sY-dDY;break;}
    }
    const perpDist=dist*Math.cos(rayA-player.angle);
    const trueDist=Math.max(0.08,perpDist);
    const wallH=Math.floor(H/trueDist);
    const wallTop=Math.floor(halfH-wallH*0.5+player.bobAmt*H);

    // Compute wall hit X for texturing
    if(side===0)wallX=player.y+perpDist*sinR;else wallX=player.x+perpDist*cosR;
    wallX-=Math.floor(wallX);

    const bright=clamp(1-trueDist*fog,0.04,1)*flickerVal;

    // Dynamic light contribution
    let dynR=0,dynG=0,dynB=0;
    for(const dl of dynLights){
      const dlDist=Math.hypot(dl.x-player.x-cosR*trueDist,dl.y-player.y-sinR*trueDist);
      if(dlDist<dl.radius){
        const contrib=(1-dlDist/dl.radius)*dl.intensity*0.4;
        const hex=dl.color;
        dynR+=parseInt(hex.slice(1,3),16)/255*contrib*255;
        dynG+=parseInt(hex.slice(3,5),16)/255*contrib*255;
        dynB+=parseInt(hex.slice(5,7),16)/255*contrib*255;
      }
    }

    const[wr,wg,wb]=getWallTexel(cellHit,wallX,wallTop/H,side,trueDist);
    const fr=Math.min(255,Math.floor(wr*bright+dynR));
    const fg2=Math.min(255,Math.floor(wg*bright+dynG));
    const fb=Math.min(255,Math.floor(wb*bright+dynB));

    ctx.fillStyle=`rgb(${fr},${fg2},${fb})`;
    ctx.fillRect(col*colW,wallTop,colW+1,wallH);

    // Wall top/bottom edge highlight (micro-AO)
    if(wallTop>0){
      ctx.fillStyle=`rgba(0,0,0,${Math.min(0.8,0.3/trueDist)})`;
      ctx.fillRect(col*colW,wallTop,colW+1,Math.min(8,wallH*0.05));
    }

    // Fog column overlay
    if(trueDist>3){
      const fogAlpha=Math.min(0.88,(trueDist-3)*fog*2);
      const ambArr=theme.amb.match(/\d+/g);
      ctx.fillStyle=`rgba(${ambArr[0]},${ambArr[1]},${ambArr[2]},${fogAlpha})`;
      ctx.fillRect(col*colW,wallTop,colW+1,wallH);
    }

    const sc=Math.floor(col*colW),ec=Math.min(W-1,Math.floor((col+1)*colW));
    for(let px=sc;px<=ec;px++)zbuf[px]=trueDist;
  }

  // Floor casting (simple textured floor)
  const posX=player.x,posY=player.y;
  const planeX=Math.tan(fov*0.5),planeY=0;
  for(let y=Math.floor(halfH+player.bobAmt*H)+1;y<H;y+=2){
    const rowDist=(halfH)/(y-halfH-player.bobAmt*H||0.001);
    if(rowDist>18)continue;
    const floorBright=clamp(1-rowDist*fog*0.8,0.02,0.7);
    const floorX=posX+rowDist*Math.cos(player.angle-fov*0.5+fov*0);
    const floorY=posY+rowDist*Math.sin(player.angle-fov*0.5+fov*0);
    const noise=Math.sin(Math.floor(floorX)*12.3+Math.floor(floorY)*7.9)*0.3;
    const ambArr=theme.amb.match(/\d+/g);
    const baseR=parseInt(ambArr[0]);const baseG=parseInt(ambArr[1]);const baseB=parseInt(ambArr[2]);
    const fr=Math.min(255,Math.floor((baseR*3+30)*floorBright*(0.8+noise*0.2)));
    const fg2=Math.min(255,Math.floor((baseG*3+20)*floorBright*(0.8+noise*0.2)));
    const fb=Math.min(255,Math.floor((baseB*3+15)*floorBright*(0.8+noise*0.2)));
    ctx.fillStyle=`rgb(${fr},${fg2},${fb})`;
    ctx.fillRect(0,y,W,2);
  }

  return zbuf;
}

// ── SPRITE RENDERER (OVERHAULED) ──────────────────────────────
function renderSprites(zbuf){
  const fov=Math.PI/3;
  const alive=zombies.filter(z=>z.state!=='dead').map(z=>{
    const dx=z.x-player.x,dy=z.y-player.y;
    return{...z,_dist:Math.sqrt(dx*dx+dy*dy),_dx:dx,_dy:dy};
  }).sort((a,b)=>b._dist-a._dist);

  for(const z of alive){
    let angle=Math.atan2(z._dy,z._dx)-player.angle;
    while(angle>Math.PI)angle-=TWO_PI;while(angle<-Math.PI)angle+=TWO_PI;
    if(Math.abs(angle)>fov*0.72)continue;
    const screenX=Math.floor((0.5+angle/fov)*W);
    const dist=Math.max(0.5,z._dist);
    const size=Math.floor(H/dist);
    const top=Math.floor(H*0.5-size*0.5+player.bobAmt*H);
    const left=Math.floor(screenX-size*0.5);
    if(left+size<0||left>W)continue;
    if(zbuf[clamp(screenX,0,W-1)]<dist-0.12)continue;
    const li=Math.min(4,player.currentLevelIdx);
    const theme=ZONE_THEME[li];
    const fog=theme.fog;
    const bright=clamp(1-dist*fog,0.06,1)*flickerVal;

    ctx.save();
    const isDying=z.state==='dying';
    const isAttacking=z.state==='attack';
    const flash=z.hitFlash>0;
    if(isDying)ctx.globalAlpha=bright*(z.deathTimer/40);
    else ctx.globalAlpha=bright;

    const t=performance.now()*0.001;
    const cw=Math.floor(size*0.56);
    const cx2=screenX;
    const headH=Math.floor(size*0.24);
    const bodyH=Math.floor(size*0.40);
    const legH=Math.floor(size*0.32);
    const breathOff=Math.sin(z.breathPhase)*size*0.005;
    const legAnim=Math.sin(t*3.5*(1+z.type)+(z.x+z.y))*0.45;
    const armAnim=Math.cos(t*3.5*(1+z.type)+(z.x+z.y))*0.38;
    const bodyOff=isDying?Math.sin(t*8)*size*0.03:0;
    const twitchOff=z.twitch*Math.cos(z.twitchDir)*size*0.05;

    // Drop shadow
    ctx.globalAlpha=(isDying?bright*(z.deathTimer/40):bright)*0.5;
    const shadowScaleX=Math.min(1,2/dist);
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.beginPath();ctx.ellipse(cx2,top+headH+bodyH+legH+size*0.03,cw*0.45*shadowScaleX,size*0.035,0,0,TWO_PI);ctx.fill();
    ctx.globalAlpha=isDying?bright*(z.deathTimer/40):bright;

    // Legs with animation
    const pantCol=flash?'#ffaaaa':(isAttacking?lightenColor(z.pants,30):z.pants);
    // Left leg
    ctx.fillStyle=pantCol;
    const leftLegX=cx2-cw*0.32+legAnim*size*0.07;
    ctx.fillRect(leftLegX,top+headH+bodyH-4,cw*0.28,legH);
    // Right leg
    const rightLegX=cx2+cw*0.04-legAnim*size*0.07;
    ctx.fillRect(rightLegX,top+headH+bodyH-4,cw*0.28,legH);
    // Feet (darker)
    ctx.fillStyle=flash?'#ff8888':'#0a0a0a';
    ctx.fillRect(leftLegX-3,top+headH+bodyH+legH-6,cw*0.3+3,7);
    ctx.fillRect(rightLegX-3,top+headH+bodyH+legH-6,cw*0.3+3,7);

    // Torso with gradient
    const torsoGrad=ctx.createLinearGradient(cx2-cw*0.55,top+headH,cx2+cw*0.55,top+headH);
    const shirtBase=flash?'#ff8888':z.shirt;
    torsoGrad.addColorStop(0,darkenColor(shirtBase,40));
    torsoGrad.addColorStop(0.4,flash?'#ffcccc':z.shirt);
    torsoGrad.addColorStop(1,darkenColor(shirtBase,30));
    ctx.fillStyle=torsoGrad;
    ctx.fillRect(cx2-cw*0.52+twitchOff+bodyOff,top+headH+breathOff,cw*1.04,bodyH);

    // Damage / blood on torso
    if(!flash&&z.hp<z.maxHp*0.7){
      const bloodAmt=(1-z.hp/z.maxHp)*0.9;
      ctx.fillStyle=`rgba(140,0,0,${bloodAmt*0.8})`;
      ctx.fillRect(cx2-cw*0.2+bodyOff,top+headH+bodyH*0.25+breathOff,cw*0.4,bodyH*0.35);
    }

    // Arms
    const armColor=flash?'#ffcccc':z.shirt;
    if(isAttacking){
      const sw=Math.sin(t*7)*0.7;
      ctx.fillStyle=armColor;
      ctx.fillRect(cx2-cw*0.82,top+headH+size*0.01+sw*size*0.12,cw*0.32,bodyH*0.28);
      ctx.fillRect(cx2+cw*0.5,top+headH+size*0.01-sw*size*0.12,cw*0.32,bodyH*0.28);
      ctx.fillStyle=flash?'#ffeecc':z.skin;
      ctx.fillRect(cx2-cw*0.82,top+headH+size*0.01+sw*size*0.12+bodyH*0.28,cw*0.26,bodyH*0.38);
      ctx.fillRect(cx2+cw*0.56,top+headH+size*0.01-sw*size*0.12+bodyH*0.28,cw*0.26,bodyH*0.38);
      // Claws
      ctx.fillStyle='rgba(0,0,0,0.9)';
      for(let c=0;c<3;c++){ctx.fillRect(cx2-cw*0.82+c*5,top+headH+size*0.01+sw*size*0.12+bodyH*0.66,3,8);}
      for(let c=0;c<3;c++){ctx.fillRect(cx2+cw*0.56+c*5,top+headH+size*0.01-sw*size*0.12+bodyH*0.66,3,8);}
    }else{
      ctx.fillStyle=armColor;
      ctx.fillRect(cx2-cw*0.82+armAnim*size*0.04,top+headH+size*0.01+breathOff,cw*0.32,bodyH*0.28);
      ctx.fillRect(cx2+cw*0.5-armAnim*size*0.04,top+headH+size*0.01+breathOff,cw*0.32,bodyH*0.28);
      ctx.fillStyle=flash?'#ffeecc':z.skin;
      ctx.fillRect(cx2-cw*0.82+armAnim*size*0.04,top+headH+size*0.01+breathOff+bodyH*0.28,cw*0.26,bodyH*0.35);
      ctx.fillRect(cx2+cw*0.56-armAnim*size*0.04,top+headH+size*0.01+breathOff+bodyH*0.28,cw*0.26,bodyH*0.35);
    }

    // Head with gradient
    const headGrad=ctx.createLinearGradient(cx2-cw*0.35,top,cx2+cw*0.35,top);
    headGrad.addColorStop(0,darkenColor(z.skin,50));
    headGrad.addColorStop(0.5,flash?'#ffffff':z.skin);
    headGrad.addColorStop(1,darkenColor(z.skin,40));
    ctx.fillStyle=headGrad;
    ctx.fillRect(cx2-cw*0.33+twitchOff,top+breathOff*0.5,cw*0.66,headH);

    // Hair / skull damage
    ctx.fillStyle=flash?'#fff':'#0a0606';
    ctx.fillRect(cx2-cw*0.33+twitchOff,top+breathOff*0.5,cw*0.66,headH*0.22);
    // Jaw
    ctx.fillStyle=flash?'#ffddcc':darkenColor(z.skin,30);
    ctx.fillRect(cx2-cw*0.28+twitchOff,top+headH*0.68+breathOff*0.5,cw*0.56,headH*0.3);
    // Teeth
    ctx.fillStyle='rgba(220,210,180,0.9)';
    const teethY=top+headH*0.78+breathOff*0.5;
    for(let ti=0;ti<4;ti++)ctx.fillRect(cx2-cw*0.22+ti*(cw*0.1)+twitchOff,teethY,Math.max(2,cw*0.07),headH*0.14);

    // Glowing eyes
    const eyeS=Math.max(2,Math.floor(size*0.09));
    const eyeY=top+headH*0.32+breathOff*0.5;
    if(flash){ctx.fillStyle='#ffffff';ctx.fillRect(cx2-cw*0.22+twitchOff,eyeY,eyeS*1.2,eyeS*1.2);ctx.fillRect(cx2+cw*0.1+twitchOff,eyeY,eyeS*1.2,eyeS*1.2);}
    else{
      // Glow halo
      const glowRadius=eyeS*3.5;
      const eg=ctx.createRadialGradient(cx2-cw*0.16+twitchOff,eyeY+eyeS*0.5,0,cx2-cw*0.16+twitchOff,eyeY+eyeS*0.5,glowRadius);
      eg.addColorStop(0,z.eyeColor);eg.addColorStop(0.4,z.eyeColor+'88');eg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=eg;ctx.fillRect(cx2-cw*0.16-glowRadius+twitchOff,eyeY-glowRadius,glowRadius*2,glowRadius*2);
      const eg2=ctx.createRadialGradient(cx2+cw*0.16+twitchOff,eyeY+eyeS*0.5,0,cx2+cw*0.16+twitchOff,eyeY+eyeS*0.5,glowRadius);
      eg2.addColorStop(0,z.eyeColor);eg2.addColorStop(0.4,z.eyeColor+'88');eg2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=eg2;ctx.fillRect(cx2+cw*0.16-glowRadius+twitchOff,eyeY-glowRadius,glowRadius*2,glowRadius*2);
      ctx.fillStyle=z.eyeColor;
      ctx.fillRect(cx2-cw*0.22+twitchOff,eyeY,eyeS,eyeS);
      ctx.fillRect(cx2+cw*0.1+twitchOff,eyeY,eyeS,eyeS);
      // Pupil
      ctx.fillStyle='#000';ctx.fillRect(cx2-cw*0.2+twitchOff,eyeY+1,Math.floor(eyeS*0.5),Math.floor(eyeS*0.5));
      ctx.fillRect(cx2+cw*0.12+twitchOff,eyeY+1,Math.floor(eyeS*0.5),Math.floor(eyeS*0.5));
    }

    // HP bar (closer zombies)
    if(dist<9&&z.state!=='dying'){
      const hp=z.hp/z.maxHp;const bw2=Math.floor(size*0.88),bx=cx2-bw2*0.5,by2=top-18;
      ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(bx-1,by2-1,bw2+2,10);
      const hpColor=hp>0.5?'#00ff44':hp>0.25?'#ffcc00':'#ff2200';
      ctx.fillStyle=hpColor;ctx.fillRect(bx,by2,(bw2)*hp,8);
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.strokeRect(bx,by2,bw2,8);
      ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font=`${Math.max(8,Math.floor(size*0.12))}px Courier New`;
      ctx.textAlign='center';ctx.fillText(ZOMBIE_TYPES[z.type].name,cx2,by2-4);ctx.textAlign='left';
    }
    ctx.restore();
  }
}

function darkenColor(hex,amount){
  const r=Math.max(0,parseInt(hex.slice(1,3),16)-amount);
  const g=Math.max(0,parseInt(hex.slice(3,5),16)-amount);
  const b=Math.max(0,parseInt(hex.slice(5,7),16)-amount);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function lightenColor(hex,amount){
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+amount);
  const g=Math.min(255,parseInt(hex.slice(3,5),16)+amount);
  const b=Math.min(255,parseInt(hex.slice(5,7),16)+amount);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ── FLASHLIGHT / POST-PROCESS ────────────────────────────────
function renderFlashlight(){
  const cx=W*0.5,cy=H*0.5+player.bobAmt*H;
  const li=Math.min(4,player.currentLevelIdx);
  const theme=ZONE_THEME[li];
  // Flashlight cone (bright center, dark edges)
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,W*0.7);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(0.35,'rgba(0,0,0,0.15)');
  grd.addColorStop(0.62,'rgba(0,0,0,0.62)');
  grd.addColorStop(1,'rgba(0,0,0,0.97)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // Atmospheric zone tint
  const ambArr=theme.amb.match(/\d+/g);
  ctx.fillStyle=`rgba(${ambArr[0]},${ambArr[1]},${ambArr[2]},${0.08+Math.random()*0.02*(1-flickerVal)*4})`;
  ctx.fillRect(0,0,W,H);

  // Film grain
  ctx.save();ctx.globalAlpha=0.04+Math.random()*0.02;
  ctx.drawImage(grainCanvas,0,0,W,H);ctx.restore();

  // Chromatic aberration (edge color shift)
  if(dmgFlash>0){
    ctx.save();ctx.globalCompositeOperation='screen';
    ctx.globalAlpha=Math.min(0.5,dmgFlash/80);
    ctx.fillStyle='rgba(255,0,0,0.4)';ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Vignette
  const vig=ctx.createRadialGradient(W*0.5,H*0.5,H*0.25,W*0.5,H*0.5,H*0.82);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.68)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  // Scan lines (subtle)
  ctx.save();ctx.globalAlpha=0.025;
  for(let y=0;y<H;y+=3){ctx.fillStyle='rgba(0,0,0,1)';ctx.fillRect(0,y,W,1);}
  ctx.restore();
}

// ── CINEMATIC WEAPON RENDER ───────────────────────────────────
function renderWeapon(){
  const recoilOff=player.recoil*H*0.09;
  const bobOff=player.bobAmt*H*3.8;
  const swayOff=player.sway*W*0.5;
  const breathOff=Math.sin(player.breathPhase)*H*0.004;
  const wY=H*0.72+recoilOff+bobOff+breathOff;
  const cx=W*0.5+swayOff;
  const t=performance.now()*0.001;
  ctx.save();

  if(player.weapon===0){
    // === PISTOL ===
    const bw=W*0.09,bh=H*0.38;
    // Hand (right)
    const handGrad=ctx.createLinearGradient(cx-bw*0.3,wY,cx+bw*1.2,wY);
    handGrad.addColorStop(0,'#2a1a0a');handGrad.addColorStop(0.5,'#4a2f18');handGrad.addColorStop(1,'#1a0f05');
    ctx.fillStyle=handGrad;
    ctx.beginPath();ctx.moveTo(cx-bw*0.4,H);ctx.lineTo(cx+bw*1.1,H);
    ctx.lineTo(cx+bw*0.9,wY+bh*0.22);ctx.lineTo(cx-bw*0.2,wY+bh*0.18);ctx.fill();
    // Grip
    const gripGrad=ctx.createLinearGradient(cx-bw*0.1,wY,cx+bw*0.2,wY);
    gripGrad.addColorStop(0,'#111');gripGrad.addColorStop(0.5,'#333');gripGrad.addColorStop(1,'#111');
    ctx.fillStyle=gripGrad;ctx.fillRect(cx-bw*0.05,wY-bh*0.55,bw*0.22,bh*0.55);
    // Grip texture
    ctx.fillStyle='rgba(255,255,255,0.05)';
    for(let gi=0;gi<6;gi++)ctx.fillRect(cx,wY-bh*0.5+gi*bh*0.07,bw*0.15,2);
    // Slide
    const slideGrad=ctx.createLinearGradient(cx-bw*0.4,wY,cx+bw*0.4,wY);
    slideGrad.addColorStop(0,'#1a1a1a');slideGrad.addColorStop(0.3,'#666');slideGrad.addColorStop(0.5,'#999');slideGrad.addColorStop(0.7,'#666');slideGrad.addColorStop(1,'#111');
    ctx.fillStyle=slideGrad;ctx.fillRect(cx-bw*0.38,wY-bh,bw*0.75,bh*0.7);
    // Slide serrations
    ctx.fillStyle='rgba(0,0,0,0.4)';
    for(let si=0;si<5;si++)ctx.fillRect(cx+bw*0.15+si*bw*0.1,wY-bh+2,4,bh*0.25);
    // Barrel
    ctx.fillStyle='#0a0a0a';ctx.fillRect(cx-bw*0.1,wY-bh-H*0.025,bw*0.14,H*0.025+5);
    // Sight
    ctx.fillStyle='#00ff44';ctx.fillRect(cx-bw*0.02,wY-bh-H*0.02,4,H*0.018);
    // Trigger
    ctx.strokeStyle='#444';ctx.lineWidth=3;ctx.beginPath();
    ctx.arc(cx+bw*0.05,wY-bh*0.38,bh*0.14,0.3,Math.PI-0.3,true);ctx.stroke();
    // Trigger guard
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();
    ctx.arc(cx+bw*0.05,wY-bh*0.22,bh*0.08,0,Math.PI*2);ctx.stroke();
    if(player.muzzleFlash>0){
      const fi=player.muzzleFlash/12;
      ctx.save();ctx.globalAlpha=fi*0.9;
      const mg=ctx.createRadialGradient(cx,wY-bh-H*0.04,0,cx,wY-bh-H*0.04,W*0.14);
      mg.addColorStop(0,'#ffffff');mg.addColorStop(0.2,'#ffff88');mg.addColorStop(0.5,'#ffaa00');mg.addColorStop(1,'rgba(255,50,0,0)');
      ctx.fillStyle=mg;ctx.beginPath();ctx.arc(cx,wY-bh-H*0.04,W*0.14,0,TWO_PI);ctx.fill();
      // Muzzle streaks
      for(let ms=0;ms<6;ms++){
        const ma=(ms/6)*Math.PI*2;const ml=W*(0.05+Math.random()*0.05)*fi;
        ctx.fillStyle=`rgba(255,200,50,${fi*0.7})`;
        ctx.fillRect(cx+Math.cos(ma)*W*0.03,wY-bh-H*0.04+Math.sin(ma)*H*0.01,Math.cos(ma)*ml,2);
      }
      ctx.restore();
    }
  }
  else if(player.weapon===1){
    // === SHOTGUN ===
    const bw=W*0.13,bh=H*0.5;
    // Hand left
    const handGrad=ctx.createLinearGradient(cx-bw*0.8,wY,cx+bw*0.8,wY);
    handGrad.addColorStop(0,'#1a0f05');handGrad.addColorStop(0.5,'#4a2f18');handGrad.addColorStop(1,'#1a0f05');
    ctx.fillStyle=handGrad;
    ctx.beginPath();ctx.moveTo(cx-bw*0.9,H);ctx.lineTo(cx+bw*0.9,H);
    ctx.lineTo(cx+bw*0.7,wY+bh*0.15);ctx.lineTo(cx-bw*0.7,wY+bh*0.15);ctx.fill();
    // Stock (wood)
    const woodGrad=ctx.createLinearGradient(cx-bw*0.1,wY,cx+bw*0.1,wY);
    woodGrad.addColorStop(0,'#3a1a00');woodGrad.addColorStop(0.5,'#6a3010');woodGrad.addColorStop(1,'#3a1a00');
    ctx.fillStyle=woodGrad;ctx.fillRect(cx-bw*0.08,wY-bh*0.7,bw*0.16,bh*0.7);
    // Wood grain
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
    for(let wg=0;wg<8;wg++){ctx.beginPath();ctx.moveTo(cx-bw*0.08,wY-bh*0.7+wg*bh*0.09);ctx.lineTo(cx+bw*0.08,wY-bh*0.7+wg*bh*0.085);ctx.stroke();}
    // Left barrel
    const b1g=ctx.createLinearGradient(cx-bw*0.46,wY,cx-bw*0.04,wY);
    b1g.addColorStop(0,'#111');b1g.addColorStop(0.4,'#666');b1g.addColorStop(0.6,'#888');b1g.addColorStop(1,'#222');
    ctx.fillStyle=b1g;ctx.fillRect(cx-bw*0.46,wY-bh,bw*0.4,bh*0.85);
    // Right barrel
    const b2g=ctx.createLinearGradient(cx+bw*0.06,wY,cx+bw*0.46,wY);
    b2g.addColorStop(0,'#222');b2g.addColorStop(0.4,'#888');b2g.addColorStop(0.6,'#666');b2g.addColorStop(1,'#111');
    ctx.fillStyle=b2g;ctx.fillRect(cx+bw*0.06,wY-bh,bw*0.4,bh*0.85);
    // Barrel rib (center)
    ctx.fillStyle='#0a0a0a';ctx.fillRect(cx-bw*0.05,wY-bh,bw*0.1,bh*0.85);
    // Barrel ring near muzzle
    ctx.fillStyle='#888';ctx.fillRect(cx-bw*0.48,wY-bh+bh*0.05,bw*0.96,12);
    // Guard
    ctx.fillStyle='#333';ctx.fillRect(cx-bw*0.5,wY-bh*0.5,bw*1.0,10);
    if(player.muzzleFlash>0){
      const fi=player.muzzleFlash/12;ctx.save();ctx.globalAlpha=fi;
      const mg=ctx.createRadialGradient(cx,wY-bh-H*0.01,0,cx,wY-bh-H*0.01,W*0.22);
      mg.addColorStop(0,'#ffffff');mg.addColorStop(0.15,'#ffff44');mg.addColorStop(0.4,'#ff6600');mg.addColorStop(1,'rgba(255,0,0,0)');
      ctx.fillStyle=mg;ctx.beginPath();ctx.arc(cx,wY-bh-H*0.01,W*0.22,0,TWO_PI);ctx.fill();
      // Wider streak
      ctx.fillStyle=`rgba(255,180,30,${fi*0.8})`;
      ctx.fillRect(cx-W*0.02,wY-bh-H*0.18,W*0.04,H*0.18);
      ctx.restore();
    }
  }
  else if(player.weapon===2){
    // === ASSAULT RIFLE ===
    const bw=W*0.15,bh=H*0.54;
    // Hand
    const handGrad=ctx.createLinearGradient(cx-bw*0.6,wY,cx+bw*0.6,wY);
    handGrad.addColorStop(0,'#1a0f05');handGrad.addColorStop(0.5,'#3a2010');handGrad.addColorStop(1,'#1a0f05');
    ctx.fillStyle=handGrad;
    ctx.beginPath();ctx.moveTo(cx-bw*0.7,H);ctx.lineTo(cx+bw*0.7,H);
    ctx.lineTo(cx+bw*0.55,wY+bh*0.1);ctx.lineTo(cx-bw*0.55,wY+bh*0.1);ctx.fill();
    // Lower receiver (pistol grip area)
    const lrg=ctx.createLinearGradient(cx-bw*0.12,wY,cx+bw*0.12,wY);
    lrg.addColorStop(0,'#111');lrg.addColorStop(0.5,'#2a2a2a');lrg.addColorStop(1,'#111');
    ctx.fillStyle=lrg;ctx.fillRect(cx-bw*0.1,wY-bh*0.45,bw*0.2,bh*0.45);
    // Main receiver
    const recGrad=ctx.createLinearGradient(cx-bw*0.3,wY,cx+bw*0.3,wY);
    recGrad.addColorStop(0,'#181818');recGrad.addColorStop(0.35,'#484848');recGrad.addColorStop(0.5,'#606060');recGrad.addColorStop(0.65,'#484848');recGrad.addColorStop(1,'#181818');
    ctx.fillStyle=recGrad;ctx.fillRect(cx-bw*0.28,wY-bh,bw*0.56,bh*0.82);
    // Picatinny rail cuts
    ctx.fillStyle='rgba(0,0,0,0.5)';
    for(let ri=0;ri<8;ri++)ctx.fillRect(cx-bw*0.26+ri*bw*0.06,wY-bh+4,bw*0.03,8);
    // Barrel
    ctx.fillStyle='#0f0f0f';ctx.fillRect(cx-bw*0.08,wY-bh-H*0.06,bw*0.16,H*0.06);
    // Suppressor/muzzle device
    ctx.fillStyle='#222';ctx.fillRect(cx-bw*0.09,wY-bh-H*0.085,bw*0.18,H*0.04);
    ctx.fillStyle='#555';ctx.fillRect(cx-bw*0.09,wY-bh-H*0.09,bw*0.18,5);
    // Scope / optic
    ctx.fillStyle='#1a1a1a';ctx.fillRect(cx-bw*0.12,wY-bh+bh*0.05,bw*0.24,bh*0.14);
    const scopeGrad=ctx.createRadialGradient(cx,wY-bh+bh*0.12,0,cx,wY-bh+bh*0.12,bw*0.06);
    scopeGrad.addColorStop(0,'rgba(0,120,255,0.5)');scopeGrad.addColorStop(1,'rgba(0,0,50,0.8)');
    ctx.fillStyle=scopeGrad;ctx.beginPath();ctx.ellipse(cx,wY-bh+bh*0.12,bw*0.07,bh*0.06,0,0,TWO_PI);ctx.fill();
    ctx.strokeStyle='rgba(0,200,255,0.6)';ctx.lineWidth=1;ctx.beginPath();
    ctx.moveTo(cx-bw*0.03,wY-bh+bh*0.12);ctx.lineTo(cx+bw*0.03,wY-bh+bh*0.12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,wY-bh+bh*0.08);ctx.lineTo(cx,wY-bh+bh*0.16);ctx.stroke();
    // Red dot
    ctx.fillStyle='rgba(255,0,0,0.9)';ctx.beginPath();ctx.arc(cx,wY-bh+bh*0.12,2,0,TWO_PI);ctx.fill();
    // Magazine
    ctx.fillStyle='#222';ctx.fillRect(cx-bw*0.08,wY-bh*0.5,bw*0.16,bh*0.32);
    // Mag texture
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
    for(let mi=0;mi<4;mi++){ctx.beginPath();ctx.moveTo(cx-bw*0.07,wY-bh*0.48+mi*bh*0.07);ctx.lineTo(cx+bw*0.07,wY-bh*0.48+mi*bh*0.07);ctx.stroke();}
    // Stock (skeleton)
    ctx.strokeStyle='#333';ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(cx-bw*0.28,wY-bh+bh*0.68);ctx.lineTo(cx-bw*0.55,wY-bh+bh*0.9);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-bw*0.28,wY-bh+bh*0.82);ctx.lineTo(cx-bw*0.55,wY-bh+bh*0.95);ctx.stroke();
    // Flashlight on barrel
    ctx.fillStyle='#333';ctx.fillRect(cx+bw*0.1,wY-bh+bh*0.06,bw*0.08,bh*0.22);
    ctx.fillStyle='rgba(220,220,180,0.9)';ctx.beginPath();ctx.arc(cx+bw*0.14,wY-bh+bh*0.06,Math.max(2,bw*0.025),0,TWO_PI);ctx.fill();
    // Tactical light beam
    const lightGrd=ctx.createRadialGradient(cx+bw*0.14,wY-bh+bh*0.06,0,cx+bw*0.14,wY-bh+bh*0.06,H*0.3);
    lightGrd.addColorStop(0,'rgba(220,220,150,0.12)');lightGrd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lightGrd;ctx.beginPath();ctx.arc(cx+bw*0.14,wY-bh+bh*0.06,H*0.3,0,TWO_PI);ctx.fill();

    if(player.muzzleFlash>0){
      const fi=player.muzzleFlash/12;ctx.save();ctx.globalAlpha=fi;
      const mg=ctx.createRadialGradient(cx,wY-bh-H*0.07,0,cx,wY-bh-H*0.07,W*0.18);
      mg.addColorStop(0,'#ffffff');mg.addColorStop(0.15,'#aaffff');mg.addColorStop(0.4,'#0044ff');mg.addColorStop(1,'rgba(0,0,200,0)');
      ctx.fillStyle=mg;ctx.beginPath();ctx.arc(cx,wY-bh-H*0.07,W*0.18,0,TWO_PI);ctx.fill();
      ctx.restore();
    }
  }
  ctx.restore();
}

// ── MINI MAP ─────────────────────────────────────────────────
function renderMiniMap(){
  const mapSize=Math.floor(W*0.15);
  const mx=W-mapSize-14,my=14;
  const cellSize=mapSize/MAPW;
  ctx.save();ctx.globalAlpha=0.82;
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(mx,my,mapSize,mapSize);
  // Border
  ctx.strokeStyle='rgba(0,255,255,0.6)';ctx.lineWidth=2;ctx.strokeRect(mx,my,mapSize,mapSize);
  for(let y=0;y<MAPH;y++){
    for(let x=0;x<MAPW;x++){
      if(MAP[y][x]===1){
        const li=Math.min(4,player.currentLevelIdx);
        const wb=ZONE_THEME[li].wb;
        ctx.fillStyle=`rgb(${wb[0]*0.6},${wb[1]*0.6},${wb[2]*0.6})`;
        ctx.fillRect(mx+x*cellSize,my+y*cellSize,cellSize,cellSize);
      }else if(MAP[y][x]===2){ctx.fillStyle='#ff8800';ctx.fillRect(mx+x*cellSize,my+y*cellSize,cellSize,cellSize);}
      else if(MAP[y][x]===3){ctx.fillStyle='#00cc44';ctx.fillRect(mx+x*cellSize,my+y*cellSize,cellSize,cellSize);}
    }
  }
  // Zombies on minimap
  for(const z of zombies){
    if(z.state==='dead')continue;
    const zx=mx+z.x*cellSize,zy=my+z.y*cellSize;
    ctx.fillStyle=z.state==='chase'||z.state==='attack'?'#ff2200':'#ff6600';
    ctx.beginPath();ctx.arc(zx,zy,Math.max(1,cellSize*1.2),0,TWO_PI);ctx.fill();
  }
  // Player dot + FOV indicator
  const px=mx+player.x*cellSize,py=my+player.y*cellSize;
  ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(px,py,cellSize*1.8,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1;ctx.beginPath();
  ctx.moveTo(px,py);ctx.lineTo(px+Math.cos(player.angle-0.5)*cellSize*5,py+Math.sin(player.angle-0.5)*cellSize*5);
  ctx.lineTo(px+Math.cos(player.angle+0.5)*cellSize*5,py+Math.sin(player.angle+0.5)*cellSize*5);
  ctx.closePath();ctx.stroke();
  ctx.restore();
}

// ── HUD ───────────────────────────────────────────────────────
function renderHUD(){
  const pad=14;const fs=Math.max(10,Math.floor(H*0.019));const fs2=Math.max(9,Math.floor(H*0.015));
  const li=Math.min(4,player.currentLevelIdx);
  const theme=ZONE_THEME[li];

  // Top-left info panel (glass effect)
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(pad-2,pad-2,265,90);
  const panelGrad=ctx.createLinearGradient(pad-2,pad-2,pad+265,pad-2);
  panelGrad.addColorStop(0,`rgba(${theme.wb[0]},${theme.wb[1]},${theme.wb[2]},0.25)`);
  panelGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=panelGrad;ctx.fillRect(pad-2,pad-2,265,90);
  ctx.strokeStyle=theme.acc;ctx.lineWidth=1.5;ctx.strokeRect(pad-2,pad-2,265,90);
  // Inset glow
  ctx.strokeStyle=`rgba(${theme.wb[0]+30},${theme.wb[1]+30},${theme.wb[2]+30},0.2)`;ctx.lineWidth=1;
  ctx.strokeRect(pad,pad,261,86);

  const lvlName=player.currentLevelIdx<LEVELS.length?LEVELS[player.currentLevelIdx].name:"FINAL SURVIVAL";
  ctx.fillStyle=theme.acc;ctx.font=`bold ${Math.floor(H*0.021)}px Courier New`;
  ctx.fillText(`▶ ${lvlName}`,pad+4,pad+20);
  ctx.fillStyle='#00ee55';ctx.font=`bold ${fs2}px Courier New`;
  ctx.fillText(`CRATES: ${player.cratesCollected}/7`,pad+4,pad+41);
  ctx.fillStyle='#ff8800';ctx.fillText(`LOCKS: ${player.doorProgress}/3`,pad+150,pad+41);
  ctx.fillStyle='#888';ctx.font=`${fs2}px Courier New`;
  ctx.fillText(`SCORE: ${score}  KILLS: ${player.kills}`,pad+4,pad+60);
  ctx.fillStyle='#555';ctx.fillText(`Q: ${usedQuestions.length}/50`,pad+4,pad+78);
  ctx.restore();

  renderMiniMap();

  // HP bar
  const hpW=Math.min(220,W*0.3);const hpPct=Math.max(0,player.hp/player.maxHp);
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(pad-2,H-72-pad,hpW+14,58);
  ctx.strokeStyle='#aa0000';ctx.lineWidth=1.5;ctx.strokeRect(pad-2,H-72-pad,hpW+14,58);
  ctx.fillStyle='#ff3333';ctx.font=`bold ${fs2}px Courier New`;
  ctx.fillText(`HP  ${Math.ceil(player.hp)}/${player.maxHp}`,pad+2,H-76-pad);
  // HP bar background with crack pattern
  ctx.fillStyle='#220000';ctx.fillRect(pad,H-65-pad,hpW,15);
  const hpGrad=ctx.createLinearGradient(pad,H-65-pad,pad+hpW*hpPct,H-65-pad);
  if(hpPct>0.5){hpGrad.addColorStop(0,'#006600');hpGrad.addColorStop(1,'#00ff44');}
  else if(hpPct>0.25){hpGrad.addColorStop(0,'#664400');hpGrad.addColorStop(1,'#ffcc00');}
  else{hpGrad.addColorStop(0,'#440000');hpGrad.addColorStop(0.5,'#ff2200');hpGrad.addColorStop(1,'#ff6600');}
  ctx.fillStyle=hpGrad;ctx.fillRect(pad,H-65-pad,hpW*hpPct,15);
  // HP shimmer
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(pad,H-65-pad,hpW*hpPct,6);
  // XP bar
  const xpPct=player.xp/(player.level*200);
  ctx.fillStyle='#001833';ctx.fillRect(pad,H-44-pad,hpW,8);
  const xpGrd=ctx.createLinearGradient(pad,0,pad+hpW*xpPct,0);
  xpGrd.addColorStop(0,'#0044aa');xpGrd.addColorStop(1,'#00aaff');
  ctx.fillStyle=xpGrd;ctx.fillRect(pad,H-44-pad,hpW*xpPct,8);
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(pad,H-44-pad,hpW*xpPct,3);
  ctx.fillStyle='#88aacc';ctx.font=`${fs2}px Courier New`;
  ctx.fillText(`LV ${player.level}   XP ${player.xp}`,pad,H-49-pad);
  // Revives
  ctx.font=`${Math.floor(H*0.025)}px Courier New`;
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<player.revives?'#ff0055':'rgba(50,0,17,0.6)';
    if(i<player.revives){ctx.shadowColor='#ff0055';ctx.shadowBlur=8;}else{ctx.shadowBlur=0;}
    ctx.fillText('♥',pad+i*28,H-28-pad);
  }
  ctx.shadowBlur=0;
  ctx.restore();

  // Weapon panel (bottom right)
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(W-152-pad,H-74-pad,150,64);
  const wpnGrad=ctx.createLinearGradient(W-152-pad,H-74-pad,W-2-pad,H-74-pad);
  wpnGrad.addColorStop(0,'rgba(50,40,0,0.4)');wpnGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=wpnGrad;ctx.fillRect(W-152-pad,H-74-pad,150,64);
  ctx.strokeStyle='#aa8800';ctx.lineWidth=1.5;ctx.strokeRect(W-152-pad,H-74-pad,150,64);
  ctx.fillStyle='#ccaa00';ctx.font=`${fs2}px Courier New`;ctx.textAlign='right';
  ctx.fillText(WEAPON_NAMES[player.weapon],W-pad-4,H-76-pad);
  ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.floor(H*0.034)}px Courier New`;
  ctx.fillText(`${player.ammo[player.weapon]}`,W-pad-52,H-52-pad);
  ctx.fillStyle='#666';ctx.font=`${Math.floor(H*0.019)}px Courier New`;
  ctx.fillText(`/${player.maxAmmo[player.weapon]}`,W-pad-4,H-52-pad);
  if(player.reloading){
    const rp=1-(player.reloadTimer/(WEAPON_RELOAD_TIME[player.weapon]*60));
    const barW=140;
    ctx.fillStyle='#440000';ctx.fillRect(W-152-pad+5,H-34-pad,barW,8);
    ctx.fillStyle='#ff4400';ctx.fillRect(W-152-pad+5,H-34-pad,barW*rp,8);
    ctx.fillStyle='#ff6600';ctx.font=`${fs2}px Courier New`;ctx.textAlign='right';
    ctx.fillText(`RELOADING ${Math.floor(rp*100)}%`,W-pad-4,H-30-pad);
  }
  ctx.textAlign='left';ctx.restore();

  // Crosshair
  const cx2=W*0.5,cy2=H*0.5+player.bobAmt*H;
  const cs=10+player.recoil*22;
  ctx.save();
  ctx.strokeStyle='rgba(0,255,200,0.85)';ctx.lineWidth=1.5;
  ctx.shadowColor='#00ffcc';ctx.shadowBlur=4;
  ctx.beginPath();ctx.moveTo(cx2-cs,cy2);ctx.lineTo(cx2-6,cy2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx2+6,cy2);ctx.lineTo(cx2+cs,cy2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx2,cy2-cs);ctx.lineTo(cx2,cy2-6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx2,cy2+6);ctx.lineTo(cx2,cy2+cs);ctx.stroke();
  ctx.fillStyle='rgba(255,50,50,0.9)';ctx.beginPath();ctx.arc(cx2,cy2,2.5,0,TWO_PI);ctx.fill();
  ctx.restore();

  // Interact prompt
  if(interactTarget!==null){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(W*0.5-175,H*0.5+55,350,42);
    if(interactTarget.type==='door'){
      if(player.cratesCollected<7){
        ctx.strokeStyle='#ff2200';ctx.lineWidth=2;ctx.strokeRect(W*0.5-175,H*0.5+55,350,42);
        ctx.fillStyle='#ff3300';ctx.font=`bold ${fs2+1}px Courier New`;ctx.textAlign='center';
        ctx.fillText('COLLECT ALL 7 CRATES FIRST!',W*0.5,H*0.5+82);
      }else{
        ctx.strokeStyle='#ff8800';ctx.lineWidth=2;ctx.strokeRect(W*0.5-175,H*0.5+55,350,42);
        ctx.fillStyle='#ff8800';ctx.font=`bold ${fs2+1}px Courier New`;ctx.textAlign='center';
        ctx.fillText(`[E] UNLOCK DOOR (${player.doorProgress}/3)`,W*0.5,H*0.5+82);
      }
    }else{
      ctx.strokeStyle='#00ee44';ctx.lineWidth=2;ctx.strokeRect(W*0.5-175,H*0.5+55,350,42);
      ctx.fillStyle='#00ff44';ctx.font=`bold ${fs2+1}px Courier New`;ctx.textAlign='center';
      ctx.fillText('[E / OPEN] OPEN CRATE',W*0.5,H*0.5+82);
    }

  }

  // Damage / success flash

function renderSentenceWithUnderline(sentence,targetWord,centerX,startY,maxW,fontSize){
  ctx.font=`${fontSize}px Courier New`;ctx.textAlign='left';
  const targetIdx=sentence.indexOf(targetWord);
  if(targetIdx===-1){ctx.textAlign='center';ctx.fillStyle='#ffffff';ctx.fillText(sentence,centerX,startY);return;}
  const before=sentence.substring(0,targetIdx);const target=targetWord;const after=sentence.substring(targetIdx+targetWord.length);
  function tokenize(text,isU){return text.split(' ').map((w,i,a)=>({t:w+(i<a.length-1?' ':''),u:isU}));}
  let tokens=[...tokenize(before,false),...tokenize(target,true),...tokenize(after,false)].filter(tok=>tok.t.length>0);
  let lines=[],curLine=[],curW=0;
  tokens.forEach(tok=>{let tw=ctx.measureText(tok.t).width;if(curW+ctx.measureText(tok.t.trim()).width>maxW&&curLine.length>0){lines.push(curLine);curLine=[];curW=0;}curLine.push(tok);curW+=tw;});
  if(curLine.length>0)lines.push(curLine);
  const lineH=fontSize*1.6;
  lines.forEach((line,li)=>{
    const y=startY+li*lineH;let lineW=0;
    line.forEach(tok=>lineW+=ctx.measureText(tok.t).width);
    let lastTok=line[line.length-1];if(lastTok.t.endsWith(' '))lineW-=ctx.measureText(' ').width;
    let sx=centerX-lineW*0.5;
    line.forEach((tok,i)=>{
      let textToDraw=tok.t;if(i===line.length-1&&textToDraw.endsWith(' '))textToDraw=textToDraw.slice(0,-1);
      let drawW=ctx.measureText(textToDraw).width;let fullW=ctx.measureText(tok.t).width;
      ctx.fillStyle=tok.u?'#00ffcc':'#dddddd';
      if(tok.u){ctx.save();ctx.shadowColor='#00ffcc';ctx.shadowBlur=10;}
      ctx.fillText(textToDraw,sx,y);
      if(tok.u){ctx.restore();}
      if(tok.u){
        ctx.strokeStyle='#00ffcc';ctx.lineWidth=Math.max(2,fontSize*0.1);ctx.beginPath();
        let underlineW=drawW;if(i<line.length-1&&line[i+1].u&&tok.t.endsWith(' '))underlineW=fullW;
        ctx.moveTo(sx,y+fontSize*0.22);ctx.lineTo(sx+underlineW,y+fontSize*0.22);ctx.stroke();
      }
      sx+=fullW;
    });
  });
  ctx.textAlign='left';
}

  deathTimer--;
  if(deathTimer<=0){
    if(player.revives>0){player.revives--;player.hp=100;initLevelMap();gameState=GS.GAME;successFlash=70;}
    else{clearSave();gameState=GS.GAMEOVER;}
  }
}

// ── MOBILE CONTROLS ──────────────────────────────────────────
function renderMobileControls(){
  if(!('ontouchstart' in window)&&!navigator.maxTouchPoints)return;
  updateBtnPositions();
  const a=cfg.ctrlOpacity;
  ctx.save();ctx.globalAlpha=a;
  // Joystick base
  const jx=touch.lActive?touch.lox:W*0.14,jy=touch.lActive?touch.loy:H-128;
  ctx.strokeStyle='rgba(0,220,255,0.35)';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(jx,jy,touch.joyR,0,TWO_PI);ctx.stroke();
  ctx.strokeStyle='rgba(0,220,255,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(jx,jy,touch.joyR*0.5,0,TWO_PI);ctx.stroke();
  if(touch.lActive){
    const kx=jx+touch.lx*touch.joyR,ky=jy+touch.ly*touch.joyR;
    const jg=ctx.createRadialGradient(kx,ky,0,kx,ky,24);
    jg.addColorStop(0,'rgba(0,255,255,0.7)');jg.addColorStop(1,'rgba(0,100,150,0.3)');
    ctx.fillStyle=jg;ctx.beginPath();ctx.arc(kx,ky,26,0,TWO_PI);ctx.fill();
  }else{
    ctx.fillStyle='rgba(0,200,220,0.18)';ctx.beginPath();ctx.arc(jx,jy,24,0,TWO_PI);ctx.fill();
  }
  // Fire button
  const fg=ctx.createRadialGradient(BTN.fire.x,BTN.fire.y,0,BTN.fire.x,BTN.fire.y,BTN.fire.r);
  fg.addColorStop(0,'rgba(255,50,0,0.9)');fg.addColorStop(0.6,'rgba(180,0,0,0.7)');fg.addColorStop(1,'rgba(80,0,0,0.5)');
  ctx.fillStyle=fg;ctx.beginPath();ctx.arc(BTN.fire.x,BTN.fire.y,BTN.fire.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='rgba(255,150,100,0.8)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(BTN.fire.x,BTN.fire.y,BTN.fire.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.06)';ctx.beginPath();ctx.arc(BTN.fire.x,BTN.fire.y-BTN.fire.r*0.3,BTN.fire.r*0.7,Math.PI,TWO_PI);ctx.fill();
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.floor(H*0.022)}px Courier New`;ctx.textAlign='center';
  ctx.fillText('FIRE',BTN.fire.x,BTN.fire.y+7);
  // Reload
  const rg=ctx.createRadialGradient(BTN.reload.x,BTN.reload.y,0,BTN.reload.x,BTN.reload.y,BTN.reload.r);
  rg.addColorStop(0,'rgba(0,100,255,0.8)');rg.addColorStop(1,'rgba(0,30,100,0.5)');
  ctx.fillStyle=rg;ctx.beginPath();ctx.arc(BTN.reload.x,BTN.reload.y,BTN.reload.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='rgba(100,180,255,0.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(BTN.reload.x,BTN.reload.y,BTN.reload.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`${Math.floor(H*0.016)}px Courier New`;ctx.fillText('RLD',BTN.reload.x,BTN.reload.y+6);
  // Weapon
  const wg2=ctx.createRadialGradient(BTN.weapon.x,BTN.weapon.y,0,BTN.weapon.x,BTN.weapon.y,BTN.weapon.r);
  wg2.addColorStop(0,'rgba(150,0,255,0.8)');wg2.addColorStop(1,'rgba(50,0,100,0.5)');
  ctx.fillStyle=wg2;ctx.beginPath();ctx.arc(BTN.weapon.x,BTN.weapon.y,BTN.weapon.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='rgba(200,100,255,0.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(BTN.weapon.x,BTN.weapon.y,BTN.weapon.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`${Math.floor(H*0.015)}px Courier New`;ctx.fillText('WPN',BTN.weapon.x,BTN.weapon.y+5);
  // Pause
  ctx.fillStyle='rgba(30,30,30,0.8)';ctx.beginPath();ctx.arc(BTN.pause.x,BTN.pause.y,BTN.pause.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='rgba(180,180,180,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(BTN.pause.x,BTN.pause.y,BTN.pause.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#aaa';ctx.font=`bold 14px Courier New`;ctx.fillText('II',BTN.pause.x,BTN.pause.y+5);
  // Interact
  if(interactTarget!==null){
    const ig=ctx.createRadialGradient(BTN.interact.x,BTN.interact.y,0,BTN.interact.x,BTN.interact.y,BTN.interact.r);
    ig.addColorStop(0,'rgba(0,255,100,0.85)');ig.addColorStop(1,'rgba(0,80,30,0.5)');
    ctx.fillStyle=ig;ctx.beginPath();ctx.arc(BTN.interact.x,BTN.interact.y,BTN.interact.r,0,TWO_PI);ctx.fill();
    ctx.strokeStyle='rgba(100,255,150,0.9)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(BTN.interact.x,BTN.interact.y,BTN.interact.r,0,TWO_PI);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font=`bold 14px Courier New`;ctx.fillText('OPEN',BTN.interact.x,BTN.interact.y+5);
  }
  ctx.textAlign='left';ctx.restore();
}

function togglePause(){
  if(gameState===GS.GAME){gameState=GS.PAUSED;saveGameProgress();}
  else if(gameState===GS.PAUSED)gameState=GS.GAME;
}
document.addEventListener('keydown',e=>{if(e.code==='Escape')togglePause();});

function startGame(){
  player.currentLevelIdx=0;player.hp=100;player.xp=0;player.level=1;player.kills=0;
  player.weaponsUnlocked=1;player.ammo=[18,6,30];player.reloading=false;player.reloadTimer=0;
  player.muzzleFlash=0;player.recoil=0;player.recoilY=0;player.bobAmt=0;player.bobPhase=0;
  player.weapon=0;player.stepTimer=0;player.revives=3;player.sway=0;player.swayTimer=0;player.breathPhase=0;
  score=0;gameTime=0;shakeX=0;shakeY=0;shakeTimer=0;dmgFlash=0;successFlash=0;
  usedQuestions=[];currentQuestion=null;particles=[];interactTarget=null;
  flickerTimer=10;flickerVal=1;globalTime=0;
  initLevelMap();deathTimer=0;winTimer=0;
  gameState=GS.GAME;saveGameProgress();
}

// ── MAIN LOOP ────────────────────────────────────────────────
let lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  menuAnim+=0.015;
  ctx.save();
  if(shakeTimer>0){ctx.translate((Math.random()-0.5)*shakeX,(Math.random()-0.5)*shakeY);shakeTimer--;}
  switch(gameState){
    case GS.MENU:renderMenu();break;
    case GS.SETTINGS:renderSettings();break;
    case GS.GAME:
      updatePlayer();updateZombies();updateParticles();
      {const zb=raycast();renderSprites(zb);}
      renderFlashlight();renderHUD();renderMobileControls();break;
    case GS.QUESTION:
      {const zb=raycast();renderSprites(zb);}
      renderFlashlight();renderQuestion();break;
    case GS.LEVEL_UP:
      {const zb=raycast();renderSprites(zb);}
      renderLevelUp();break;
    case GS.PAUSED:
      {const zb=raycast();renderSprites(zb);}
      renderFlashlight();renderPaused();renderMobileControls();break;
    case GS.DEAD:
      {const zb=raycast();renderSprites(zb);}
      renderDead();break;
    case GS.GAMEOVER:renderGameOver();break;
    case GS.WIN:winTimer--;renderWin();break;
  }
  ctx.restore();
}

// ── POINTER LOCK (DESKTOP) ───────────────────────────────────
let pointerLocked=false;
document.addEventListener('pointerlockchange',()=>{pointerLocked=!!document.pointerLockElement;});
canvas.addEventListener('click',()=>{if(gameState===GS.GAME&&!('ontouchstart' in window))canvas.requestPointerLock();});
document.addEventListener('mousemove',e=>{if(gameState===GS.GAME&&pointerLocked)player.angle+=e.movementX*cfg.sensitivity*0.003;});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&gameState===GS.GAME&&pointerLocked)doShoot();
  if(e.button===2&&gameState===GS.GAME&&pointerLocked)doReload();
});
document.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('touchstart',()=>unlockAC(),{once:true,passive:true});
requestAnimationFrame(loop);
</script>
