// ── AUDIO ─────────────────────────────────────────────────────
const AC=new (window.AudioContext||window.webkitAudioContext)();
function unlockAC(){if(AC.state==='suspended')AC.resume();}
function playSound(type){
  if(!cfg.soundOn)return;
  try{
    const g=AC.createGain();g.connect(AC.destination);
    if(type==='shoot'){
      const b=AC.createBufferSource();
      const buf=AC.createBuffer(1,AC.sampleRate*0.12,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.04));
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.6,AC.currentTime);b.start();
    }else if(type==='shotgun'){
      const b=AC.createBufferSource();
      const buf=AC.createBuffer(1,AC.sampleRate*0.25,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.08))*1.5;
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.9,AC.currentTime);b.start();
    }else if(type==='zombie'){
      const o=AC.createOscillator();o.type='sawtooth';
      o.frequency.setValueAtTime(80+Math.random()*40,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(40,AC.currentTime+0.4);
      o.connect(g);g.gain.setValueAtTime(0.15,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.5);
      o.start();o.stop(AC.currentTime+0.5);
    }else if(type==='step'){
      const b=AC.createBufferSource();
      const buf=AC.createBuffer(1,AC.sampleRate*0.06,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.02))*0.3;
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.2,AC.currentTime);b.start();
    }else if(type==='reload'){
      const o=AC.createOscillator();o.type='square';o.frequency.value=300;
      o.connect(g);g.gain.setValueAtTime(0.1,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.15);
      o.start();o.stop(AC.currentTime+0.15);
    }else if(type==='hit'){
      const b=AC.createBufferSource();
      const buf=AC.createBuffer(1,AC.sampleRate*0.1,AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.03));
      b.buffer=buf;b.connect(g);g.gain.setValueAtTime(0.4,AC.currentTime);b.start();
    }else if(type==='beep'){
      const o=AC.createOscillator();o.type='sine';o.frequency.value=880;
      o.connect(g);g.gain.setValueAtTime(0.15,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
      o.start();o.stop(AC.currentTime+0.1);
    }else if(type==='wrong'){
      const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=120;
      o.connect(g);g.gain.setValueAtTime(0.3,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.3);
      o.start();o.stop(AC.currentTime+0.3);
    }
  }catch(e){}
}

// ── TOUCH / JOYSTICK ─────────────────────────────────────────
const touch={
  lx:0,ly:0,rx:0,ry:0,
  lActive:false,rActive:false,
  lId:-1,rId:-1,
  lox:0,loy:0,rox:0,roy:0,
  firePressed:false,reloadPressed:false,
  pausePressed:false,
  joyR:55
};
function getTouchZone(tx){return tx<W*0.5?'left':'right';}
canvas.addEventListener('touchstart',e=>{
  unlockAC();
  e.preventDefault();
  for(const t of e.changedTouches){
    const bx=t.clientX/W*W,by=t.clientY/H*H;
    // Check UI buttons first
    if(checkBtnTouch(bx,by))continue;
    if(getTouchZone(t.clientX)==='left'&&!touch.lActive){
      touch.lActive=true;touch.lId=t.identifier;
      touch.lox=t.clientX;touch.loy=t.clientY;touch.lx=0;touch.ly=0;
    }else if(getTouchZone(t.clientX)==='right'&&!touch.rActive){
      touch.rActive=true;touch.rId=t.identifier;
      touch.rox=t.clientX;touch.roy=t.clientY;touch.rx=0;touch.ry=0;
    }
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touch.lId){
      const dx=t.clientX-touch.lox,dy=t.clientY-touch.loy;
      const len=Math.sqrt(dx*dx+dy*dy);
      const max=touch.joyR;
      touch.lx=Math.max(-1,Math.min(1,dx/max));
      touch.ly=Math.max(-1,Math.min(1,dy/max));
    }else if(t.identifier===touch.rId){
      const dx=t.clientX-touch.rox,dy=t.clientY-touch.roy;
      const max=touch.joyR;
      touch.rx=Math.max(-1,Math.min(1,dx/max));
      touch.ry=Math.max(-1,Math.min(1,dy/max));
      touch.rox=t.clientX;touch.roy=t.clientY;
    }
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touch.lId){touch.lActive=false;touch.lId=-1;touch.lx=0;touch.ly=0;}
    if(t.identifier===touch.rId){touch.rActive=false;touch.rId=-1;touch.rx=0;touch.ry=0;}
  }
},{passive:false});

// Button areas (fire, reload, pause)
const BTN={
  fire:{x:0,y:0,r:50},
  reload:{x:0,y:0,r:38},
  pause:{x:0,y:0,r:28},
  weapon:{x:0,y:0,r:32}
};
function updateBtnPositions(){
  BTN.fire.x=W-100;BTN.fire.y=H-120;
  BTN.reload.x=W-190;BTN.reload.y=H-100;
  BTN.pause.x=W-40;BTN.pause.y=50;
  BTN.weapon.x=W-190;BTN.weapon.y=H-180;
}
function checkBtnTouch(bx,by){
  if(gameState===GS.GAME||gameState===GS.PAUSED){
    if(dist2(bx,by,BTN.fire.x,BTN.fire.y)<BTN.fire.r*BTN.fire.r){
      if(gameState===GS.GAME)doShoot();return true;
    }
    if(dist2(bx,by,BTN.reload.x,BTN.reload.y)<BTN.reload.r*BTN.reload.r){
      if(gameState===GS.GAME)doReload();return true;
    }
    if(dist2(bx,by,BTN.pause.x,BTN.pause.y)<BTN.pause.r*BTN.pause.r){
      togglePause();return true;
    }
    if(dist2(bx,by,BTN.weapon.x,BTN.weapon.y)<BTN.weapon.r*BTN.weapon.r){
      if(gameState===GS.GAME){player.weapon=1-player.weapon;playSound('reload');}return true;
    }
  }
  return false;
}
function dist2(x1,y1,x2,y2){return(x1-x2)**2+(y1-y2)**2;}

// ── CLICK HANDLER (menus) ─────────────────────────────────────
canvas.addEventListener('click',e=>{

});

    const t=e.changedTouches[0];
    if(gameState!==GS.GAME)handleClick(t.clientX,t.clientY);
  }
},{passive:false});

let menuBtns=[];
function handleClick(cx,cy){
  for(const b of menuBtns){
    if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){
      playSound('beep');
      b.action();
      return;
    }
  }
  // Question choices
  if(gameState===GS.QUESTION&&currentQuestion){
    for(let i=0;i<currentQuestion.c.length;i++){
      const by=H*0.42+i*(H*0.1);
      const bx=W*0.1;const bw=W*0.8;const bh=H*0.085;
      if(cx>=bx&&cx<=bx+bw&&cy>=by&&cy<=by+bh){
        answerQuestion(i);return;
      }
    }
  }
}

// ── COLLISION ─────────────────────────────────────────────────
function isWall(x,y){
  const mx=Math.floor(x),my=Math.floor(y);
  if(mx<0||mx>=MAPW||my<0||my>=MAPH)return true;
  const cell=MAP[my][mx];
  return cell===1||(cell===2&&!gatesUnlocked[getGateIdx(mx,my)]);
}
function getGateIdx(mx,my){
  if(mx===4&&my===11)return 0;
  if(mx===36&&my===11)return 1;
  if(mx===19&&my===19)return 2;
  if(mx===19&&my===20)return 3;
  return -1;
}
function isCrate(x,y){
  const mx=Math.floor(x),my=Math.floor(y);
  if(mx<0||mx>=MAPW||my<0||my>=MAPH)return false;
  return MAP[my][mx]===3&&!openedCrates.has(mx+','+my);
}
function tryMove(nx,ny){
  const pad=0.3;
  if(!isWall(nx,player.y)&&!isWall(nx+pad,player.y)&&!isWall(nx-pad,player.y)&&!isWall(nx,player.y+pad)&&!isWall(nx,player.y-pad))player.x=nx;
  if(!isWall(player.x,ny)&&!isWall(player.x+pad,ny)&&!isWall(player.x-pad,ny)&&!isWall(player.x,ny+pad)&&!isWall(player.x,ny-pad))player.y=ny;
}

// ── SHOOT ─────────────────────────────────────────────────────
function doShoot(){
  if(player.reloading)return;
  if(player.ammo[player.weapon]<=0){triggerQuestion('ammo');return;}
  player.ammo[player.weapon]--;
  player.muzzleFlash=8;
  player.recoil=0.15;
  playSound(player.weapon===0?'shoot':'shotgun');
  addShakeSmall();
  // Hit detection per shot type
  const shots=WEAPON_SHOTS[player.weapon];
  for(let s=0;s<shots;s++){
    const spread=(Math.random()-0.5)*WEAPON_SPREAD[player.weapon];
    const angle=player.angle+spread;
    // Ray cast to find first zombie in line of sight
    let hitZombie=null,hitDist=Infinity;
    for(const z of zombies){
      if(z.state==='dead')continue;
      const dx=z.x-player.x,dy=z.y-player.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>20)continue;
      const za=Math.atan2(dy,dx);
      let da=za-angle;
      while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
      if(Math.abs(da)<0.15&&d<hitDist){hitDist=d;hitZombie=z;}
    }
    if(hitZombie){
      const dmg=WEAPON_DAMAGE[player.weapon]/shots;
      hitZombie.hp-=dmg;
      hitZombie.hitFlash=8;
      spawnBloodParticles(hitZombie.x,hitZombie.y,6);
      if(hitZombie.hp<=0&&hitZombie.state!=='dead'&&hitZombie.state!=='dying'){
        hitZombie.state='dying';hitZombie.deathTimer=30;
        player.kills++;
        const xpGain=ZOMBIE_TYPES[hitZombie.type].score;
        player.xp+=xpGain;score+=xpGain;
        checkLevelUp();
        playSound('zombie');
      }else if(hitZombie.state!=='dying'){
        hitZombie.state='chase';
      }
    }
  }
  // Spawn muzzle particles
  spawnMuzzleParticles();
}
function doReload(){
  if(player.reloading)return;
  if(player.ammo[player.weapon]===player.maxAmmo[player.weapon])return;
  player.reloading=true;
  player.reloadTimer=WEAPON_RELOAD_TIME[player.weapon]*60;
  playSound('reload');
}
function checkLevelUp(){
  const needed=player.level*200;
  if(player.xp>=needed){player.level++;player.xp-=needed;player.hp=Math.min(player.maxHp,player.hp+20);successFlash=30;}
}

// ── QUESTIONS ────────────────────────────────────────────────
function triggerQuestion(trigger){
  if(gameState!==GS.GAME)return;
  // Pick random unused question
  const available=QUESTIONS.filter((_,i)=>!usedQuestions.includes(i));
  if(available.length===0){usedQuestions=[];} // Reset if all used
  const pool=QUESTIONS.filter((_,i)=>!usedQuestions.includes(i));
  const idx=Math.floor(Math.random()*pool.length);
  const qIdx=QUESTIONS.indexOf(pool[idx]);
  currentQuestion=QUESTIONS[qIdx];
  questionIdx=qIdx;
  usedQuestions.push(qIdx);
  questionTrigger=trigger;
  gameState=GS.QUESTION;
  playSound('beep');
}
function answerQuestion(choice){
  if(!currentQuestion)return;
  if(choice===currentQuestion.a){
    // Correct
    playSound('beep');
    successFlash=60;
    const reward=player.weapon===0?6:3;
    player.ammo[player.weapon]=Math.min(player.maxAmmo[player.weapon],player.ammo[player.weapon]+reward);
    player.xp+=50;score+=100;checkLevelUp();
    // Kill nearest zombie
    let nearest=null,nd=Infinity;
    for(const z of zombies){if(z.state!=='dead'&&z.state!=='dying'){const d=Math.hypot(z.x-player.x,z.y-player.y);if(d<nd){nd=d;nearest=z;}}}
    if(nearest&&nd<8){nearest.hp=0;nearest.state='dying';nearest.deathTimer=30;player.kills++;spawnBloodParticles(nearest.x,nearest.y,10);}
    // Unlock gate if trigger
    if(questionTrigger==='gate'){const gi=interactTarget;if(gi>=0)gatesUnlocked[gi]=true;}
    gameState=GS.GAME;
  }else{
    // Wrong
    playSound('wrong');
    dmgFlash=40;
    player.hp-=15;
    shakeTimer=20;shakeX=8;shakeY=8;
    // Move zombies closer
    for(const z of zombies){if(z.state==='roam'&&Math.hypot(z.x-player.x,z.y-player.y)<12)z.state='chase';}
    if(player.hp<=0){gameState=GS.DEAD;deathTimer=180;}
    else gameState=GS.GAME;
  }
  currentQuestion=null;
}

// ── PARTICLES ────────────────────────────────────────────────
function spawnBloodParticles(x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=0.02+Math.random()*0.04;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*30,maxLife:60,color:'#cc0000',type:'blood',r:0.06+Math.random()*0.08});
  }
}
function spawnMuzzleParticles(){
  const a=player.angle;
  for(let i=0;i<6;i++){
    const sa=a+(Math.random()-0.5)*0.4;
    particles.push({x:player.x+Math.cos(a)*0.5,y:player.y+Math.sin(a)*0.5,vx:Math.cos(sa)*0.08,vy:Math.sin(sa)*0.08,life:12,maxLife:12,color:'#ffaa00',type:'muzzle'});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ── SHAKE ────────────────────────────────────────────────────
function addShakeSmall(){shakeTimer=8;shakeX=3;shakeY=3;}
function addShakeBig(){shakeTimer=20;shakeX=10;shakeY=10;}

// ── ZOMBIE UPDATE ─────────────────────────────────────────────
function updateZombies(){
  for(const z of zombies){
    if(z.state==='dead')continue;
    if(z.state==='dying'){z.deathTimer--;if(z.deathTimer<=0)z.state='dead';continue;}
    if(z.hitFlash>0)z.hitFlash--;
    const dx=player.x-z.x,dy=player.y-z.y;
    const distToPlayer=Math.sqrt(dx*dx+dy*dy);
    // State transitions
    if(z.state==='roam'){
      if(distToPlayer<z.alertRadius){z.state='chase';playSound('zombie');}
      z.roamTimer--;
      if(z.roamTimer<=0){z.angle=Math.random()*Math.PI*2;z.roamTimer=60+Math.random()*120;}
      const nx=z.x+Math.cos(z.angle)*z.speed;
      const ny=z.y+Math.sin(z.angle)*z.speed;
      if(!isWall(nx,z.y))z.x=nx;else z.angle+=Math.PI+Math.random()*0.5;
      if(!isWall(z.x,ny))z.y=ny;else z.angle+=Math.PI+Math.random()*0.5;
    }else if(z.state==='chase'){
      if(distToPlayer>z.alertRadius*2)z.state='roam';
      if(distToPlayer<0.8){z.state='attack';z.attackTimer=40;}
      else{
        const a=Math.atan2(dy,dx);
        const nx=z.x+Math.cos(a)*z.speed*1.5;
        const ny=z.y+Math.sin(a)*z.speed*1.5;
        if(!isWall(nx,z.y))z.x=nx;else if(!isWall(z.x,ny))z.y=ny;
        else{// try sideways
          const sa=a+Math.PI/2;
          if(!isWall(z.x+Math.cos(sa)*z.speed,z.y+Math.sin(sa)*z.speed)){z.x+=Math.cos(sa)*z.speed;z.y+=Math.sin(sa)*z.speed;}
        }
      }
    }else if(z.state==='attack'){
      z.attackTimer--;
      if(z.attackTimer<=0){
        player.hp-=z.dmg;dmgFlash=30;addShakeBig();playSound('hit');
        z.attackTimer=60;
        if(player.hp<=0){gameState=GS.DEAD;deathTimer=180;}
      }
      const distNow=Math.hypot(player.x-z.x,player.y-z.y);
      if(distNow>1.2)z.state='chase';
    }
  }
}

// ── PLAYER UPDATE ─────────────────────────────────────────────
function updatePlayer(){
  if(gameState!==GS.GAME)return;
  // Reload
  if(player.reloading){
    player.reloadTimer--;
    if(player.reloadTimer<=0){
      player.reloading=false;
      player.ammo[player.weapon]=player.maxAmmo[player.weapon];
      playSound('beep');
    }
  }
  if(player.muzzleFlash>0)player.muzzleFlash--;
  if(player.recoil>0)player.recoil*=0.8;
  // Movement
  const spd=player.moveSpeed;
  let moved=false;
  let turnDelta=0;
  // Keyboard
  if(keys['KeyW']||keys['ArrowUp']){const nx=player.x+Math.cos(player.angle)*spd,ny=player.y+Math.sin(player.angle)*spd;tryMove(nx,ny);moved=true;}
  if(keys['KeyS']||keys['ArrowDown']){const nx=player.x-Math.cos(player.angle)*spd,ny=player.y-Math.sin(player.angle)*spd;tryMove(nx,ny);moved=true;}
  if(keys['KeyA']){player.angle-=player.turnSpeed;turnDelta=-1;}
  if(keys['KeyD']||keys['ArrowRight']){player.angle+=player.turnSpeed;turnDelta=1;}
  if(keys['ArrowLeft']){player.angle-=player.turnSpeed;turnDelta=-1;}
  if(keys['Space']&&!keys['_spaceLast']){doShoot();}keys['_spaceLast']=keys['Space'];
  if(keys['KeyR'])doReload();
  if(keys['KeyE'])checkInteract();
  // Touch joystick
  if(touch.lActive){
    const nx=player.x+Math.cos(player.angle)*(-touch.ly)*spd+Math.cos(player.angle+Math.PI/2)*touch.lx*spd;
    const ny=player.y+Math.sin(player.angle)*(-touch.ly)*spd+Math.sin(player.angle+Math.PI/2)*touch.lx*spd;
    tryMove(nx,ny);
    if(Math.abs(touch.lx)>0.1||Math.abs(touch.ly)>0.1)moved=true;
  }
  if(touch.rActive){
    player.angle+=touch.rx*cfg.sensitivity*0.04;
    touch.rx=0;
  }
  // Bob
  if(moved){player.bobPhase+=0.15;player.bobAmt=Math.sin(player.bobPhase)*0.015;}
  else{player.bobAmt*=0.85;}
  // Step sounds
  if(moved){player.stepTimer++;if(player.stepTimer%22===0)playSound('step');}
  // Zone
  player.zone=getZone(Math.floor(player.x),Math.floor(player.y));
  // Interact check
  interactTarget=null;
  const fx=Math.floor(player.x+Math.cos(player.angle)*1.2);
  const fy=Math.floor(player.y+Math.sin(player.angle)*1.2);
  const cell=fx>=0&&fx<MAPW&&fy>=0&&fy<MAPH?MAP[fy][fx]:0;
  if(cell===2){const gi=getGateIdx(fx,fy);if(gi>=0&&!gatesUnlocked[gi])interactTarget=gi;}
  if(cell===3&&!openedCrates.has(fx+','+fy))interactTarget='crate:'+fx+','+fy;
  // Handle E key interact
  if(keys['KeyE']&&!keys['_eLast']){checkInteract();}keys['_eLast']=keys['KeyE'];
}
function checkInteract(){
  if(interactTarget===null)return;
  if(typeof interactTarget==='number'){
    // Gate
    triggerQuestion('gate');
  }else if(typeof interactTarget==='string'&&interactTarget.startsWith('crate:')){
    const key=interactTarget.substring(6);
    openedCrates.add(key);
    const [cx,cy]=key.split(',').map(Number);
    MAP[cy][cx]=0;
    if(Math.random()<0.5)triggerQuestion('crate');
    else{player.ammo[player.weapon]=Math.min(player.maxAmmo[player.weapon],player.ammo[player.weapon]+Math.ceil(player.maxAmmo[player.weapon]/2));playSound('beep');}
  }
}

// ── SHAKE UPDATE ─────────────────────────────────────────────
function updateShake(){
  if(shakeTimer>0){shakeTimer--;if(shakeTimer===0){shakeX=0;shakeY=0;}}
}

// ── WIN CONDITION ────────────────────────────────────────────
function checkWin(){
  if(player.kills>=15&&player.zone===3&&gameState===GS.GAME){gameState=GS.WIN;winTimer=300;}
}

// ── RAYCASTING ───────────────────────────────────────────────
const HALF_PI=Math.PI/2;
const TWO_PI=Math.PI*2;
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

function raycast(){
  const fov=Math.PI/3; // 60 degrees
  const cols=cfg.quality===0?Math.floor(W/4):cfg.quality===1?Math.floor(W/2):W;
  const colW=W/cols;
  const halfH=H/2;
  const fog=ZONE_FOG[player.zone]||0.05;
  const zone=player.zone;
  const zbuf=new Float32Array(W);

  // Floor/ceiling
  const floorCol=ZONE_FLOOR[zone];
  const ceilCol=ZONE_CEIL[zone];
  ctx.fillStyle=ceilCol;ctx.fillRect(0,0,W,halfH+player.bobAmt*H);
  ctx.fillStyle=floorCol;ctx.fillRect(0,halfH+player.bobAmt*H,W,H);

  for(let col=0;col<cols;col++){
    const rayA=player.angle-fov/2+fov*(col/cols);
    const cosR=Math.cos(rayA),sinR=Math.sin(rayA);
    // DDA
    let mapX=Math.floor(player.x),mapY=Math.floor(player.y);
    const deltaDistX=Math.abs(1/cosR)||1e30,deltaDistY=Math.abs(1/sinR)||1e30;
    let stepX,stepY,sideDistX,sideDistY;
    if(cosR<0){stepX=-1;sideDistX=(player.x-mapX)*deltaDistX;}
    else{stepX=1;sideDistX=(mapX+1-player.x)*deltaDistX;}
    if(sinR<0){stepY=-1;sideDistY=(player.y-mapY)*deltaDistY;}
    else{stepY=1;sideDistY=(mapY+1-player.y)*deltaDistY;}
    let hit=false,side=0,dist=0;
    for(let i=0;i<64;i++){
      if(sideDistX<sideDistY){sideDistX+=deltaDistX;mapX+=stepX;side=0;}
      else{sideDistY+=deltaDistY;mapY+=stepY;side=1;}
      if(mapX<0||mapX>=MAPW||mapY<0||mapY>=MAPH){dist=20;break;}
      const cell=MAP[mapY][mapX];
      if(cell===1||(cell===2&&!gatesUnlocked[getGateIdx(mapX,mapY)])){
        hit=true;
        dist=side===0?sideDistX-deltaDistX:sideDistY-deltaDistY;
        break;
      }
      if(cell===3&&!openedCrates.has(mapX+','+mapY)){hit=true;dist=side===0?sideDistX-deltaDistX:sideDistY-deltaDistY;break;}
    }
    // Fix fisheye
    dist*=Math.cos(rayA-player.angle);
    dist=Math.max(0.1,dist);
    const wallH=Math.floor(H/dist);
    const wallTop=halfH-wallH/2+player.bobAmt*H;
    // Distance-based darkness
    const brightness=Math.max(0,Math.min(1,1-dist*fog));
    // Side shading
    const shade=side===1?0.65:1.0;
    // Wall color based on zone
    const zoneColors=[
      [40,20,10],[10,40,20],[5,5,50],[30,30,30]
    ];
    const zc=zoneColors[zone]||[30,20,10];
    // Gate color
    let isGate=false;
    if(MAP[mapY]&&MAP[mapY][mapX]===2){isGate=true;}
    let isCrateWall=false;
    if(MAP[mapY]&&MAP[mapY][mapX]===3&&!openedCrates.has(mapX+','+mapY)){isCrateWall=true;}
    let r=zc[0],g=zc[1],b=zc[2];
    if(isGate){r=80;g=60;b=0;}
    else if(isCrateWall){r=60;g=40;b=10;}
    r=Math.floor(r*brightness*shade);g=Math.floor(g*brightness*shade);b=Math.floor(b*brightness*shade);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(col*colW,wallTop,colW+1,wallH);
    // Store zbuffer
    const startCol=Math.floor(col*colW);
    const endCol=Math.min(W-1,Math.floor((col+1)*colW));
    for(let px=startCol;px<=endCol;px++)zbuf[px]=dist;
  }
  return zbuf;
}

// ── SPRITE RENDERING ─────────────────────────────────────────
function renderSprites(zbuf){
  const fov=Math.PI/3;
  // Sort by distance (far first)
  const visible=zombies.filter(z=>z.state!=='dead').map(z=>{
    const dx=z.x-player.x,dy=z.y-player.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    return{...z,dist:d};
  }).sort((a,b)=>b.dist-a.dist);

  for(const z of visible){
    const dx=z.x-player.x,dy=z.y-player.y;
    let angle=Math.atan2(dy,dx)-player.angle;
    while(angle>Math.PI)angle-=TWO_PI;
    while(angle<-Math.PI)angle+=TWO_PI;
    if(Math.abs(angle)>fov*0.75)continue;
    const screenX=Math.floor((0.5+angle/(fov))*W);
    const dist=Math.max(0.5,z.dist);
    const size=Math.floor(H/dist);
    const top=Math.floor(H/2-size/2+player.bobAmt*H);
    const left=Math.floor(screenX-size/2);
    if(left+size<0||left>W)continue;

    const fog=ZONE_FOG[player.zone]||0.05;
    const bright=Math.max(0,Math.min(1,1-dist*fog));
    const alpha=clamp(bright,0.1,1);

    // Draw zombie body (simple geometric)
    ctx.save();
    ctx.globalAlpha=alpha;
    const isDying=z.state==='dying';
    const isAttacking=z.state==='attack';
    const flash=z.hitFlash>0;

    // Body color
    let bc=z.color||'#5a3020';
    if(flash){bc='#ff4444';}
    else if(isDying){
      const t=z.deathTimer/30;
      ctx.globalAlpha=alpha*t;
    }

    // Legs (animated)
    const legAnim=Math.sin(Date.now()*0.01*z.speed*50)*0.3;
    const headH=Math.floor(size*0.28);
    const bodyH=Math.floor(size*0.45);
    const legH=Math.floor(size*0.27);
    const cw=Math.floor(size*0.55);
    const cx2=screenX;

    // Legs
    ctx.fillStyle=flash?'#ff2222':bc;
    ctx.fillRect(cx2-cw*0.35+legAnim*size*0.05,top+headH+bodyH,cw*0.3,legH);
    ctx.fillRect(cx2+cw*0.05-legAnim*size*0.05,top+headH+bodyH,cw*0.3,legH);
    // Body
    const bodyGrad=ctx.createLinearGradient(cx2-cw/2,top+headH,cx2+cw/2,top+headH+bodyH);
    bodyGrad.addColorStop(0,flash?'#ff4444':bc);
    bodyGrad.addColorStop(1,flash?'#cc0000':'#1a0a00');
    ctx.fillStyle=bodyGrad;
    ctx.fillRect(cx2-cw/2,top+headH,cw,bodyH);
    // Arms (attack animation)
    if(isAttacking){
      const armSwing=Math.sin(Date.now()*0.02)*0.4;
      ctx.fillRect(cx2-cw*0.75,top+headH+size*0.05+armSwing*size*0.1,cw*0.25,bodyH*0.6);
      ctx.fillRect(cx2+cw*0.5,top+headH+size*0.05-armSwing*size*0.1,cw*0.25,bodyH*0.6);
    }else{
      ctx.fillRect(cx2-cw*0.75,top+headH+size*0.05,cw*0.25,bodyH*0.6);
      ctx.fillRect(cx2+cw*0.5,top+headH+size*0.05,cw*0.25,bodyH*0.6);
    }
    // Head
    ctx.fillStyle=flash?'#ff5555':'#3a1a0a';
    ctx.fillRect(cx2-cw*0.3,top,cw*0.6,headH);
    // Eyes
    ctx.fillStyle=flash?'#ffffff':z.eyeColor;
    const eyeSize=Math.max(2,Math.floor(size*0.06));
    ctx.fillRect(cx2-cw*0.15-eyeSize/2,top+headH*0.3,eyeSize,eyeSize);
    ctx.fillRect(cx2+cw*0.15-eyeSize/2,top+headH*0.3,eyeSize,eyeSize);
    // HP bar if close
    if(dist<6&&z.state!=='dying'){
      const hpPct=z.hp/z.maxHp;
      const barW=Math.floor(size*0.8);
      const barX=cx2-barW/2;
      const barY=top-10;
      ctx.fillStyle='#330000';ctx.fillRect(barX,barY,barW,5);
      ctx.fillStyle=hpPct>0.5?'#00cc00':hpPct>0.25?'#cccc00':'#cc0000';
      ctx.fillRect(barX,barY,barW*hpPct,5);
    }
    ctx.restore();
  }
}

// ── HUD RENDERING ────────────────────────────────────────────
function renderHUD(){
  const pad=12;
  // HP bar
  const hpW=Math.min(200,W*0.3);
  const hpPct=player.hp/player.maxHp;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(pad,H-60-pad,hpW+4,18);
  ctx.fillStyle='#440000';ctx.fillRect(pad+2,H-58-pad,hpW,14);
  ctx.fillStyle=hpPct>0.5?'#cc2200':hpPct>0.25?'#cc6600':'#ff0000';
  ctx.fillRect(pad+2,H-58-pad,hpW*hpPct,14);
  ctx.strokeStyle='#660000';ctx.lineWidth=1;ctx.strokeRect(pad+2,H-58-pad,hpW,14);
  ctx.fillStyle='#ff4444';ctx.font=`bold ${Math.floor(H*0.02)}px Courier New`;
  ctx.fillText(`HP ${Math.ceil(player.hp)}/${player.maxHp}`,pad,H-68-pad);

  // XP bar
  const xpW=Math.min(200,W*0.3);
  const xpNeeded=player.level*200;
  const xpPct=player.xp/xpNeeded;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(pad,H-36-pad,xpW+4,10);
  ctx.fillStyle='#002244';ctx.fillRect(pad+2,H-34-pad,xpW,6);
  ctx.fillStyle='#0066ff';ctx.fillRect(pad+2,H-34-pad,xpW*xpPct,6);
  ctx.fillStyle='#4488ff';ctx.font=`${Math.floor(H*0.016)}px Courier New`;
  ctx.fillText(`LVL ${player.level}  XP ${player.xp}/${xpNeeded}`,pad,H-40-pad);

  // Ammo
  const wName=WEAPON_NAMES[player.weapon];
  const ammo=player.ammo[player.weapon];
  const maxA=player.maxAmmo[player.weapon];
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(W-130-pad,H-60-pad,128,50);
  ctx.fillStyle='#ffcc00';ctx.font=`bold ${Math.floor(H*0.025)}px Courier New`;
  ctx.textAlign='right';
  ctx.fillText(`${ammo}/${maxA}`,W-pad-4,H-40-pad);
  ctx.fillStyle='#ff8800';ctx.font=`${Math.floor(H*0.016)}px Courier New`;
  ctx.fillText(wName,W-pad-4,H-60-pad);
  if(player.reloading){
    const rPct=1-(player.reloadTimer/(WEAPON_RELOAD_TIME[player.weapon]*60));
    ctx.fillStyle='#ff4400';ctx.fillText(`RELOADING ${Math.floor(rPct*100)}%`,W-pad-4,H-24-pad);
  }
  ctx.textAlign='left';

  // Kills / Zone
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(pad,pad,200,60);
  ctx.fillStyle='#ff2200';ctx.font=`bold ${Math.floor(H*0.02)}px Courier New`;
  ctx.fillText(`KILLS: ${player.kills}`,pad+6,pad+20);
  ctx.fillStyle='#888';ctx.font=`${Math.floor(H*0.016)}px Courier New`;
  ctx.fillText(ZONE_NAMES[player.zone],pad+6,pad+38);
  ctx.fillStyle='#666';ctx.fillText(`SCORE: ${score}`,pad+6,pad+54);

  // Revives
  ctx.fillStyle='#ff4400';ctx.font=`${Math.floor(H*0.018)}px Courier New`;
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<player.revives?'#ff4400':'#333';
    ctx.fillText('♥',W/2-30+i*22,pad+22);
  }

  // Crosshair
  const cx2=W/2,cy=H/2+player.bobAmt*H;
  const cs=10+player.recoil*20;
  ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx2-cs,cy);ctx.lineTo(cx2-4,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx2+4,cy);ctx.lineTo(cx2+cs,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx2,cy-cs);ctx.lineTo(cx2,cy-4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx2,cy+4);ctx.lineTo(cx2,cy+cs);ctx.stroke();
  ctx.strokeStyle='rgba(255,100,100,0.5)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.arc(cx2,cy,3,0,TWO_PI);ctx.stroke();

  // Interact prompt
  if(interactTarget!==null){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(W/2-120,H/2+60,240,30);
    ctx.fillStyle='#ffcc00';ctx.font=`${Math.floor(H*0.018)}px Courier New`;ctx.textAlign='center';
    if(typeof interactTarget==='number')ctx.fillText('[E] ANSWER TO UNLOCK GATE',W/2,H/2+80);
    else ctx.fillText('[E] OPEN CRATE',W/2,H/2+80);
    ctx.textAlign='left';
  }

  // Muzzle flash
  if(player.muzzleFlash>0){
    const alpha=player.muzzleFlash/8*0.7;
    const grd=ctx.createRadialGradient(W/2,H/2+60,0,W/2,H/2+60,W*0.25);
    grd.addColorStop(0,`rgba(255,200,80,${alpha})`);
    grd.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  }

  // Damage flash
  if(dmgFlash>0){
    ctx.fillStyle=`rgba(180,0,0,${dmgFlash/60*0.5})`;
    ctx.fillRect(0,0,W,H);dmgFlash--;
  }
  // Success flash
  if(successFlash>0){
    ctx.fillStyle=`rgba(0,180,0,${successFlash/60*0.35})`;
    ctx.fillRect(0,0,W,H);successFlash--;
  }

  // Weapon draw
  renderWeapon();
}

function renderWeapon(){
  const wY=H*0.55+player.recoil*H*0.05+player.bobAmt*H*3;
  const wW=W*0.35;const wH=H*0.35;
  const wX=W/2-wW*0.1;
  ctx.save();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.fillRect(wX+8,wY+8,wW,wH);
  if(player.weapon===0){
    // Pistol
    ctx.fillStyle='#333';
    ctx.fillRect(wX,wY+wH*0.4,wW*0.5,wH*0.15);// grip
    ctx.fillStyle='#222';
    ctx.fillRect(wX+wW*0.1,wY,wW*0.6,wH*0.45);// barrel+slide
    ctx.fillStyle='#444';
    ctx.fillRect(wX+wW*0.15,wY+wH*0.05,wW*0.5,wH*0.12);// slide detail
    if(player.muzzleFlash>0){ctx.fillStyle='#ffcc00';ctx.fillRect(wX+wW*0.65,wY-wH*0.1,wW*0.15,wH*0.2);}
  }else{
    // Shotgun
    ctx.fillStyle='#5a3010';
    ctx.fillRect(wX,wY+wH*0.3,wW*0.35,wH*0.25);// stock
    ctx.fillStyle='#1a1a1a';
    ctx.fillRect(wX+wW*0.2,wY,wW*0.7,wH*0.18);// barrel
    ctx.fillRect(wX+wW*0.2,wY+wH*0.2,wW*0.65,wH*0.18);// barrel2
    ctx.fillStyle='#3a2010';
    ctx.fillRect(wX+wW*0.05,wY+wH*0.18,wW*0.5,wH*0.28);// foregrip
    if(player.muzzleFlash>0){ctx.fillStyle='#ff8800';ctx.fillRect(wX+wW*0.85,wY-wH*0.2,wW*0.2,wH*0.4);}
  }
  ctx.restore();
}

// ── MOBILE CONTROLS RENDERING ─────────────────────────────────

  if(touch.lActive){
    ctx.strokeStyle='#ffffff';ctx.lineWidth=2;

    const kx=touch.lox+touch.lx*touch.joyR,ky=touch.loy+touch.ly*touch.joyR;
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();ctx.arc(kx,ky,22,0,TWO_PI);ctx.fill();

  }else{
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(W*0.15,H-120,touch.joyR,0,TWO_PI);ctx.stroke();

  // Reload button
  ctx.fillStyle='rgba(30,100,200,0.5)';ctx.beginPath();ctx.arc(BTN.reload.x,BTN.reload.y,BTN.reload.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#4488ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(BTN.reload.x,BTN.reload.y,BTN.reload.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='12px Courier New';ctx.fillText('RELOAD',BTN.reload.x,BTN.reload.y+5);
  // Weapon switch
  ctx.fillStyle='rgba(100,100,30,0.5)';ctx.beginPath();ctx.arc(BTN.weapon.x,BTN.weapon.y,BTN.weapon.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#cccc44';ctx.lineWidth=2;ctx.beginPath();ctx.arc(BTN.weapon.x,BTN.weapon.y,BTN.weapon.r,0,TWO_PI);ctx.stroke();

  ctx.fillStyle='rgba(50,50,50,0.6)';ctx.beginPath();ctx.arc(BTN.pause.x,BTN.pause.y,BTN.pause.r,0,TWO_PI);ctx.fill();
  ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.beginPath();ctx.arc(BTN.pause.x,BTN.pause.y,BTN.pause.r,0,TWO_PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='12px Courier New';ctx.fillText('II',BTN.pause.x,BTN.pause.y+5);
  ctx.textAlign='left';
  ctx.restore();
}

// ── FLASHLIGHT EFFECT ─────────────────────────────────────────
function renderFlashlight(){
  const cx2=W/2,cy=H/2;
  const grd=ctx.createRadialGradient(cx2,cy,0,cx2,cy,W*0.65);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(0.4,'rgba(0,0,0,0.1)');
  grd.addColorStop(0.75,'rgba(0,0,0,0.75)');
  grd.addColorStop(1,'rgba(0,0,0,0.95)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
}

// ── GRAIN EFFECT ─────────────────────────────────────────────
function renderGrain(){
  if(cfg.quality===0)return;
  const imgData=ctx.getImageData(0,0,W,H);
  const d=imgData.data;
  for(let i=0;i<d.length;i+=4){
    const n=(Math.random()-0.5)*20;
    d[i]=clamp(d[i]+n,0,255);d[i+1]=clamp(d[i+1]+n,0,255);d[i+2]=clamp(d[i+2]+n,0,255);
  }
  ctx.putImageData(imgData,0,0);
}

// ── SCREEN SHAKE ─────────────────────────────────────────────
function applyShake(){
  if(shakeTimer>0){
    const sx=(Math.random()-0.5)*shakeX,sy=(Math.random()-0.5)*shakeY;
    ctx.translate(sx,sy);
  }
}

// ── QUESTION OVERLAY ─────────────────────────────────────────
function renderQuestion(){
  menuBtns=[];
  // Dark overlay
  ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,W,H);
  // Horror border
  const bw=6;
  ctx.strokeStyle='#880000';ctx.lineWidth=bw;ctx.strokeRect(bw/2,bw/2,W-bw,H-bw);
  ctx.strokeStyle='#440000';ctx.lineWidth=2;ctx.strokeRect(12,12,W-24,H-24);
  // Title
  ctx.fillStyle='#ff2200';ctx.font=`bold ${Math.floor(H*0.035)}px Courier New`;ctx.textAlign='center';
  ctx.fillText('⚠ VOCABULARY CHALLENGE ⚠',W/2,H*0.1);
  // Question number
  ctx.fillStyle='#888';ctx.font=`${Math.floor(H*0.02)}px Courier New`;
  ctx.fillText(`Question ${usedQuestions.length} of 50`,W/2,H*0.16);
  // Sentence
  if(currentQuestion){
    const fs=Math.floor(H*0.025);
    ctx.fillStyle='#dddddd';ctx.font=`${fs}px Courier New`;
    // Word wrap
    const words=currentQuestion.s.split(' ');
    let line='',lines=[];const maxW=W*0.82;
    for(const word of words){const test=line+word+' ';if(ctx.measureText(test).width>maxW&&line!==''){lines.push(line.trim());line=word+' ';}else line=test;}
    if(line.trim())lines.push(line.trim());
    lines.forEach((l,i)=>ctx.fillText(l,W/2,H*0.24+i*fs*1.5));
    // Word label
    ctx.fillStyle='#ff8800';ctx.font=`italic ${Math.floor(H*0.02)}px Courier New`;
    ctx.fillText(`"${currentQuestion.w}" means:`,W/2,H*0.38);
    // Choices
    const labels=['A','B','C','D'];
    const cols=['#00cc44','#0088ff','#cc8800','#cc00cc'];
    currentQuestion.c.forEach((choice,i)=>{
      const by=H*0.42+i*(H*0.105);
      const bx=W*0.1;const bw2=W*0.8;const bh=H*0.09;
      // Btn bg
      ctx.fillStyle='rgba(20,0,0,0.8)';ctx.fillRect(bx,by,bw2,bh);
      ctx.strokeStyle=cols[i];ctx.lineWidth=2;ctx.strokeRect(bx,by,bw2,bh);
      // Label
      ctx.fillStyle=cols[i];ctx.font=`bold ${Math.floor(H*0.026)}px Courier New`;ctx.textAlign='left';
      ctx.fillText(`${labels[i]}.`,bx+12,by+bh*0.62);
      ctx.fillStyle='#ffffff';ctx.font=`${Math.floor(H*0.024)}px Courier New`;
      ctx.fillText(choice,bx+50,by+bh*0.62);
      menuBtns.push({x:bx,y:by,w:bw2,h:bh,action:()=>answerQuestion(i)});
    });
    // Info
    ctx.fillStyle='#555';ctx.font=`${Math.floor(H*0.016)}px Courier New`;ctx.textAlign='center';
    ctx.fillText('Correct = Ammo + XP | Wrong = -15 HP',W/2,H*0.95);
  }
  ctx.textAlign='left';
}

  menuBtns=[];
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffcc00';ctx.font=`bold ${Math.floor(H*0.065)}px Courier New`;ctx.textAlign='center';
  ctx.fillText('PAUSED',W/2,H*0.3);
  const btns=[
    {label:'▶ RESUME',action:()=>{gameState=GS.GAME;}},
    {label:'⚙ SETTINGS',action:()=>{gameState=GS.SETTINGS;}},
    {label:'⌂ MAIN MENU',action:()=>{gameState=GS.MENU;}},
  ];
  btns.forEach((b,i)=>{
    const bx=W/2-120,by=H*0.42+i*75,bw2=240,bh=55;
    ctx.fillStyle='rgba(60,40,0,0.85)';ctx.fillRect(bx,by,bw2,bh);
    ctx.strokeStyle='#886600';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw2,bh);
    ctx.fillStyle='#ffcc44';ctx.font=`bold ${Math.floor(H*0.027)}px Courier New`;ctx.textAlign='center';
    ctx.fillText(b.label,W/2,by+bh*0.65);
    menuBtns.push({x:bx,y:by,w:bw2,h:bh,action:b.action});
  });
  ctx.textAlign='left';
}

// ── DEATH TRANSITION ─────────────────────────────────────────
function renderDead(){
  const t=1-(deathTimer/180);
  ctx.fillStyle=`rgba(100,0,0,${t*0.97})`;ctx.fillRect(0,0,W,H);
  deathTimer--;
  if(deathTimer<=0){
    if(player.revives>0){
      player.revives--;
      player.hp=100;
      gameState=GS.GAME;
      successFlash=60;
    }else{
      gameState=GS.GAMEOVER;
    }
  }
  if(t>0.5){
    ctx.fillStyle='#cc0000';ctx.font=`bold ${Math.floor(H*0.06)}px Courier New`;ctx.textAlign='center';
    ctx.fillText('YOU DIED',W/2,H/2);
    ctx.fillStyle='#880000';ctx.font=`${Math.floor(H*0.025)}px Courier New`;
    if(player.revives>0)ctx.fillText(`REVIVES REMAINING: ${player.revives}`,W/2,H/2+50);
    else ctx.fillText('NO REVIVES LEFT...',W/2,H/2+50);
    ctx.textAlign='left';
  }
}

// ── TOGGLE PAUSE ─────────────────────────────────────────────
function togglePause(){
  if(gameState===GS.GAME)gameState=GS.PAUSED;
  else if(gameState===GS.PAUSED)gameState=GS.GAME;
}
document.addEventListener('keydown',e=>{if(e.code==='Escape')togglePause();});

// ── START GAME ───────────────────────────────────────────────
function startGame(){
  player.x=2.5;player.y=2.5;player.angle=0;
  player.hp=100;player.xp=0;player.level=1;player.kills=0;
  player.ammo=[18,6];player.reloading=false;player.reloadTimer=0;
  player.muzzleFlash=0;player.recoil=0;player.bobAmt=0;player.bobPhase=0;
  player.weapon=0;player.zone=0;player.stepTimer=0;
  score=0;gameTime=0;
  shakeX=0;shakeY=0;shakeTimer=0;
  dmgFlash=0;successFlash=0;
  usedQuestions=[];currentQuestion=null;
  gatesUnlocked=[false,false,false,false];
  openedCrates.clear();
  particles=[];interactTarget=null;
  // Reset map crates
  CRATE_POSITIONS.forEach(([x,y])=>{if(MAP[y]&&MAP[y][x]===0)MAP[y][x]=3;});
  MAP[11][4]=2;MAP[11][36]=2;MAP[19][19]=2;MAP[20][19]=2;
  initZombies();
  deathTimer=0;winTimer=0;
  gameState=GS.GAME;
}

// ── MAIN LOOP ────────────────────────────────────────────────
let lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,(ts-lastTime)/16.67);lastTime=ts;
  ctx.save();
  if(shakeTimer>0){ctx.translate((Math.random()-0.5)*shakeX,(Math.random()-0.5)*shakeY);}

  if(gameState===GS.MENU){
    renderMenu();
  }else if(gameState===GS.SETTINGS){
    renderSettings();
  }else if(gameState===GS.GAME){
    updatePlayer();
    updateZombies();
    updateParticles();
    updateShake();
    checkWin();
    gameTime++;
    const zbuf=raycast();
    renderSprites(zbuf);
    renderFlashlight();
    if(cfg.quality>0&&Math.random()<0.4)renderGrain();
    renderHUD();
    renderMobileControls();
  }else if(gameState===GS.QUESTION){
    // Render game bg frozen
    const zbuf=raycast();
    renderSprites(zbuf);
    renderFlashlight();
    renderQuestion();
  }else if(gameState===GS.PAUSED){
    const zbuf=raycast();
    renderSprites(zbuf);
    renderFlashlight();
    renderPaused();
    renderMobileControls();
  }else if(gameState===GS.DEAD){
    const zbuf=raycast();
    renderSprites(zbuf);
    renderDead();
  }else if(gameState===GS.GAMEOVER){
    renderGameOver();
  }else if(gameState===GS.WIN){
    winTimer--;
    if(winTimer<=0){}
    renderWin();
  }

  ctx.restore();
}

// ── MOUSE LOOK ───────────────────────────────────────────────
let pointerLocked=false;
document.addEventListener('pointerlockchange',()=>{pointerLocked=!!document.pointerLockElement;});
canvas.addEventListener('click',()=>{if(gameState===GS.GAME&&!('ontouchstart' in window))canvas.requestPointerLock();});
document.addEventListener('mousemove',e=>{
  if(gameState===GS.GAME&&pointerLocked){
    player.angle+=e.movementX*cfg.sensitivity*0.003;
  }
});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&gameState===GS.GAME&&pointerLocked){doShoot();}
  if(e.button===2&&gameState===GS.GAME&&pointerLocked){doReload();}
});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ── START ────────────────────────────────────────────────────
canvas.addEventListener('touchstart',()=>unlockAC(),{once:true});
requestAnimationFrame(loop);
</script>
